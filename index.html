  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;overflow:hidden;background:#0d0d0d}
    body{display:flex;justify-content:center;align-items:center;flex-direction:column}
    #root{height:100%;width:100%;display:none;flex-direction:column}

    /* ── RESPONSIVE LAYOUT ─────────────────────────────────── */

    /* Mobile: constrain content width and center */
    @media (min-width: 600px) {
      body { align-items: center; justify-content: center; }
      #root { max-width: 480px; border-left: 1px solid rgba(255,255,255,0.06); border-right: 1px solid rgba(255,255,255,0.06); }
    }

    /* Tablet (768px+): sidebar layout */
    @media (min-width: 768px) {
      #root { max-width: 100%; width: 100%; height: 100vh; }
      #mb-sidebar { display: flex !important; }
      #mb-top-header { display: none !important; }
      #mb-tabbar { display: none !important; }
      #mb-bottom-bar { display: none !important; }
      #mb-main-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    }

    /* Desktop (1024px+): wider sidebar + content max-width */
    @media (min-width: 1024px) {
      #mb-sidebar { width: 240px !important; }
      #mb-sidebar .mb-nav-label { display: block !important; }
      #mb-sidebar .mb-nav-section { display: block !important; }
      #mb-content-wrapper { max-width: 900px; margin: 0 auto; width: 100%; }
    }

    /* Sidebar nav items hover */
    .mb-nav-btn:hover { background: rgba(207,0,0,0.08) !important; }
    .mb-nav-btn.active { background: rgba(207,0,0,0.12) !important; color: #cf0000 !important; }
    .mb-nav-btn.active .mb-nav-icon { color: #cf0000 !important; }

    /* Sidebar add button pulse on hover */
    .mb-add-btn:hover .mb-add-inner { transform: scale(1.06) !important; box-shadow: 0 6px 24px rgba(207,0,0,0.5) !important; }
    .mb-add-btn:hover .mb-add-inner { transition: transform 0.15s, box-shadow 0.15s; }

    #splash{display:flex;flex-direction:column;align-items:center;gap:18px;padding:40px;text-align:center}
    .logo{font-size:34px;font-weight:900;letter-spacing:6px;color:#cf0000;font-family:'Barlow Condensed',sans-serif}
    .logo b{color:#e8d5b0;font-weight:900}
    .bar-wrap{width:220px;height:4px;background:#1c1008;border-radius:2px;overflow:hidden;border:1px solid #2a1a0a}
    .bar-fill{height:100%;background:linear-gradient(90deg,#8b0000,#cf0000,#ff5555);border-radius:2px;animation:ld 6s ease-in-out forwards}
    .msg{font-size:11px;color:#9a8a7a;letter-spacing:2px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
    @keyframes ld{0%{width:3%}30%{width:35%}60%{width:65%}85%{width:88%}100%{width:96%}}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5);cursor:pointer}

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAX9Wo4dx8mI_4JK63UTDnp9hTr1Vjv0-s",
      authDomain: "movesbook-742cd.firebaseapp.com",
      projectId: "movesbook-742cd",
      storageBucket: "movesbook-742cd.firebasestorage.app",
      messagingSenderId: "499111132644",
      appId: "1:499111132644:web:d66d09ca7f7507e6ed5bf1"
    });
    var _fbAuth     = firebase.auth();
    var _fbDb       = firebase.firestore();
    var _fbProvider = new firebase.auth.GoogleAuthProvider();

    // Handle redirect result on page load (in case popup was blocked and fell back to redirect)
    _fbAuth.getRedirectResult().catch(function(e){ console.warn('[MB] getRedirectResult error', e); });

    window.__MB_AUTH__ = {
      signIn: function() {
        return _fbAuth.signInWithPopup(_fbProvider).catch(function(e) {
          // If popup blocked, fall back to redirect
          if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
            return _fbAuth.signInWithRedirect(_fbProvider);
          }
          throw e;
        });
      },
      signOut:       function() { return _fbAuth.signOut(); },
      signInEmail:   function(e,p) { return _fbAuth.signInWithEmailAndPassword(e,p); },
      signUpEmail:   function(e,p) { return _fbAuth.createUserWithEmailAndPassword(e,p); },
      resetPassword: function(e)   { return _fbAuth.sendPasswordResetEmail(e); }
    };

    window.__MB_DB__ = {
      load: function(uid) {
        return _fbDb.collection('users').doc(uid).get().then(function(s){ return s.exists ? s.data() : null; });
      },
      save: function(uid, key, val) {
        var obj = {}; obj[key] = JSON.stringify(val);
        return _fbDb.collection('users').doc(uid).set(obj, { merge: true });
      },
      subscribe: function(uid, cb) {
        return _fbDb.collection('users').doc(uid).onSnapshot(function(s){ if(s.exists) cb(s.data()); });
      }
    };

    var loginDiv = null;
    var _unsubSnap = null;

    function _buildLoginWall() {
      var style = document.createElement('style');
      style.textContent = '#mb-login{position:fixed;inset:0;background:#1a0f08;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:"Barlow Condensed",sans-serif;z-index:99999;padding:24px;overflow-y:auto;transition:opacity 0.3s}' +
        '#mb-login h1{font-size:34px;font-weight:900;letter-spacing:6px;margin-bottom:4px;color:#e8d5b0}' +
        '#mb-login h1 span{color:#cf0000}' +
        '#mb-login .sub{color:#9a8a7a;font-size:11px;margin-bottom:24px;letter-spacing:2px;text-transform:uppercase}' +
        '#mb-login .card{background:#221408;border:1px solid #3a2a1a;border-radius:16px;padding:24px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,.6)}' +
        '#mb-login .gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;color:#1a1a1a;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:"Barlow Condensed",sans-serif;letter-spacing:1px;box-shadow:0 2px 8px rgba(0,0,0,.3);margin-bottom:18px}' +
        '#mb-login .gbtn img{width:20px;height:20px}' +
        '#mb-login .divrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}' +
        '#mb-login .divrow span{color:#4a3a2a;font-size:11px;letter-spacing:1px}' +
        '#mb-login .divrow:before,#mb-login .divrow:after{content:"";flex:1;height:1px;background:#3a2a1a}' +
        '#mb-login input{width:100%;background:#0f0a06;border:1px solid #3a2a1a;border-radius:8px;padding:11px 14px;color:#e8d5b0;font-size:14px;font-family:"Barlow Condensed",sans-serif;outline:none;margin-bottom:10px;box-sizing:border-box}' +
        '#mb-login input:focus{border-color:#8b1a1a}' +
        '#mb-login input::placeholder{color:#4a3a2a}' +
        '#mb-login .ebtn{width:100%;background:#8b1a1a;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:"Barlow Condensed",sans-serif;letter-spacing:2px;margin-top:4px}' +
        '#mb-login .trow{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:14px;font-size:12px;color:#6a5a4a}' +
        '#mb-login .trow button{background:none;border:none;color:#c0a080;cursor:pointer;font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;text-decoration:underline;padding:0}' +
        '#mb-login .fgt{background:none;border:none;color:#4a3a2a;cursor:pointer;font-family:"Barlow Condensed",sans-serif;font-size:11px;display:block;margin:8px auto 0;padding:0}' +
        '#mb-login .err{color:#cf0000;font-size:12px;margin-top:10px;text-align:center;min-height:16px}' +
        '#mb-login .ok{color:#2d6a4f;font-size:12px;margin-top:10px;text-align:center;min-height:16px}';
      document.head.appendChild(style);

      loginDiv = document.createElement('div');
      loginDiv.id = 'mb-login';
      loginDiv.innerHTML =
        '<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>' +
        '<h1><span>MOVES</span>BOOK</h1>' +
        '<p class="sub">FOR BREAKING NERDS ONLY</p>' +
        '<div class="card">' +
          '<button class="gbtn" id="mb-gbtn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"/>Continue with Google</button>' +
          '<div class="divrow"><span>OR</span></div>' +
          '<input type="email"    id="mb-em"  placeholder="Email address"    autocomplete="email"/>' +
          '<input type="password" id="mb-pw"  placeholder="Password"         autocomplete="current-password"/>' +
          '<input type="password" id="mb-pw2" placeholder="Confirm password" autocomplete="new-password" style="display:none"/>' +
          '<button class="ebtn" id="mb-ebtn">SIGN IN</button>' +
          '<button class="fgt"  id="mb-fgt">Forgot password?</button>' +
          '<p class="err" id="mb-err"></p>' +
          '<p class="ok"  id="mb-ok"></p>' +
          '<div class="trow"><span id="mb-tlbl">Don&#39;t have an account?</span><button id="mb-tgl">Sign Up</button></div>' +
        '</div>' +
        '<p style="color:#3a2a1a;font-size:10px;margin-top:16px;letter-spacing:1px">Your moves. Your progress. Your story.</p>';
      document.body.appendChild(loginDiv);

      var mode = 'signin';
      function setErr(m) { document.getElementById('mb-err').textContent=m; document.getElementById('mb-ok').textContent=''; }
      function setOk(m)  { document.getElementById('mb-ok').textContent=m;  document.getElementById('mb-err').textContent=''; }

      document.getElementById('mb-gbtn').onclick = function() {
        setErr('');
        window.__MB_AUTH__.signIn();
      };

      document.getElementById('mb-tgl').onclick = function() {
        mode = mode === 'signin' ? 'signup' : 'signin';
        var s = mode === 'signup';
        document.getElementById('mb-ebtn').textContent  = s ? 'CREATE ACCOUNT' : 'SIGN IN';
        document.getElementById('mb-tlbl').textContent  = s ? 'Already have an account?' : "Don't have an account?";
        document.getElementById('mb-tgl').textContent   = s ? 'Sign In' : 'Sign Up';
        document.getElementById('mb-pw2').style.display = s ? 'block' : 'none';
        document.getElementById('mb-pw').placeholder    = s ? 'Password (min 6 chars)' : 'Password';
        document.getElementById('mb-fgt').style.display = s ? 'none' : 'block';
        setErr('');
      };

      document.getElementById('mb-ebtn').onclick = function() {
        var email = document.getElementById('mb-em').value.trim();
        var pass  = document.getElementById('mb-pw').value;
        var pass2 = document.getElementById('mb-pw2').value;
        setErr('');
        if (!email || !pass) { setErr('Please enter your email and password.'); return; }
        if (mode === 'signup') {
          if (pass.length < 6) { setErr('Password must be at least 6 characters.'); return; }
          if (pass !== pass2)  { setErr('Passwords do not match.'); return; }
          window.__MB_AUTH__.signUpEmail(email, pass).catch(function(e){
            setErr(e.code === 'auth/email-already-in-use' ? 'Email already in use.' : 'Sign-up failed.');
          });
        } else {
          window.__MB_AUTH__.signInEmail(email, pass).catch(function(e){
            setErr(['auth/wrong-password','auth/user-not-found','auth/invalid-credential'].indexOf(e.code)>=0
              ? 'Incorrect email or password.' : 'Sign-in failed.');
          });
        }
      };

      document.getElementById('mb-fgt').onclick = function() {
        var email = document.getElementById('mb-em').value.trim();
        if (!email) { setErr('Enter your email above first.'); return; }
        window.__MB_AUTH__.resetPassword(email)
          .then(function(){ setOk('Reset email sent.'); })
          .catch(function(){ setErr('Could not send reset email.'); });
      };

      document.addEventListener('keydown', function(e){
        if (e.key === 'Enter' && loginDiv && loginDiv.style.display !== 'none') {
          document.getElementById('mb-ebtn').click();
        }
      });
    }

    _fbAuth.onAuthStateChanged(function(user) {
      if (user) {
        window.__MB_USER__ = { uid:user.uid, name:user.displayName, email:user.email, photo:user.photoURL };
        window.__MB_DB__.load(user.uid).then(function(data) {
          if (data) {
            if (data.moves)    { try { const p=JSON.parse(data.moves);    if(Array.isArray(p)&&p.length>0)    localStorage.setItem('mb_moves',    data.moves);    } catch{} }
            if (data.sets)     { try { const p=JSON.parse(data.sets);     if(Array.isArray(p)&&p.length>0)    localStorage.setItem('mb_sets',     data.sets);     } catch{} }
            if (data.rounds)   { try { const p=JSON.parse(data.rounds);   if(Array.isArray(p)&&p.length>0)    localStorage.setItem('mb_rounds',   data.rounds);   } catch{} }
            if (data.ideas)    { try { const p=JSON.parse(data.ideas);    if(Array.isArray(p)&&p.length>0)    localStorage.setItem('mb_ideas',    data.ideas);    } catch{} }
            if (data.habits)   { try { const p=JSON.parse(data.habits);   if(Array.isArray(p)&&p.length>0)    localStorage.setItem('mb_habits',   data.habits);   } catch{} }
            if (data.cats)     { try { const p=JSON.parse(data.cats);     if(Array.isArray(p)&&p.length>0)    localStorage.setItem('mb_cats',     data.cats);     } catch{} }
            if (data.profile)  { try { const pp=JSON.parse(data.profile); if(pp&&Object.values(pp).some(v=>v)) localStorage.setItem('mb_profile',  data.profile);  } catch{} }
            if (data.settings)   localStorage.setItem('mb_settings',   data.settings);
            if (data.templates)  localStorage.setItem('mb_templates',  data.templates);
            if (data.catColors)  localStorage.setItem('mb_cat_colors', data.catColors);
            localStorage.setItem('mb_data_version','5');
          }
          if (loginDiv) { loginDiv.style.opacity='0'; setTimeout(function(){ loginDiv.style.display='none'; },300); }
          window.dispatchEvent(new Event('mb-auth-resolved'));
        }).catch(function(){
          if (loginDiv) { loginDiv.style.opacity='0'; setTimeout(function(){ loginDiv.style.display='none'; },300); }
          window.dispatchEvent(new Event('mb-auth-resolved'));
        });

        if (_unsubSnap) _unsubSnap();
        _unsubSnap = window.__MB_DB__.subscribe(user.uid, function(d){
          // Only update localStorage for background sync — do NOT re-dispatch mb-auth-resolved
          // as that would overwrite live React state with potentially stale Firestore snapshots
          try {
            if (d.moves)    localStorage.setItem('mb_moves',    d.moves);
            if (d.sets)     localStorage.setItem('mb_sets',     d.sets);
            if (d.rounds) { try { const pr=JSON.parse(d.rounds); if(pr.length>0) localStorage.setItem('mb_rounds', d.rounds); } catch{} }
            if (d.ideas)    localStorage.setItem('mb_ideas',    d.ideas);
            if (d.profile)  { try { const pp=JSON.parse(d.profile); if(pp&&Object.values(pp).some(v=>v)) localStorage.setItem('mb_profile', d.profile); } catch{} }
            if (d.settings) localStorage.setItem('mb_settings', d.settings);
            if (d.habits)     localStorage.setItem('mb_habits',     d.habits);
            if (d.templates)  localStorage.setItem('mb_templates',  d.templates);
            // NOTE: cats and catColors are NOT updated from the subscriber to prevent
            // Firestore overwriting the locally reordered category order before it has
            // time to sync. They are loaded correctly at auth resolution instead.
            if (d.catColors)  localStorage.setItem('mb_cat_colors', d.catColors);
          } catch(e){}
          // Removed: window.dispatchEvent(new Event('mb-auth-resolved'))
          // Reason: re-dispatching resets all React state from localStorage on every
          // Firestore push, overwriting in-memory edits (e.g. category renames) with
          // stale cloud data before the debounced save completes.
        });
      } else {
        window.__MB_USER__ = null;
        // Clear all app data from localStorage so a new account starts fresh
        ['mb_moves','mb_sets','mb_rounds','mb_ideas','mb_profile','mb_settings',
         'mb_habits','mb_templates','mb_cats','mb_cat_colors','mb_data_version'].forEach(function(k){ localStorage.removeItem(k); });
        if (loginDiv) { loginDiv.style.display='flex'; loginDiv.style.opacity='1'; }
        if (_unsubSnap) { _unsubSnap(); _unsubSnap=null; }
      }
    });

    document.addEventListener('DOMContentLoaded', _buildLoginWall);
  </script>

// ─── HIGHLIGHT — bold-highlights query matches in search results ──────────────
const Highlight = ({ text="", query="" }) => {
  if (!query.trim()) return <Fragment>{text}</Fragment>;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const parts = text.split(new RegExp(`(${escaped})`, "gi"));
  return <Fragment>{parts.map((p,i) => p.toLowerCase()===query.toLowerCase()
    ? <mark key={i} style={{ background:"#f5c842", color:C.brown, borderRadius:2, padding:"0 1px" }}>{p}</mark>
    : p)}</Fragment>;
};

const lbl = () => ({ display:"block", fontSize:13, color:C.textSec, marginBottom:5, letterSpacing:1.2, fontWeight:700, fontFamily:FONT_DISPLAY });
const inp = () => ({ width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"9px 12px", color:C.text, fontSize:14, outline:"none", boxSizing:"border-box", fontFamily:FONT_BODY });

const Inp = ({ label, value, onChange, placeholder, type="text" }) => {
  const [local, setLocal] = useState(value);
  const onChangeRef = useRef(onChange);
  onChangeRef.current = onChange;
  useEffect(() => { setLocal(value); }, [value]);
  const handleChange = e => { const v = e.target.value; setLocal(v); onChangeRef.current(v); };
  return (
    <div style={{ marginBottom:14 }}>
      <label style={lbl()}>{label}</label>
      <input type={type} value={local} onChange={handleChange} placeholder={placeholder} style={inp()}/>
    </div>
  );
};
const Txtarea = ({ label, value, onChange, placeholder, rows=3 }) => {
  const [local, setLocal] = useState(value);
  const onChangeRef = useRef(onChange);
  onChangeRef.current = onChange;
  useEffect(() => { setLocal(value); }, [value]);
  const handleChange = e => { const v = e.target.value; setLocal(v); onChangeRef.current(v); };
  return (
    <div style={{ marginBottom:14 }}>
      <label style={lbl()}>{label}</label>
      <textarea value={local} onChange={handleChange} placeholder={placeholder} rows={rows} style={{ ...inp(), resize:"vertical" }}/>
    </div>
  );
};
const Sel = ({ label, value, onChange, options }) => (
  <div style={{ marginBottom:14 }}><label style={lbl()}>{label}</label>
    <select value={value} onChange={e=>onChange(e.target.value)} style={inp()}>
      {options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
    </select>
  </div>
);
const Btn = ({ onClick, children, variant="primary", style:ex={}, disabled, small }) => {
  const base = { border:"none", cursor:disabled?"not-allowed":"pointer", borderRadius:8, fontWeight:700, opacity:disabled?0.45:1, display:"inline-flex", alignItems:"center", gap:6, fontFamily:FONT_DISPLAY, fontSize:small?12:14, letterSpacing:0.8, transition:"opacity 0.15s" };
  const v = {
    primary: { background:C.accent, color:C.bg, padding:small?"7px 13px":"11px 20px" },
    secondary: { background:C.surfaceAlt, color:C.text, border:`1px solid ${C.border}`, padding:small?"7px 13px":"11px 20px" },
    ghost: { background:"transparent", color:C.textSec, padding:small?"7px 13px":"11px 20px" },
    danger: { background:`${C.accent}18`, color:C.accent, border:`1px solid ${C.accent}66`, padding:small?"7px 13px":"11px 20px" },
  };
  return <button onClick={onClick} disabled={disabled} style={{...base,...v[variant],...ex}}>{children}</button>;
};

const BulkModal = ({ onClose, onImport, category }) => {
  const t = useT();
  const [txt,setTxt]=useState(""); const [step,setStep]=useState(1);
  const [parsed,setParsed]=useState([]); const [sel,setSel]=useState([]);
  const [cat,setCat]=useState(category||"Footworks"); const [mastery,setMastery]=useState(50);
  const parse=()=>{ const names=txt.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean); setParsed(names.map((n,i)=>({id:i,name:n}))); setSel(names.map((_,i)=>i)); setStep(2); };
  const tog=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const imp=()=>{ onImport(parsed.filter(p=>sel.includes(p.id)).map(p=>({name:p.name,category:cat,mastery,description:"",link:"",date:new Date().toISOString().split("T")[0],status:"wip"}))); onClose(); };
  return (
    <Modal title="BULK IMPORT MOVES" onClose={onClose} wide>
      {step===1 ? <Fragment>
        <p style={{ color:C.textSec, fontSize:13, marginBottom:16, lineHeight:1.6 }}>Paste your list — one move per line or comma-separated.</p>
        <Txtarea value={txt} onChange={setTxt} placeholder={"Sixstep\nTwostep, Pretzels\nBabylon\n..."} rows={8}/>
        <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
          <Btn variant="secondary" onClick={onClose}>{t("cancel")}</Btn>
          <Btn onClick={parse} disabled={!txt.trim()}>Find Moves 🔍</Btn>
        </div>
      </Fragment> : <Fragment>
        <Sel label="IMPORT TO CATEGORY" value={cat} onChange={setCat} options={CATS}/>
        <MasterySlider value={mastery} onChange={setMastery}/>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <span style={{ fontSize:13, color:C.textSec, fontWeight:700, letterSpacing:1 }}>{parsed.length} MOVES FOUND</span>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={()=>setSel(parsed.map(p=>p.id))} style={{ background:"none", border:"none", color:C.brownLight, cursor:"pointer", fontSize:13, fontFamily:"inherit" }}>All</button>
            <button onClick={()=>setSel([])} style={{ background:"none", border:"none", color:C.textMuted, cursor:"pointer", fontSize:13, fontFamily:"inherit" }}>None</button>
          </div>
        </div>
        <div style={{ background:C.surfaceAlt, borderRadius:10, padding:10, marginBottom:16, maxHeight:200, overflow:"auto", border:`1px solid ${C.borderLight}` }}>
          {parsed.map(p=>(
            <div key={p.id} onClick={()=>tog(p.id)} style={{ display:"flex", alignItems:"center", gap:10, padding:"7px 6px", cursor:"pointer", borderRadius:6 }}>
              <div style={{ width:16, height:16, borderRadius:4, border:`2px solid ${sel.includes(p.id)?C.green:C.border}`, background:sel.includes(p.id)?C.green:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                {sel.includes(p.id)&&<Ic n="check" s={13} c="#fff"/>}
              </div>
              <span style={{ color:C.text, fontSize:13 }}>{p.name}</span>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
          <Btn variant="secondary" onClick={()=>setStep(1)}>Back</Btn>
          <Btn onClick={imp} disabled={!sel.length}>Import {sel.length} Moves</Btn>
        </div>
      </Fragment>}
    </Modal>
  );
};

// ─── NODE GRAPH MAP VIEW ──────────────────────────────────────────────────────
const NW=114, NH=50;
const MapView = ({ moves, category, onAddMove, onDeleteMove, onUpdateMove }) => {
  const catColor = CAT_COLORS[category]||C.accent;
  const initNodes = useCallback((mvs)=>{
    const root = { id:"root", label:category, x:180, y:30, isRoot:true, color:catColor, moveId:null };
    const n=mvs.length;
    const children = mvs.map((m,i)=>{
      const angle = n===1 ? -Math.PI/2 : (i/n)*2*Math.PI-Math.PI/2;
      const r = Math.max(130,n*22);
      return { id:`m${m.id}`, label:m.name, x:180+r*Math.cos(angle)-NW/2, y:120+(r*0.65)*Math.sin(angle)-NH/2, isRoot:false, color:masteryColor(m.mastery), moveId:m.id, mastery:m.mastery };
    });
    return [root,...children];
  },[category,catColor]);
  const [nodes,setNodes]=useState(()=>initNodes(moves));
  const [edges,setEdges]=useState(()=>moves.map(m=>({from:"root",to:`m${m.id}`})));
  const [scale,setScale]=useState(0.95); const [pan,setPan]=useState({x:20,y:20});
  const [dragging,setDragging]=useState(null); const [dragOff,setDragOff]=useState({x:0,y:0});
  const [panning,setPanning]=useState(false); const [panStart,setPanStart]=useState({});
  const [selected,setSelected]=useState(null); const [connectFrom,setConnectFrom]=useState(null);
  const [mousePos,setMousePos]=useState({x:0,y:0}); const [editNode,setEditNode]=useState(null);
  const svgRef=useRef();

  useEffect(()=>{
    setNodes(prev=>{
      const prevIds=new Set(prev.map(n=>n.id));
      const moveIds=new Set(moves.map(m=>`m${m.id}`));
      const added=moves.filter(m=>!prevIds.has(`m${m.id}`)).map(m=>{
        const angle=Math.random()*2*Math.PI, r=130+Math.random()*70;
        return { id:`m${m.id}`, label:m.name, x:180+r*Math.cos(angle)-NW/2, y:130+r*0.65*Math.sin(angle)-NH/2, isRoot:false, color:masteryColor(m.mastery), moveId:m.id, mastery:m.mastery };
      });
      return [...prev.filter(n=>n.isRoot||moveIds.has(n.id)).map(n=>{ if(n.isRoot)return n; const m=moves.find(mv=>`m${mv.id}`===n.id); return m?{...n,label:m.name,color:masteryColor(m.mastery),mastery:m.mastery}:n; }),...added];
    });
    setEdges(prev=>{
      const moveIds=new Set(moves.map(m=>`m${m.id}`));
      const filtered=prev.filter(e=>(e.from==="root"||moveIds.has(e.from))&&(e.to==="root"||moveIds.has(e.to)));
      const existing=new Set(filtered.map(e=>e.to));
      const newEdges=moves.filter(m=>!existing.has(`m${m.id}`)).map(m=>({from:"root",to:`m${m.id}`}));
      return [...filtered,...newEdges];
    });
  },[moves]);

  const getNode=id=>nodes.find(n=>n.id===id);
  const svgXY=e=>{ const r=svgRef.current.getBoundingClientRect(); return {x:(e.clientX-r.left-pan.x)/scale,y:(e.clientY-r.top-pan.y)/scale}; };
  const onMDNode=(e,id)=>{ e.stopPropagation(); const {x,y}=svgXY(e); const nd=nodes.find(n=>n.id===id); setDragging(id); setSelected(id); setDragOff({x:x-nd.x,y:y-nd.y}); };
  const onMM=e=>{ const {x,y}=svgXY(e); setMousePos({x,y}); if(dragging)setNodes(p=>p.map(n=>n.id===dragging?{...n,x:x-dragOff.x,y:y-dragOff.y}:n)); else if(panning)setPan({x:panStart.px+(e.clientX-panStart.mx),y:panStart.py+(e.clientY-panStart.my)}); };
  const onMU=()=>{ setDragging(null); setPanning(false); if(connectFrom)setConnectFrom(null); };
  const onMDSvg=e=>{ if(e.target===svgRef.current||e.target.tagName==="svg"){ setSelected(null); setPanning(true); setPanStart({px:pan.x,py:pan.y,mx:e.clientX,my:e.clientY}); } };
  const onNMU=(e,id)=>{ e.stopPropagation(); if(connectFrom&&connectFrom!==id){ const ex=edges.some(ed=>(ed.from===connectFrom&&ed.to===id)||(ed.from===id&&ed.to===connectFrom)); if(!ex)setEdges(p=>[...p,{from:connectFrom,to:id}]); setConnectFrom(null); } };
  const delSel=()=>{ if(!selected||selected==="root")return; const nd=nodes.find(n=>n.id===selected); if(nd?.moveId)onDeleteMove(nd.moveId); setNodes(p=>p.filter(n=>n.id!==selected)); setEdges(p=>p.filter(e=>e.from!==selected&&e.to!==selected)); setSelected(null); };

  return (
    <div style={{ position:"relative", flex:1, overflow:"hidden", background:C.surfaceAlt }}>
      <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none" }}>
        <defs><pattern id="woodgrain" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.6" fill={C.border} opacity="0.4"/>
        </pattern></defs>
        <rect width="100%" height="100%" fill="url(#woodgrain)"/>
      </svg>
      <div style={{ position:"absolute", top:10, left:10, zIndex:10, display:"flex", gap:5 }}>
        <button onClick={onAddMove} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:7, padding:"6px 11px", cursor:"pointer", color:C.text, fontSize:13, fontWeight:700, display:"flex", alignItems:"center", gap:5, fontFamily:"'Georgia',serif" }}>
          <Ic n="plus" s={12} c={C.green}/> Add Move
        </button>
        {selected&&selected!=="root"&&<Fragment>
          <button onClick={()=>{ const nd=nodes.find(x=>x.id===selected); if(nd?.moveId){ const m=moves.find(mv=>mv.id===nd.moveId); if(m)setEditNode({...nd,...m}); }}} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:7, padding:"6px 11px", cursor:"pointer", color:C.brownMid, fontSize:13, fontWeight:700, display:"flex", alignItems:"center", gap:5, fontFamily:"'Georgia',serif" }}>
            <Ic n="edit" s={12} c={C.brownMid}/> Edit
          </button>
          <button onClick={delSel} style={{ background:C.surface, border:`1px solid ${C.accent}66`, borderRadius:7, padding:"6px 11px", cursor:"pointer", color:C.accent, fontSize:13, fontWeight:700, display:"flex", alignItems:"center", gap:5, fontFamily:"'Georgia',serif" }}>
            <Ic n="trash" s={12} c={C.accent}/> Delete
          </button>
        </Fragment>}
      </div>
      <div style={{ position:"absolute", bottom:12, left:12, zIndex:10, display:"flex", flexDirection:"column", gap:4 }}>
        {[["zIn",()=>setScale(s=>Math.min(2.2,s+0.15))],["zOut",()=>setScale(s=>Math.max(0.3,s-0.15))]].map(([ic,fn])=>(
          <button key={ic} onClick={fn} style={{ width:30, height:30, background:C.surface, border:`1px solid ${C.border}`, borderRadius:7, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}><Ic n={ic} s={15} c={C.textSec}/></button>
        ))}
        <button onClick={()=>{setScale(0.95);setPan({x:20,y:20});}} style={{ width:30, height:30, background:C.surface, border:`1px solid ${C.border}`, borderRadius:7, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, color:C.textSec }}>⊙</button>
      </div>
      <svg ref={svgRef} style={{ width:"100%", height:"100%", cursor:panning?"grabbing":connectFrom?"crosshair":"grab" }}
        onMouseMove={onMM} onMouseUp={onMU} onMouseDown={onMDSvg} onMouseLeave={onMU}>
        <g transform={`translate(${pan.x},${pan.y}) scale(${scale})`}>
          {connectFrom&&(()=>{ const fn=getNode(connectFrom); return fn?<line x1={fn.x+NW/2} y1={fn.y+NH/2} x2={mousePos.x} y2={mousePos.y} stroke={C.brownLight} strokeWidth={1.5} strokeDasharray="5 3" opacity={0.8}/>:null; })()}
          {edges.map((e,i)=>{
            const f=getNode(e.from), t=getNode(e.to); if(!f||!t)return null;
            const fx=f.x+NW/2,fy=f.y+NH/2,tx=t.x+NW/2,ty=t.y+NH/2,mx=(fx+tx)/2,my=(fy+ty)/2;
            return <g key={i}><line x1={fx} y1={fy} x2={tx} y2={ty} stroke={C.border} strokeWidth={1.5} strokeDasharray="5 4" opacity={0.7}/>
              <g onClick={()=>setEdges(p=>p.filter((_,idx)=>idx!==i))} style={{cursor:"pointer"}}>
                <circle cx={mx} cy={my} r={7} fill={C.surfaceAlt} stroke={C.border} strokeWidth={1}/>
                <text x={mx} y={my+4} textAnchor="middle" fill={C.textMuted} fontSize={10} fontWeight={700} style={{pointerEvents:"none",userSelect:"none"}}>×</text>
              </g>
            </g>;
          })}
          {nodes.map(node=>{
            const isSel=selected===node.id, col=node.isRoot?catColor:node.color;
            return <g key={node.id} transform={`translate(${node.x},${node.y})`} onMouseDown={e=>onMDNode(e,node.id)} onMouseUp={e=>onNMU(e,node.id)} onDoubleClick={e=>{e.stopPropagation();if(!node.isRoot){const m=moves.find(mv=>mv.id===node.moveId);if(m)setEditNode({...node,...m});}}} style={{cursor:dragging===node.id?"grabbing":"grab"}}>
              {isSel&&<rect x={-5} y={-5} width={NW+10} height={NH+10} rx={13} fill={`${col}18`} stroke={col} strokeWidth={1.5}/>}
              <rect x={0} y={0} width={NW} height={NH} rx={9} fill={node.isRoot?C.surface:C.bg} stroke={isSel?col:node.isRoot?`${col}88`:C.border} strokeWidth={node.isRoot?2:1}/>
              <rect x={0} y={0} width={NW} height={3} rx={2} fill={col}/>
              <text x={NW/2} y={node.isRoot?27:19} textAnchor="middle" fill={C.brown} fontSize={node.isRoot?11:10} fontWeight={node.isRoot?800:700} fontFamily="'Georgia',serif" style={{pointerEvents:"none",userSelect:"none"}}>{node.label.length>14?node.label.slice(0,13)+"…":node.label}</text>
              {!node.isRoot&&<Fragment>
                <rect x={10} y={32} width={NW-20} height={3} rx={1.5} fill={C.border}/>
                <rect x={10} y={32} width={(NW-20)*(node.mastery/100)} height={3} rx={1.5} fill={col}/>
                <text x={NW/2} y={43} textAnchor="middle" fill={col} fontSize={8} fontWeight={800} style={{pointerEvents:"none",userSelect:"none"}}>{node.mastery}%</text>
              </Fragment>}
              {!node.isRoot&&<g onMouseDown={e=>{e.stopPropagation();setConnectFrom(node.id);}} style={{cursor:"crosshair"}}>
                <circle cx={NW+1} cy={NH/2} r={6} fill={C.bg} stroke={connectFrom===node.id?C.accent:C.border} strokeWidth={1.5}/>
                <circle cx={NW+1} cy={NH/2} r={2.5} fill={connectFrom===node.id?C.accent:C.textMuted}/>
              </g>}
            </g>;
          })}
        </g>
      </svg>
      <div style={{ position:"absolute", bottom:12, right:12, fontSize:12, color:C.textMuted, textAlign:"right", lineHeight:1.7, pointerEvents:"none" }}>Drag to move · Double-click to edit<br/>Handle → node to connect · × to remove edge</div>
      {editNode&&<MoveModal move={editNode} onClose={()=>setEditNode(null)} onSave={f=>{onUpdateMove(editNode.moveId,f);setEditNode(null);}}/>}
    </div>
  );
};

// ─── MOVE TILE ────────────────────────────────────────────────────────────────
const MoveTile = ({ move, onClick, onEdit, onDelete, onDuplicate, onMove, allCats=CATS, catColors=CAT_COLORS, searchQuery="" }) => {
  const { settings } = useSettings();
  const col=masteryColor(move.mastery), catCol=catColors[move.category]||C.accent;
  const showMastery = settings.showMastery !== false;
  const compact = settings.compactCards;
  return (
    <div onClick={onClick} style={{ position:"relative", background:C.bg, border:`1px solid ${C.border}`, borderRadius:8,
      padding: compact ? "7px 8px 5px" : "10px 10px 8px", cursor:"pointer", borderLeft:`4px solid ${catCol}` }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom: showMastery ? 5 : 2 }}>
        <span style={{ fontWeight:700, fontSize: compact ? 13 : 15, color:C.text, lineHeight:1.2, flex:1, paddingRight:4, fontFamily:FONT_DISPLAY,
          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", minWidth:0 }}>
          <Highlight text={move.name} query={searchQuery}/>
        </span>
        <div style={{ display:"flex", alignItems:"center", gap:2, flexShrink:0 }}>
          {move.link&&settings.linkOnCard==="both"&&(
            <a href={move.link.startsWith("http")?move.link:"https://"+move.link} target="_blank" rel="noopener noreferrer"
              onClick={e=>e.stopPropagation()}
              style={{ display:"flex", alignItems:"center", justifyContent:"center",
                width:20, height:20, borderRadius:5, color:C.textMuted, padding:2, textDecoration:"none" }}>
              <Ic n="extLink" s={12} c={C.textMuted}/>
            </a>
          )}
          <button onClick={e=>{e.stopPropagation();onDelete();}}
            style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex" }}>
            <Ic n="x" s={12} c={C.textMuted}/>
          </button>
        </div>
      </div>
      {move.description&&<div style={{ fontSize:10, color:C.textSec, lineHeight:1.4, marginBottom:4,
        overflow:"hidden", textOverflow:"ellipsis", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>
        {move.description}
      </div>}
      {showMastery&&<Fragment>
        <div style={{ height:3, borderRadius:2, background:C.border, marginBottom:4 }}>
          <div style={{ height:"100%", width:`${move.mastery}%`, borderRadius:2, background:`linear-gradient(90deg,${C.red},${col})` }}/>
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span style={{ fontSize: compact ? 11 : 13, color:col, fontWeight:700 }}>{move.mastery}%</span>
          
        </div>
      </Fragment>}
      
    </div>
  );
};

// ─── CATEGORY TILE ────────────────────────────────────────────────────────────
const TILE_PREVIEW = 4; // number of moves shown before "show more"
const CatTile = (props) => {
  const { name, color, total, mastered, moves=[], viewMode="tiles", showMastery=true, showMoveCount=true, onClick, onDelete, onRename, onDuplicate, onChangeColor, draggable, onDragStart, onDragOver, onDrop, isDraggingOver } = props;
  const t = useT();
  const [menu,setMenu]=useState(false);
  const [subColor,setSubColor]=useState(false);
  const [confirmDel,setConfirmDel]=useState(false);
  const [renaming,setRenaming]=useState(false);
  const [draft,setDraft]=useState(name);
  const [expanded,setExpanded]=useState(false); // tiles: show more; list: expand body
  const menuRef=useRef(null);

  useEffect(()=>{
    if(!menu)return;
    const h=e=>{ if(menuRef.current&&!menuRef.current.contains(e.target))setMenu(false); };
    document.addEventListener("pointerdown",h);
    return()=>document.removeEventListener("pointerdown",h);
  },[menu]);

  const closeMenu=()=>{ setMenu(false); setSubColor(false); };

  const isTile = viewMode==="tiles";

  // ── TILE VIEW ──────────────────────────────────────────────────────────────
  if(isTile) {
    const shown = expanded ? moves : moves.slice(0, TILE_PREVIEW);
    return (
      <Fragment>
        <div
          draggable={draggable}
          onDragStart={onDragStart} onDragOver={onDragOver} onDrop={onDrop}
          style={{ ...CARD_BASE(), cursor:"default" }}>
          <div style={CARD_BAR(color)}/>
          <div style={CARD_BODY()}>

          {/* Header row */}
          <div style={{ display:"flex", alignItems:"flex-start", gap:6, marginBottom:6 }}>
            {/* Title + stats — clicking opens category */}
            <div style={{ flex:1, minWidth:0 }} onClick={onClick}>
              {renaming ? (
                <input autoFocus value={draft} onChange={e=>setDraft(e.target.value)}
                  onClick={e=>e.stopPropagation()}
                  onBlur={()=>{ if(draft.trim()&&draft.trim()!==name)onRename(draft.trim()); setRenaming(false); }}
                  onKeyDown={e=>{ if(e.key==="Enter"&&draft.trim()){if(draft.trim()!==name)onRename(draft.trim());setRenaming(false);} if(e.key==="Escape"){setDraft(name);setRenaming(false);} }}
                  style={{ fontWeight:800, fontSize:13, color:C.brown, letterSpacing:1.1, fontFamily:FONT_DISPLAY,
                    background:"transparent", border:"none", borderBottom:`2px solid ${C.accent}`, outline:"none", width:"90%", padding:"1px 0" }}/>
              ) : (
                <div style={{ fontWeight:800, fontSize:13, color:C.brown, letterSpacing:1.1, fontFamily:FONT_DISPLAY, cursor:"pointer", lineHeight:1.2,
                  overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{name.toUpperCase()}</div>
              )}
              {showMoveCount&&<div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}><span style={{color,fontWeight:700}}>{total}</span> move{total!==1?"s":""}</div>}
              {/* No progress bar on category tile header — by design */}
            </div>
            {/* ··· menu */}
            <div ref={menuRef} style={{ flexShrink:0 }}>
              <button onClick={e=>{e.stopPropagation();setMenu(m=>!m);setSubColor(false);}}
                style={{ background:"none", border:"none", cursor:"pointer", color:C.textMuted, padding:2 }}>
                <Ic n="more" s={13}/>
              </button>
              {menu&&<div onClick={e=>e.stopPropagation()}
                style={{ position:"absolute", top:30, right:6, background:C.bg, border:`1px solid ${C.border}`, borderRadius:9,
                  overflow:"hidden", zIndex:9999, minWidth:165, boxShadow:"0 8px 28px rgba(0,0,0,0.22)" }}>
                {!subColor ? <Fragment>
                  <button onClick={()=>{setRenaming(true);setDraft(name);closeMenu();}} style={{ width:"100%", padding:"9px 13px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:8, color:C.text, fontSize:12, fontFamily:"inherit" }}><Ic n="edit" s={12} c={C.textSec}/>{t("rename")}</button>
                  <button onClick={()=>setSubColor(true)} style={{ width:"100%", padding:"9px 13px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", color:C.text, fontSize:12, fontFamily:"inherit", borderTop:`1px solid ${C.borderLight}` }}><span style={{ display:"flex", alignItems:"center", gap:8 }}><span style={{ width:12, height:12, borderRadius:3, background:color, display:"inline-block", flexShrink:0 }}/>Change colour</span><Ic n="chevR" s={11} c={C.textMuted}/></button>
                  <button onClick={()=>{onDuplicate();closeMenu();}} style={{ width:"100%", padding:"9px 13px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:8, color:C.text, fontSize:12, fontFamily:"inherit", borderTop:`1px solid ${C.borderLight}` }}><Ic n="copy" s={12} c={C.textSec}/>{t("duplicate")}</button>
                  <button onClick={()=>{setConfirmDel(true);closeMenu();}} style={{ width:"100%", padding:"9px 13px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:8, color:C.accent, fontSize:12, fontFamily:"inherit", borderTop:`1px solid ${C.border}` }}><Ic n="trash" s={12} c={C.accent}/>{t("delete")}</button>
                </Fragment> : <Fragment>
                  <button onClick={()=>setSubColor(false)} style={{ width:"100%", padding:"8px 13px", background:C.surfaceAlt, border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:6, color:C.textSec, fontSize:11, fontFamily:"inherit", borderBottom:`1px solid ${C.border}` }}>← Back</button>
                  <div style={{ padding:"10px 12px", display:"flex", flexWrap:"wrap", gap:7 }}>
                    {PRESET_COLORS.map(pc=>(
                      <button key={pc} onClick={()=>{onChangeColor(pc);closeMenu();}} style={{ width:24, height:24, borderRadius:5, background:pc, border:pc===color?`2.5px solid ${C.brown}`:`1.5px solid transparent`, cursor:"pointer", outline:"none" }}/>
                    ))}
                  </div>
                </Fragment>}
              </div>}
            </div>
          </div>

          {/* Move list inside tile */}
          {moves.length>0&&(
            <div style={{ flex:1 }}>
              <div style={{ borderTop:`1px solid ${C.borderLight}`, paddingTop:5 }}>
                {shown.map(m=>(
                  <div key={m.id} style={{ display:"flex", alignItems:"center", gap:5, padding:"2px 0" }}>
                    <div style={{ width:5, height:5, borderRadius:"50%", background:masteryColor(m.mastery), flexShrink:0 }}/>
                    <span style={{ fontSize:11, color:C.textSec, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.name}</span>
                    {showMastery&&<span style={{ fontSize:10, color:masteryColor(m.mastery), fontWeight:700, flexShrink:0 }}>{m.mastery}%</span>}
                  </div>
                ))}
              </div>
              {moves.length>TILE_PREVIEW&&(
                <button onClick={e=>{e.stopPropagation();setExpanded(x=>!x);}}
                  style={{ background:"none", border:"none", cursor:"pointer", color:color, fontSize:11, fontWeight:700,
                    padding:"4px 0 6px", fontFamily:FONT_DISPLAY, letterSpacing:0.5, display:"flex", alignItems:"center", gap:3 }}>
                  {expanded
                    ? <Fragment><Ic n="chevD" s={10} c={color}/>show less</Fragment>
                    : <Fragment><Ic n="chevR" s={10} c={color}/>show more ({moves.length-TILE_PREVIEW} more)</Fragment>}
                </button>
              )}
            </div>
          )}
          {moves.length===0&&<div style={{ fontSize:11, color:C.textMuted, fontStyle:"italic", flex:1 }}>No moves yet</div>}
          </div>{/* end CARD_BODY */}
        </div>{/* end CARD_BASE */}

        {confirmDel&&<Modal title={t("deleteCategory")} onClose={()=>setConfirmDel(false)}>
          <p style={{ color:C.textSec, marginBottom:20, lineHeight:1.6 }}>Delete <strong style={{color:C.text}}>{name}</strong>? All moves inside will be deleted too.</p>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn variant="secondary" onClick={()=>setConfirmDel(false)}>Keep it</Btn>
            <Btn variant="danger" onClick={()=>{onDelete();setConfirmDel(false);}}>{t("delete")}</Btn>
          </div>
        </Modal>}
      </Fragment>
    );
  }

  // ── LIST VIEW ──────────────────────────────────────────────────────────────
  return (
    <Fragment>
      <div
        draggable={draggable}
        onDragStart={onDragStart} onDragOver={onDragOver} onDrop={onDrop}
        style={{ position:"relative", background:C.bg, border:`1.5px solid ${C.border}`, borderRadius:10,
          cursor:"default", overflow:"visible", transition:"border-color 0.15s" }}>

        {/* Color bar */}
        <div style={{ height:4, borderRadius:"10px 10px 0 0", background:`linear-gradient(90deg,${color},${color}55)` }}/>

        {/* Header row */}
        <div style={{ display:"flex", alignItems:"center", gap:6, padding:"10px 8px 10px 8px" }}>
          {/* Expand/collapse toggle */}
          <button onClick={e=>{e.stopPropagation();setExpanded(x=>!x);}}
            style={{ background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", padding:2, flexShrink:0 }}>
            <Ic n={expanded?"chevD":"chevR"} s={13} c={C.textMuted}/>
          </button>
          {/* Title — clicking opens category */}
          <div style={{ flex:1, minWidth:0 }} onClick={onClick}>
            {renaming ? (
              <input autoFocus value={draft} onChange={e=>setDraft(e.target.value)}
                onClick={e=>e.stopPropagation()}
                onBlur={()=>{ if(draft.trim()&&draft.trim()!==name)onRename(draft.trim()); setRenaming(false); }}
                onKeyDown={e=>{ if(e.key==="Enter"&&draft.trim()){if(draft.trim()!==name)onRename(draft.trim());setRenaming(false);} if(e.key==="Escape"){setDraft(name);setRenaming(false);} }}
                style={{ fontWeight:800, fontSize:14, color:C.brown, letterSpacing:1.2, fontFamily:FONT_DISPLAY,
                  background:"transparent", border:"none", borderBottom:`2px solid ${C.accent}`, outline:"none", width:"90%", padding:"1px 0" }}/>
            ) : (
              <span style={{ fontWeight:800, fontSize:14, color:C.brown, letterSpacing:1.2, fontFamily:FONT_DISPLAY, cursor:"pointer",
                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", display:"block" }}>{name.toUpperCase()}</span>
            )}
          </div>
          {/* Stats */}
          <div style={{ fontSize:12, color:C.textMuted, flexShrink:0 }}><span style={{color,fontWeight:700}}>{total}</span> move{total!==1?"s":""}</div>
          {/* ··· menu */}
          <div ref={menuRef} style={{ flexShrink:0 }}>
            <button onClick={e=>{e.stopPropagation();setMenu(m=>!m);setSubColor(false);}}
              style={{ background:"none", border:"none", cursor:"pointer", color:C.textMuted, padding:3 }}>
              <Ic n="more" s={13}/>
            </button>
            {menu&&<div onClick={e=>e.stopPropagation()}
              style={{ position:"absolute", top:36, right:6, background:C.bg, border:`1px solid ${C.border}`, borderRadius:9,
                overflow:"hidden", zIndex:9999, minWidth:165, boxShadow:"0 8px 28px rgba(0,0,0,0.22)" }}>
              {!subColor ? <Fragment>
                <button onClick={()=>{setRenaming(true);setDraft(name);closeMenu();}} style={{ width:"100%", padding:"9px 13px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:8, color:C.text, fontSize:12, fontFamily:"inherit" }}><Ic n="edit" s={12} c={C.textSec}/>{t("rename")}</button>
                <button onClick={()=>setSubColor(true)} style={{ width:"100%", padding:"9px 13px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", color:C.text, fontSize:12, fontFamily:"inherit", borderTop:`1px solid ${C.borderLight}` }}><span style={{ display:"flex", alignItems:"center", gap:8 }}><span style={{ width:12, height:12, borderRadius:3, background:color, display:"inline-block", flexShrink:0 }}/>Change colour</span><Ic n="chevR" s={11} c={C.textMuted}/></button>
                <button onClick={()=>{onDuplicate();closeMenu();}} style={{ width:"100%", padding:"9px 13px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:8, color:C.text, fontSize:12, fontFamily:"inherit", borderTop:`1px solid ${C.borderLight}` }}><Ic n="copy" s={12} c={C.textSec}/>{t("duplicate")}</button>
                <button onClick={()=>{setConfirmDel(true);closeMenu();}} style={{ width:"100%", padding:"9px 13px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:8, color:C.accent, fontSize:12, fontFamily:"inherit", borderTop:`1px solid ${C.border}` }}><Ic n="trash" s={12} c={C.accent}/>{t("delete")}</button>
              </Fragment> : <Fragment>
                <button onClick={()=>setSubColor(false)} style={{ width:"100%", padding:"8px 13px", background:C.surfaceAlt, border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:6, color:C.textSec, fontSize:11, fontFamily:"inherit", borderBottom:`1px solid ${C.border}` }}>← Back</button>
                <div style={{ padding:"10px 12px", display:"flex", flexWrap:"wrap", gap:7 }}>
                  {PRESET_COLORS.map(pc=>(
                    <button key={pc} onClick={()=>{onChangeColor(pc);closeMenu();}} style={{ width:24, height:24, borderRadius:5, background:pc, border:pc===color?`2.5px solid ${C.brown}`:`1.5px solid transparent`, cursor:"pointer", outline:"none" }}/>
                  ))}
                </div>
              </Fragment>}
            </div>}
          </div>
        </div>

        {/* Expanded moves list — only when expanded */}
        {expanded&&moves.length>0&&(
          <div style={{ borderTop:`1px solid ${C.borderLight}`, padding:"4px 0 6px" }}>
            {moves.map(m=>(
              <div key={m.id} style={{ display:"flex", alignItems:"center", gap:7, padding:"4px 14px 4px 32px" }}>
                <div style={{ width:5, height:5, borderRadius:"50%", background:masteryColor(m.mastery), flexShrink:0 }}/>
                <span style={{ fontSize:12, color:C.textSec, flex:1 }}>{m.name}</span>
                {showMastery&&<span style={{ fontSize:11, color:masteryColor(m.mastery), fontWeight:700 }}>{m.mastery}%</span>}
              </div>
            ))}
          </div>
        )}
        {expanded&&moves.length===0&&(
          <div style={{ borderTop:`1px solid ${C.borderLight}`, padding:"8px 14px", fontSize:12, color:C.textMuted, fontStyle:"italic" }}>No moves in this category yet</div>
        )}
        {/* Progress bar at bottom when collapsed */}
        {!expanded&&total>0&&<div style={{ margin:"0 10px 8px", height:2, borderRadius:1, background:C.border }}><div style={{ height:"100%", width:`${(mastered/total)*100}%`, borderRadius:1, background:color }}/></div>}
      </div>

      {confirmDel&&<Modal title={t("deleteCategory")} onClose={()=>setConfirmDel(false)}>
        <p style={{ color:C.textSec, marginBottom:20, lineHeight:1.6 }}>Delete <strong style={{color:C.text}}>{name}</strong>? All moves inside will be deleted too.</p>
        <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
          <Btn variant="secondary" onClick={()=>setConfirmDel(false)}>Keep it</Btn>
          <Btn variant="danger" onClick={()=>{onDelete();setConfirmDel(false);}}>{t("delete")}</Btn>
        </div>
      </Modal>}
    </Fragment>
  );
};

// ─── ADD CATEGORY MODAL ───────────────────────────────────────────────────────
const PRESET_COLORS = ["#8b1a1a","#2a5f8a","#b5850a","#2d6a4f","#6b3a8a","#c0391b","#8a3a2a","#1a6a6a","#4a4a6a","#1a6a3a","#8a5a1a","#2a3a8a"];
const AddCategoryModal = ({ onClose, onAdd, existingCats=[], existingColors={} }) => {
  const t = useT();
  const [name,setName]=useState("");
  const [color,setColor]=useState(PRESET_COLORS[0]);
  const [dupWarning,setDupWarning]=useState(false);

  const nameDup = existingCats.some(c=>c.toLowerCase()===name.trim().toLowerCase());
  const colorDup = name.trim() && existingColors[existingCats.find(c=>c.toLowerCase()===name.trim().toLowerCase())]===color;
  const isExactDup = nameDup && colorDup;

  const handleAdd = () => {
    if(!name.trim()) return;
    if(isExactDup) { setDupWarning(true); return; }
    onAdd(name.trim(), color); onClose();
  };

  if(dupWarning) return (
    <Modal title={t("duplicateCategory")} onClose={()=>setDupWarning(false)}>
      <p style={{ color:C.textSec, marginBottom:8, lineHeight:1.6 }}>
        A category named <strong style={{color:C.text}}>{name.trim()}</strong> with this colour already exists.
      </p>
      <p style={{ color:C.textSec, marginBottom:20, lineHeight:1.6 }}>{t("addItAnyway")}</p>
      <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
        <Btn variant="secondary" onClick={()=>setDupWarning(false)}>Go back</Btn>
        <Btn variant="danger" onClick={()=>{ onAdd(name.trim(),color); onClose(); }}>Add anyway</Btn>
      </div>
    </Modal>
  );

  return (
    <Modal title="ADD CATEGORY" onClose={onClose}>
      <Inp label="CATEGORY NAME *" value={name} onChange={v=>{setName(v);setDupWarning(false);}} placeholder="e.g. Signature Moves…"/>
      {nameDup && !isExactDup && <p style={{ color:C.yellow, fontSize:12, marginTop:-10, marginBottom:12 }}>⚠ A category with this name already exists.</p>}
      <div style={{ marginBottom:16 }}>
        <label style={lbl()}>{t("colour")}</label>
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:4 }}>
          {PRESET_COLORS.map(c=>(
            <button key={c} onClick={()=>setColor(c)} style={{ width:30, height:30, borderRadius:6, background:c, border:color===c?`3px solid ${C.brown}`:`2px solid transparent`, cursor:"pointer", outline:"none" }}/>
          ))}
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16, padding:"10px 14px", background:C.surfaceAlt, borderRadius:8, borderLeft:`4px solid ${color}` }}>
        <span style={{ fontWeight:800, fontSize:15, color:C.brown, fontFamily:FONT_DISPLAY, letterSpacing:1.5 }}>{name.toUpperCase()||t("preview")}</span>
      </div>
      <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
        <Btn variant="secondary" onClick={onClose}>{t("cancel")}</Btn>
        <Btn onClick={handleAdd} disabled={!name.trim()}>Add Category</Btn>
      </div>
    </Modal>
  );
};

// ─── TARGET GOAL MODAL ───────────────────────────────────────────────────────
const TargetGoalModal = ({ onClose, onSave, idea, moves=[] }) => {
  const { C, settings } = useSettings();
  const t = useT();
  const isEdit = !!idea;
  const autoLinkEnabled = settings.targetAutoLink === true;
  const [activeTab, setActiveTab] = useState(isEdit ? "journal" : "target");
  const [title,    setTitle]    = useState(idea?.title    || "");
  const [target,   setTarget]   = useState(idea?.target   || 10);
  const [targetRaw, setTargetRaw] = useState(String(idea?.target || 10));
  const [unit,     setUnit]     = useState(idea?.unit     || "moves");
  const [current,  setCurrent]  = useState(idea?.current  || 0);
  const [byWhen,   setByWhen]   = useState(idea?.byWhen   || "");
  const [link,     setLink]     = useState(idea?.link     || "");
  const [autoLink, setAutoLink] = useState(idea?.autoLink || false);
  const [color,    setColor]    = useState(idea?.color    || IDEA_COLORS[0]);
  const [journal,  setJournal]  = useState(idea?.journal  || []);
  const effectiveCurrent = autoLink && autoLinkEnabled ? moves.length : current;

  const handleSave = () => {
    if (!title.trim()) return;
    onSave({ type:"target", pinned:true, title:title.trim(),
      target, unit:unit.trim()||"items", current:effectiveCurrent,
      byWhen, link: ensureHttps(link.trim()), autoLink, color, journal, text:"",
      createdDate: idea?.createdDate || new Date().toISOString().split("T")[0]
    });
    onClose();
  };

  const deleteJournalEntry = (id) => setJournal(j=>j.filter(e=>e.id!==id));

  const inputStyle = { width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:8,
    padding:"9px 12px", color:C.text, fontSize:13, outline:"none", fontFamily:FONT_BODY, boxSizing:"border-box" };

  const tabs = isEdit
    ? [{id:"journal",label:"📓 JOURNAL"},{id:"target",label:"🏹 TARGET"}]
    : [{id:"target",label:"🏹 TARGET"}];

  return (
    <div style={{ width:"100%", maxHeight:"92%", background:C.bg, borderRadius:14, display:"flex", flexDirection:"column", overflow:"hidden", boxShadow:"0 16px 48px rgba(0,0,0,0.5)" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 16px", background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <span style={{ fontWeight:900, fontSize:15, letterSpacing:2, fontFamily:FONT_DISPLAY, color:C.accent }}>{isEdit?"EDIT TARGET":"NEW TARGET"}</span>
        <div style={{ display:"flex", gap:8 }}>
          <Btn variant="secondary" onClick={onClose}>{t("cancel")}</Btn>
          <Btn onClick={handleSave} disabled={!title.trim()}>{t("save")}</Btn>
        </div>
      </div>

      {/* Tabs — only when editing */}
      {isEdit&&(
        <div style={{ display:"flex", background:C.surface, borderBottom:`2px solid ${C.border}`, flexShrink:0 }}>
          {tabs.map(tb=>{
            const on = activeTab===tb.id;
            return (
              <button key={tb.id} onClick={()=>setActiveTab(tb.id)}
                style={{ flex:1, padding:"10px 6px", border:"none", cursor:"pointer", background:on?C.bg:"transparent",
                  color:on?C.accent:C.textSec, borderBottom:`3px solid ${on?C.accent:"transparent"}`,
                  fontSize:12, fontWeight:800, letterSpacing:1.5, fontFamily:FONT_DISPLAY }}>
                {tb.label}
              </button>
            );
          })}
        </div>
      )}

      <div style={{ flex:1, overflow:"auto", padding:16 }}>

        {/* ── JOURNAL TAB ── */}
        {activeTab==="journal"&&(
          <div>
            <JournalEntryInput
              onAdd={({text,link})=>{ const entry={id:Date.now(),date:new Date().toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"}),text,link}; setJournal(j=>[entry,...j]); }}
              placeholder={`What did you do today? e.g. "Finally landed the six step clean — 20 reps in a row"`}
            />
            {journal.length===0 ? (
              <div style={{ textAlign:"center", padding:"40px 20px", color:C.textMuted }}>
                <div style={{ fontSize:28, marginBottom:8 }}>📓</div>
                <div style={{ fontSize:13, fontWeight:700, fontFamily:FONT_DISPLAY, marginBottom:4 }}>No entries yet</div>
                <div style={{ fontSize:12 }}>Each time you hit a milestone, add an entry — what you did, how it felt, what clicked.</div>
              </div>
            ) : journal.map(entry=>(
              <JournalEntryCard key={entry.id} entry={entry}
                onDelete={()=>deleteJournalEntry(entry.id)}
                onUpdate={(updated)=>setJournal(j=>j.map(e=>e.id===entry.id?{...e,...updated}:e))}
              />
            ))}
          </div>
        )}

        {/* ── TARGET TAB ── */}
        {activeTab==="target"&&(
          <div>
            {!isEdit&&(
              <div style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"10px 12px", background:`${C.accent}12`,
                border:`1px solid ${C.accent}30`, borderRadius:8, marginBottom:18 }}>
                <span style={{ fontSize:16, flexShrink:0 }}>📓</span>
                <span style={{ fontSize:12, color:C.textSec, lineHeight:1.6 }}>
                  Once created, this target will have a <strong style={{color:C.text}}>training journal</strong> — log entries as you make progress, e.g. "finally landed the six step clean."
                </span>
              </div>
            )}
            <div style={{ marginBottom:14 }}>
              <label style={lbl()}>TITLE *</label>
              <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Learn 20 new moves…"
                style={{ ...inputStyle, fontSize:14, fontWeight:700, border:`1.5px solid ${C.accent}`, fontFamily:FONT_DISPLAY }}/>
            </div>
            <div style={{ display:"flex", gap:10, marginBottom:14 }}>
              <div style={{ flex:1 }}>
                <label style={lbl()}>TARGET NUMBER *</label>
                <input type="number" min="0" value={targetRaw}
                  onChange={e=>{ setTargetRaw(e.target.value); const n=parseInt(e.target.value); if(!isNaN(n)&&n>=0) setTarget(n); }}
                  onBlur={()=>{ const n=parseInt(targetRaw); const v=isNaN(n)||n<0?0:n; setTarget(v); setTargetRaw(String(v)); }}
                  style={{ ...inputStyle, fontWeight:800, fontSize:18, fontFamily:FONT_DISPLAY, textAlign:"center" }}/>
              </div>
              <div style={{ flex:2 }}>
                <label style={lbl()}>UNIT (what are you counting?)</label>
                <input value={unit} onChange={e=>setUnit(e.target.value)} placeholder="moves, sessions, hours…"
                  style={inputStyle}/>
              </div>
            </div>
            {!(autoLink && autoLinkEnabled) && (
              <div style={{ marginBottom:14 }}>
                <label style={lbl()}>CURRENT PROGRESS</label>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <button onClick={()=>setCurrent(Math.max(0,current-1))}
                    style={{ width:36, height:36, borderRadius:8, border:`1px solid ${C.border}`, background:C.surface,
                      fontSize:18, cursor:"pointer", color:C.textSec, fontWeight:700 }}>−</button>
                  <input type="number" min="0" value={current} onChange={e=>setCurrent(Math.max(0,parseInt(e.target.value)||0))}
                    style={{ ...inputStyle, textAlign:"center", fontWeight:800, fontSize:18, fontFamily:FONT_DISPLAY }}/>
                  <button onClick={()=>setCurrent(current+1)}
                    style={{ width:36, height:36, borderRadius:8, border:`1px solid ${C.accent}`, background:`${C.accent}15`,
                      fontSize:18, cursor:"pointer", color:C.accent, fontWeight:700 }}>+</button>
                </div>
              </div>
            )}
            {autoLinkEnabled && (
              <div style={{ marginBottom:14, display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"10px 12px", background:C.surfaceAlt, borderRadius:8, border:`1px solid ${C.border}` }}>
                <div>
                  <div style={{ fontSize:12, fontWeight:800, color:C.text, fontFamily:FONT_DISPLAY }}>AUTO-LINK TO MOVE LIBRARY</div>
                  <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>Use your actual move count as progress ({moves.length} moves)</div>
                </div>
                <button onClick={()=>setAutoLink(x=>!x)}
                  style={{ width:40, height:22, borderRadius:11, border:"none", cursor:"pointer",
                    background: autoLink ? C.accent : C.border, position:"relative", transition:"background 0.2s" }}>
                  <div style={{ position:"absolute", top:2, left: autoLink?20:2, width:18, height:18,
                    borderRadius:"50%", background:"#fff", transition:"left 0.2s" }}/>
                </button>
              </div>
            )}
            <div style={{ marginBottom:14 }}>
              <label style={lbl()}>DEADLINE (optional)</label>
              <input type="date" value={byWhen} onChange={e=>setByWhen(e.target.value)}
                style={{ ...inputStyle, colorScheme: C.bg==="#121212"?"dark":"light" }}/>
            </div>
            <div style={{ marginBottom:14 }}>
              <label style={lbl()}>VIDEO REFERENCE (optional)</label>
              <input value={link} onChange={e=>setLink(e.target.value)}
                placeholder="https://youtube.com/…"
                style={inputStyle}/>
            </div>
            <div style={{ marginBottom:14 }}>
              <label style={lbl()}>COLOUR</label>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:6 }}>
                {IDEA_COLORS.map(c=>(
                  <button key={c} onClick={()=>setColor(c)}
                    style={{ width:30, height:30, borderRadius:6, background:c, cursor:"pointer", outline:"none",
                      border: color===c ? `3px solid ${C.brown}` : "2px solid transparent" }}/>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ─── GOAL TIME PROGRESS ───────────────────────────────────────────────────────

const targetProgress = (current, target) => {
  if (!target || target <= 0) return { pct:0, color:"#e53935", label:"0%" };
  const pct = Math.min(100, Math.max(0, Math.round((current / target) * 100)));
  const color = pct >= 100 ? "#2d6a4f" : pct >= 60 ? "#b5850a" : "#e53935";
  const label = pct >= 100 ? "Goal reached! 🎉" : `${pct}% there`;
  return { pct, color, label };
};

const ensureHttps = (url) => {
  if (!url || !url.trim()) return "";
  const u = url.trim();
  if (u.startsWith("http://") || u.startsWith("https://")) return u;
  return "https://" + u;
};

const goalTimeProgress = (createdDate, byWhen) => {
  if (!byWhen) return null;
  const now   = Date.now();
  const start = createdDate ? new Date(createdDate).getTime() : now;
  const end   = new Date(byWhen).getTime();
  if (end <= now) return { pct: 100, color: "#e53935", label: "Past deadline" };
  if (end <= start) return { pct: 100, color: "#e53935", label: "Past deadline" };
  const total = end - start;
  const remaining = end - now;
  const pctRemaining = Math.min(100, Math.max(0, Math.round(remaining / total * 100)));
  const daysLeft = Math.ceil(remaining / 86400000);
  const color = pctRemaining > 30 ? "#2d6a4f" : pctRemaining > 10 ? "#b5850a" : "#e53935";
  const label = daysLeft === 1 ? "1 day left" : `${daysLeft} days left`;
  return { pct: 100 - pctRemaining, color, label };
};

const HABIT_COLORS = ["#c0391b","#2a5f8a","#2d6a4f","#b5850a","#6b3a8a","#4a4a4a","#1a7a6a"];

const freqDaysPerWeek = (freq) => {
  if (!freq || freq==="daily") return 7;
  if (freq==="weekdays")       return 5;
  const m = freq.match(/^(\d+)x$/);
  return m ? parseInt(m[1]) : 7;
};

const habitStreak = (checkIns, frequency="daily") => {
  if (!checkIns || checkIns.length === 0) return 0;
  const dpw = freqDaysPerWeek(frequency);
  if (dpw >= 7) {
    // daily streak — must check in every day
    const today = new Date(); today.setHours(0,0,0,0);
    let streak = 0, check = new Date(today);
    while (true) {
      const ds = check.toISOString().split("T")[0];
      if (checkIns.includes(ds)) { streak++; check.setDate(check.getDate()-1); } else break;
    }
    return streak;
  } else {
    // weekly streak — count consecutive weeks meeting the target
    const today = new Date(); today.setHours(0,0,0,0);
    let streak = 0;
    let weekStart = new Date(today);
    // go to start of current week (Monday)
    weekStart.setDate(weekStart.getDate() - ((weekStart.getDay()+6)%7));
    for (let w=0; w<52; w++) {
      const days = [];
      for (let d=0; d<7; d++) {
        const dd = new Date(weekStart); dd.setDate(dd.getDate()+d);
        if (dd <= today) days.push(dd.toISOString().split("T")[0]);
      }
      const done = days.filter(ds=>checkIns.includes(ds)).length;
      if (done >= dpw) { streak++; weekStart.setDate(weekStart.getDate()-7); }
      else { break; }
    }
    return streak;
  }
};

const habitDoneToday = (checkIns) => {
  const today = new Date().toISOString().split("T")[0];
  return (checkIns||[]).includes(today);
};

            </button>
          ))}
        </div>
      </div>

      {/* Notes */}
      <div style={{ marginBottom:14 }}>
        <label style={lbl()}>NOTES <span style={{ fontWeight:400, fontSize:10, color:C.textMuted }}>(optional — shown when expanded)</span></label>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3}
          placeholder="e.g. Focus on footwork first, then musicality. 20 min minimum."
          style={{ ...inputStyle, resize:"vertical" }}/>
      </div>

      {/* Colour */}
      <div style={{ marginBottom:20 }}>
        <label style={lbl()}>COLOUR</label>
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:6 }}>
          {HABIT_COLORS.map(c=>(
            <button key={c} onClick={()=>setColor(c)}
              style={{ width:30, height:30, borderRadius:6, background:c, cursor:"pointer", outline:"none",
                border: color===c ? `3px solid ${C.brown}` : "2px solid transparent" }}/>
          ))}
        </div>
      </div>

      <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn onClick={()=>{ if(name.trim()){ onSave({name:name.trim(), frequency, color, why:why.trim(), notes:notes.trim(), timeOfDay}); onClose(); }}} disabled={!name.trim()}>Save</Btn>
      </div>
    </Modal>
  );
};

const HabitCard = ({ habit, onCheckIn, onEdit, onDelete }) => {
  const { C } = useSettings();
  const [expanded, setExpanded] = useState(false);

  const today    = new Date().toISOString().split("T")[0];
  const checkIns = habit.checkIns || [];
  const doneToday= checkIns.includes(today);
  const streak   = habitStreak(checkIns, habit.frequency);
  const color    = habit.color || C.accent;
  const dpw      = freqDaysPerWeek(habit.frequency);
  const freqLabel= { daily:"Every day","2x":"2×/wk","3x":"3×/wk","4x":"4×/wk","5x":"5×/wk","6x":"6×/wk",weekdays:"Weekdays" }[habit.frequency]||"Every day";

  // 30-day dots
  const dots = [];
  for (let i=29; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().split("T")[0];
    dots.push({ ds, done: checkIns.includes(ds), isToday: i===0 });
  }

  // Weekly ring
  const weekStart = (()=>{ const d=new Date(); d.setDate(d.getDate()-d.getDay()); return d.toISOString().split("T")[0]; })();
  const weekDone  = checkIns.filter(d=>d>=weekStart).length;
  const weekTarget= dpw>=7?7:dpw;
  const weekPct   = Math.min(weekDone/weekTarget,1);
  const R=36, CIRC=2*Math.PI*R;
  const dash=weekPct*CIRC, gap=CIRC-dash, offset=CIRC*0.25;

  // Best streak
  const best = (()=>{ let b=0,c=0; [...checkIns].sort().forEach((d,i,arr)=>{ if(i===0){c=1;b=1;return;} const diff=(new Date(d)-new Date(arr[i-1]))/86400000; if(diff<=1.5){c++;b=Math.max(b,c);}else c=1; }); return Math.max(b,streak); })();

  // 7-day bar
  const last7 = Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return {ds:d.toISOString().split("T")[0],isToday:i===6}; });

  return (
    <div style={{ background:C.bg, borderRadius:12, marginBottom:8, overflow:"hidden",
      border:`1.5px solid ${doneToday?color+"55":C.border}`, borderLeft:`4px solid ${color}`,
      transition:"border-color 0.2s" }}>

      {/* Collapsed row */}
      <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 12px" }}>
        {/* Check-in */}
        <button onClick={e=>{e.stopPropagation();onCheckIn(habit.id);}}
          title={doneToday?"Tap to undo":"Check in for today"}
          style={{ width:44, height:44, borderRadius:12, flexShrink:0, cursor:"pointer",
            border:`2.5px solid ${doneToday?color:C.border}`,
            background:doneToday?color:C.surface,
            display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:doneToday?20:18, transition:"all 0.18s",
            boxShadow:doneToday?`0 2px 10px ${color}55`:"none" }}>
          {doneToday?"✓":(habit.emoji||"🎯")}
        </button>

        {/* Name + info — tap to expand */}
        <div style={{ flex:1, minWidth:0, cursor:"pointer" }} onClick={()=>setExpanded(x=>!x)}>
          <div style={{ fontWeight:800, fontSize:14, color:C.text, fontFamily:FONT_DISPLAY,
            letterSpacing:0.5, lineHeight:1.2,
            overflow:expanded?"visible":"hidden", textOverflow:"ellipsis", whiteSpace:expanded?"normal":"nowrap" }}>
            {habit.name}
          </div>
          {habit.why&&(
            <div style={{ fontSize:11, color:C.textSec, fontStyle:"italic", marginTop:2, lineHeight:1.4,
              overflow:expanded?"visible":"hidden", textOverflow:"ellipsis", whiteSpace:expanded?"normal":"nowrap" }}>
              {habit.why}
            </div>
          )}
          {!expanded&&<div style={{ display:"flex", alignItems:"center", gap:5, marginTop:3, flexWrap:"wrap" }}>
            {streak>0
              ? <span style={{ fontSize:11, fontWeight:800, color, fontFamily:FONT_DISPLAY }}>
                  🔥 {streak} {streak===1?"day":"days"}
                </span>
              : <span style={{ fontSize:11, color:C.textMuted, fontFamily:FONT_DISPLAY }}>Start your streak today</span>
            }
            <span style={{ fontSize:10, color:C.textMuted, background:C.surfaceAlt,
              borderRadius:6, padding:"1px 6px", fontFamily:FONT_DISPLAY }}>{freqLabel}</span>
            {habit.timeOfDay&&habit.timeOfDay!=="anytime"&&(
              <span style={{ fontSize:10, color:C.textMuted, background:C.surfaceAlt,
                borderRadius:6, padding:"1px 6px", fontFamily:FONT_DISPLAY }}>
                {{"morning":"🌅 Morning","afternoon":"☀️ Afternoon","evening":"🌙 Evening"}[habit.timeOfDay]}
              </span>
            )}
          </div>}
        </div>

        {/* Right controls */}
        <button onClick={()=>setExpanded(x=>!x)}
          style={{ background:"none", border:"none", cursor:"pointer", padding:4, display:"flex" }}>
          <Ic n={expanded?"chevD":"chevR"} s={13} c={C.textMuted}/>
        </button>
        <button onClick={e=>{e.stopPropagation();onEdit();}}
          style={{ background:"none", border:"none", cursor:"pointer", padding:4, display:"flex" }}>
          <Ic n="edit" s={13} c={C.textMuted}/>
        </button>
        <button onClick={e=>{e.stopPropagation();onDelete();}}
          style={{ background:"none", border:"none", cursor:"pointer", padding:4, display:"flex" }}>
          <Ic n="trash" s={13} c={C.accent}/>
        </button>
      </div>

      {/* ── Expanded ── */}
      {expanded&&(
        <div style={{ borderTop:`1px solid ${C.borderLight}`, background:C.surface, padding:"14px 14px 12px" }}>

          {/* Freq + time badges */}
          <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
            <span style={{ fontSize:9, fontWeight:800, letterSpacing:1, color, fontFamily:FONT_DISPLAY,
              background:`${color}18`, borderRadius:4, padding:"2px 8px" }}>{freqLabel}</span>
            {habit.timeOfDay&&habit.timeOfDay!=="anytime"&&(
              <span style={{ fontSize:9, fontWeight:800, letterSpacing:1, color:C.textMuted, fontFamily:FONT_DISPLAY,
                background:C.surfaceAlt, borderRadius:4, padding:"2px 8px" }}>
                {{"morning":"🌅 Morning","afternoon":"☀️ Afternoon","evening":"🌙 Evening"}[habit.timeOfDay]}
              </span>
            )}
          </div>

          {/* Ring + this week + stats */}
          <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:12 }}>
            <svg width="84" height="84" viewBox="0 0 84 84" style={{flexShrink:0}}>
              <circle cx="42" cy="42" r={R} fill="none" stroke={C.border} strokeWidth="7"/>
              {weekPct>0&&<circle cx="42" cy="42" r={R} fill="none" stroke={color} strokeWidth="7"
                strokeDasharray={`${dash} ${gap}`} strokeDashoffset={offset} strokeLinecap="round"/>}
              {weekDone>=weekTarget
                ? <Fragment>
                    <text x="42" y="36" textAnchor="middle" dominantBaseline="central"
                      fontSize="16" fill={color} fontWeight="800">✓</text>
                    <text x="42" y="52" textAnchor="middle" dominantBaseline="central"
                      fontSize="9" fill={color} fontWeight="700">Week done!</text>
                  </Fragment>
                : <Fragment>
                    <text x="42" y="38" textAnchor="middle" dominantBaseline="central"
                      fontSize="20" fill={C.text} fontWeight="900">{weekDone}</text>
                    <text x="42" y="54" textAnchor="middle" dominantBaseline="central"
                      fontSize="9" fill={C.textMuted}>of {weekTarget} days</text>
                  </Fragment>
              }
            </svg>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:9, color:C.textMuted, fontFamily:FONT_DISPLAY, letterSpacing:1, marginBottom:5 }}>THIS WEEK</div>
              <div style={{ display:"flex", gap:3, marginBottom:10 }}>
                {last7.map(({ds,isToday})=>(
                  <div key={ds} style={{ flex:1, height:7, borderRadius:4,
                    background:checkIns.includes(ds)?color:C.surfaceAlt,
                    outline:isToday?`1.5px solid ${color}`:"none", outlineOffset:1 }}/>
                ))}

              <div style={{ display:"flex", justifyContent:"space-between" }}>

                    {streak>0?`🔥 ${streak} ${streak===1?"day":"days"}`:"—"}

                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:9, color:C.textMuted, fontFamily:FONT_DISPLAY, letterSpacing:1 }}>BEST</div>
                  <div style={{ fontSize:15, fontWeight:900, color:C.textSec, fontFamily:FONT_DISPLAY }}>
                    {best} {best===1?"day":"days"}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* 30-day dot grid */}
          <div style={{ fontSize:9, fontWeight:800, letterSpacing:1.5, color:C.textMuted,
            fontFamily:FONT_DISPLAY, marginBottom:6 }}>LAST 30 DAYS</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:12 }}>
            {dots.map(dot=>(

          {/* Did it / Undo button */}
          <button onClick={e=>{e.stopPropagation();onCheckIn(habit.id);}}

            {doneToday
              ? <Fragment><span style={{ fontSize:14, color:"#ffffff", fontFamily:FONT_DISPLAY, fontWeight:900, letterSpacing:0.5 }}>DONE</span><span style={{ fontSize:16, marginLeft:6 }}>✅</span><span style={{ fontSize:10, color:"rgba(255,255,255,0.6)", fontFamily:FONT_DISPLAY, marginLeft:6 }}>· undo</span></Fragment>
              : <Fragment>

      )}
    </div>
  );
};

  const moveHabitDown = (idx) => { setHabits(prev=>{ if(idx>=prev.length-1) return prev; const n=[...prev]; [n[idx],n[idx+1]]=[n[idx+1],n[idx]]; return n; }); };

  const [editHabit,   setEditHabit]   = useState(null);

                    {/* Expanded: notes */}
                    {isOpen&&h.notes&&(
                      <div style={{ fontSize:11, color:C.textSec, lineHeight:1.5, marginBottom:10,
                        background:C.surfaceAlt, borderRadius:8, padding:"8px 10px",
                        border:`1px solid ${C.border}` }}>
                        {h.notes}
                      </div>
                    )}

                    {/* Edit button */}
