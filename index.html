  const moveFreestyleUp   = (idx) => { setToUse(prev=>{ const unc=prev.filter(i=>!i.checked); const chk=prev.filter(i=>i.checked); if(idx===0) return prev; const n=[...unc]; [n[idx],n[idx-1]]=[n[idx-1],n[idx]]; return [...n,...chk]; }); };
  const moveFreestyleDown = (idx, len) => { setToUse(prev=>{ const unc=prev.filter(i=>!i.checked); const chk=prev.filter(i=>i.checked); if(idx>=unc.length-1) return prev; const n=[...unc]; [n[idx],n[idx+1]]=[n[idx+1],n[idx]]; return [...n,...chk]; }); };
  const reset      = ()  => { setToUse([]); setConfirmReset(false); };

  // Picker helpers
  const isInList   = (refId) => !!toUse.find(i=>i.refId===refId);
  const isSelected = (refId) => pickerSel.includes(refId);
  const togglePick = (refId) => setPickerSel(p => p.includes(refId) ? p.filter(x=>x!==refId) : [...p,refId]);
  const confirmPick = () => {
    const now = Date.now();
    const toAddMoves = pickerSel.filter(id=>moves.find(m=>m.id===id) && !toUse.find(i=>i.refId===id));
    const toAddSets  = pickerSel.filter(id=>sets.find(s=>s.id===id)  && !toUse.find(i=>i.refId===id));
    const newItems = [
      ...toAddMoves.map((id,i)=>({ id:now+i,       refId:id, type:"move", checked:false })),
      ...toAddSets.map((id,i) =>({ id:now+1000+i,  refId:id, type:"set",  checked:false })),
    ];
    if (newItems.length) setToUse(p=>[...p,...newItems]);
    setPickerOpen(false); setPickerSel([]);
  };
  const openPicker = () => { setPickerSearch(""); setPickerSel([]); setExpCats({}); setPickerOpen(true); };
  useEffect(()=>{ if(onAddTrigger) openPicker(); },[onAddTrigger]);

  // Category select helpers
  const catMoveIds   = cat => moves.filter(m=>m.category===cat).map(m=>m.id);
  const catAvail     = cat => catMoveIds(cat).filter(mid=>!isInList(mid));
  const isCatAll     = cat => catAvail(cat).length > 0 && catAvail(cat).every(mid=>pickerSel.includes(mid));
  const isCatPartial = cat => catAvail(cat).some(mid=>pickerSel.includes(mid)) && !isCatAll(cat);
  const toggleCat    = cat => {
    const avail = catAvail(cat);
    if (isCatAll(cat)) setPickerSel(p=>p.filter(id=>!avail.includes(id)));
    else setPickerSel(p=>[...new Set([...p, ...avail])]);
  };
  const allAvailMoveIds = moves.filter(m=>!isInList(m.id)).map(m=>m.id);
  const allAvailSetIds  = sets.filter(s=>!isInList(s.id)).map(s=>s.id);
  const allAvailIds = [...allAvailMoveIds, ...allAvailSetIds];
  const isAllSel    = allAvailIds.length > 0 && allAvailIds.every(id=>pickerSel.includes(id));
  const isAllPart   = allAvailIds.some(id=>pickerSel.includes(id)) && !isAllSel;
  const toggleAll   = () => { if(isAllSel) setPickerSel([]); else setPickerSel(allAvailIds); };

  const q = pickerSearch.toLowerCase().trim();
  const filteredMoves = q ? moves.filter(m=>m.name.toLowerCase().includes(q)||m.category.toLowerCase().includes(q)) : null;

  const unchecked = toUse.filter(i=>!i.checked);
  const checked   = toUse.filter(i=>i.checked);

  return (
    <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column", position:"relative" }}>

      {/* Header */}
      <div style={{ padding:"8px 12px", borderBottom:`1px solid ${C.borderLight}`, background:C.surface,
        flexShrink:0, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <span style={{ fontSize:12, fontWeight:800, letterSpacing:2, color:C.textMuted, fontFamily:FONT_DISPLAY }}>
          {t("toUse")} <span style={{fontWeight:400, letterSpacing:0, fontSize:11}}>· {unchecked.length} left · {checked.length} used</span>
        </span>
        <div style={{ display:"flex", alignItems:"center", gap:5 }}>
          {/* Reset */}
          <button onClick={()=>setConfirmReset(true)} disabled={toUse.length===0}
            style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, cursor:"pointer",
              color:C.textMuted, padding:"5px 11px", fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700,
              display:"flex", alignItems:"center", opacity:toUse.length===0?0.35:1 }}
            title="Reset list">↺</button>
          {/* Load */}
          <button onClick={()=>setShowLoadList(true)}
            style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, cursor:"pointer",
              color:C.textMuted, padding:"5px 11px", fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700,
              display:"flex", alignItems:"center", gap:4 }}
            title="Load a saved list">
            📂 Load
            {savedLists.length>0&&<span style={{ background:C.accent, color:C.bg, borderRadius:8,
              padding:"0 5px", fontSize:10, fontFamily:FONT_DISPLAY }}>{savedLists.length}</span>}
          </button>
          {/* Save */}
          <button onClick={()=>{ setSaveListName(""); setShowSaveList(true); }}
            style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, cursor:"pointer",
              color:C.textMuted, padding:"5px 11px", fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700,
              display:"flex", alignItems:"center", gap:4 }}
            title="Save current list">
            💾 Save
          </button>
          {/* Reorder */}
          <button onClick={()=>setReorderMode(r=>!r)}
            style={{ background:reorderMode?C.accent:"none", border:`1px solid ${reorderMode?C.accent:C.border}`, borderRadius:6, cursor:"pointer",
              color:reorderMode?C.bg:C.textMuted, padding:"5px 11px", fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700 }}>
            {reorderMode?"DONE":"⇅"}
          </button>
        </div>
      </div>

      {/* List */}
      <div style={{ flex:1, overflow:"auto", paddingBottom:80 }}
        onDragOver={e=>{ e.preventDefault(); setDropping(true); }}
        onDragLeave={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setDropping(false); }}
        onDrop={e=>{ e.preventDefault(); setDropping(false); if(dragging) addToUse(dragging,"move"); setDragging(null); }}>

        {dropping&&(
          <div style={{ margin:10, padding:14, border:`2px dashed ${C.accent}`, borderRadius:10, textAlign:"center", color:C.accent, fontSize:13, fontWeight:700 }}>
            Drop to add ↓
          </div>
        )}

        {toUse.length===0&&!dropping&&(
          <div style={{ textAlign:"center", padding:40, color:C.textMuted }}>
            <div style={{ fontSize:28, marginBottom:8 }}>🎯</div>
            <p style={{ fontSize:13 }}>Tap + below to build your freestyle list</p>
          </div>
        )}

        <div>
          {unchecked.map((item,idx)=>{
            const isSet = item.type==="set";
            const m = isSet ? getSetById(item.refId) : getMoveById(item.refId);
            if(!m) return null;
            const dotColor = isSet ? (m.color||C.accent) : masteryColor(m.mastery);
            return (
              <div key={item.id}
                style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px",
                  borderBottom:`1px solid ${C.borderLight}`, background:C.bg }}>
                {!reorderMode&&<button onClick={()=>toggle(item.id)}
                  style={{ width:20, height:20, borderRadius:4, border:`2px solid ${C.accent}`,
                    background:"transparent", cursor:"pointer", flexShrink:0,
                    display:"flex", alignItems:"center", justifyContent:"center", padding:0 }}>
                </button>}
                <div style={{ width:7, height:7, borderRadius: isSet?"2px":"50%", background:dotColor, flexShrink:0 }}/>
                <span style={{ flex:1, fontSize:13, color:C.text, fontFamily:FONT_BODY }}>{m.name}</span>
                {isSet && <span style={{ fontSize:9, fontWeight:800, letterSpacing:1, color:C.textMuted, fontFamily:FONT_DISPLAY, background:C.surface, borderRadius:4, padding:"2px 5px" }}>SET</span>}
                {!isSet && showMastery&&<span style={{ fontSize:11, color:masteryColor(m.mastery), fontWeight:700, flexShrink:0 }}>{m.mastery}%</span>}
                {!reorderMode&&<button onClick={()=>removeItem(item.id)}
                  style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex", flexShrink:0 }}>
                  <Ic n="x" s={11} c={C.textMuted}/>
                </button>}
                {reorderMode&&<div style={{ display:"flex", flexDirection:"column", gap:2, flexShrink:0 }}>
                  <button onClick={()=>moveFreestyleUp(idx)} disabled={idx===0}
                    style={{ width:26, height:26, borderRadius:6, border:`1px solid ${C.border}`, background:C.bg,
                      cursor:idx===0?"default":"pointer", color:idx===0?C.border:C.accent,
                      fontSize:14, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>▲</button>
                  <button onClick={()=>moveFreestyleDown(idx, unchecked.length)} disabled={idx===unchecked.length-1}
                    style={{ width:26, height:26, borderRadius:6, border:`1px solid ${C.border}`, background:C.bg,
                      cursor:idx===unchecked.length-1?"default":"pointer", color:idx===unchecked.length-1?C.border:C.accent,
                      fontSize:14, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>▼</button>
                </div>}
              </div>
            );
          })}
        </div>

        {checked.length>0&&(
          <div>
            <button onClick={()=>setUsedOpen(o=>!o)}
              style={{ width:"100%", background:C.surfaceAlt, border:"none", borderTop:`1px solid ${C.border}`,
                borderBottom:`1px solid ${C.border}`, cursor:"pointer",
                display:"flex", alignItems:"center", gap:6, padding:"8px 12px", color:C.textMuted }}>
              <Ic n={usedOpen?"chevD":"chevR"} s={12} c={C.textMuted}/>
              <span style={{ fontSize:12, fontWeight:800, letterSpacing:1.5, fontFamily:FONT_DISPLAY }}>USED · {checked.length}</span>
            </button>
            {usedOpen && checked.map(item=>{
              const isSet = item.type==="set";
              const m = isSet ? getSetById(item.refId) : getMoveById(item.refId);
              if(!m) return null;
              const dotColor = isSet ? (m.color||C.accent) : masteryColor(m.mastery);
              return (
                <div key={item.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px",
                  borderBottom:`1px solid ${C.borderLight}`, background:C.surfaceAlt, opacity:0.6 }}>
                  <button onClick={()=>toggle(item.id)}
                    style={{ width:20, height:20, borderRadius:4, border:`2px solid ${C.textMuted}`,
                      background:C.textMuted, cursor:"pointer", flexShrink:0,
                      display:"flex", alignItems:"center", justifyContent:"center", padding:0 }}>
                    <Ic n="check" s={12} c={C.bg}/>
                  </button>
                  <div style={{ width:7, height:7, borderRadius: isSet?"2px":"50%", background:dotColor, flexShrink:0 }}/>
                  <span style={{ flex:1, fontSize:13, color:C.textMuted, fontFamily:FONT_BODY, textDecoration:"line-through" }}>{m.name}</span>
                  {isSet && <span style={{ fontSize:9, fontWeight:800, letterSpacing:1, color:C.textMuted, fontFamily:FONT_DISPLAY, background:C.surface, borderRadius:4, padding:"2px 5px" }}>SET</span>}
                  {!isSet && showMastery&&<span style={{ fontSize:11, color:masteryColor(m.mastery), fontWeight:700, flexShrink:0 }}>{m.mastery}%</span>}
                  <button onClick={()=>removeItem(item.id)}
                    style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex", flexShrink:0 }}>
                    <Ic n="x" s={11} c={C.textMuted}/>
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </div>



      {/* ── Notion-style Move Picker overlay ── */}
      {pickerOpen&&(
        <div style={{ position:"absolute", inset:0, background:C.bg, zIndex:600, display:"flex", flexDirection:"column" }}>
          {/* Picker header */}
          <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 12px",
            background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
            <input value={pickerSearch} onChange={e=>setPickerSearch(e.target.value)}
              placeholder={t("searchMoves")}
              style={{ flex:1, background:C.bg, border:`1px solid ${C.border}`, borderRadius:8,
                padding:"7px 10px", color:C.text, fontSize:13, fontFamily:FONT_BODY, outline:"none" }}/>
            <button onClick={()=>{ setPickerOpen(false); setPickerSel([]); }}
              style={{ background:"none", border:"none", cursor:"pointer", padding:4 }}>
              <Ic n="x" s={16} c={C.textMuted}/>
            </button>
          </div>
          {/* Select All row */}
          {!pickerSearch&&(
            <div onClick={toggleAll}
              style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 14px",
                borderBottom:`2px solid ${C.border}`, background:C.surfaceAlt, cursor:"pointer" }}>
              <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                border:`2px solid ${isAllSel||isAllPart ? C.accent : C.border}`,
                background: isAllSel ? C.accent : "transparent",
                display:"flex", alignItems:"center", justifyContent:"center" }}>
                {isAllSel && <Ic n="check" s={11} c="#fff"/>}
                {isAllPart && <div style={{ width:8, height:2, background:C.accent, borderRadius:1 }}/>}
              </div>
              <span style={{ fontSize:12, fontWeight:800, letterSpacing:1.5, color:C.brownMid, fontFamily:FONT_DISPLAY }}>
                SELECT ALL
              </span>
              <span style={{ fontSize:11, color:C.textMuted, marginLeft:"auto" }}>
                {allAvailIds.length} available
              </span>
            </div>
          )}

          {/* Picker list */}
          <div style={{ flex:1, overflow:"auto", padding:"8px 0" }}>
            {(filteredMoves || allCats.map(()=>null)).length===0&&(
              <div style={{ padding:24, textAlign:"center", color:C.textMuted, fontSize:13 }}>No moves found</div>
            )}
            {filteredMoves ? (
              // flat search results
              filteredMoves.map(m=>{
                const inList   = isInList(m.id);
                const selected = isSelected(m.id);
                return (
                  <div key={m.id} onClick={()=>{ if(!inList) togglePick(m.id); }}
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 14px",
                      borderBottom:`1px solid ${C.borderLight}`,
                      background: selected ? `${C.accent}12` : "transparent",
                      cursor: inList ? "default" : "pointer", opacity: inList ? 0.45 : 1 }}>
                    <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                      border:`2px solid ${selected?C.accent:C.border}`,
                      background: selected ? C.accent : "transparent",
                      display:"flex", alignItems:"center", justifyContent:"center" }}>
                      {selected&&<Ic n="check" s={11} c="#fff"/>}
                      {inList&&!selected&&<Ic n="check" s={11} c={C.textMuted}/>}
                    </div>
                    <div style={{ width:7, height:7, borderRadius:"50%", background:masteryColor(m.mastery), flexShrink:0 }}/>
                    <span style={{ flex:1, fontSize:13, color:C.text, fontFamily:FONT_BODY }}>{m.name}</span>
                    <span style={{ fontSize:10, color:C.textMuted, fontFamily:FONT_DISPLAY }}>{m.category}</span>
                    {showMastery&&<span style={{ fontSize:11, color:masteryColor(m.mastery), fontWeight:700 }}>{m.mastery}%</span>}
                  </div>
                );
              })
            ) : (
              // grouped by category + sets section
              allCats.map(cat=>{
                const catMoves = moves.filter(m=>m.category===cat);
                const isExp = expCats[cat] !== false;
                const col = CAT_COLORS[cat]||C.accent;
                return (
                  <div key={cat}>
                    <div style={{ display:"flex", alignItems:"center", background:C.surface,
                      borderBottom:`1px solid ${C.borderLight}` }}>
                      {/* Category checkbox */}
                      <div onClick={()=>toggleCat(cat)}
                        style={{ padding:"7px 6px 7px 14px", cursor:"pointer", display:"flex", alignItems:"center" }}>
                        <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                          border:`2px solid ${isCatAll(cat)||isCatPartial(cat) ? C.accent : C.border}`,
                          background: isCatAll(cat) ? C.accent : "transparent",
                          display:"flex", alignItems:"center", justifyContent:"center" }}>
                          {isCatAll(cat)     && <Ic n="check" s={11} c="#fff"/>}
                          {isCatPartial(cat) && <div style={{ width:8, height:2, background:C.accent, borderRadius:1 }}/>}
                        </div>
                      </div>
                      {/* Category expand button */}
                      <button onClick={()=>setExpCats(p=>({...p,[cat]:!isExp}))}
                        style={{ flex:1, display:"flex", alignItems:"center", gap:7, padding:"7px 14px 7px 4px",
                          background:"transparent", border:"none", cursor:"pointer", textAlign:"left" }}>
                        <div style={{ width:8, height:8, borderRadius:"50%", background:col, flexShrink:0 }}/>
                        <span style={{ flex:1, fontSize:12, fontWeight:800, letterSpacing:1, color:C.brownMid, fontFamily:FONT_DISPLAY }}>{cat}</span>
                        <span style={{ fontSize:10, color:C.textMuted }}>{catMoves.length}</span>
                        <Ic n={isExp?"chevD":"chevR"} s={11} c={C.textMuted}/>
                      </button>
                    </div>
                    {isExp && catMoves.map(m=>{
                      const inList   = isInList(m.id);
                      const selected = isSelected(m.id);
                      return (
                        <div key={m.id} onClick={()=>{ if(!inList) togglePick(m.id); }}
                          style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 14px 8px 28px",
                            borderBottom:`1px solid ${C.borderLight}`,
                            background: selected ? `${C.accent}12` : "transparent",
                            cursor: inList ? "default" : "pointer", opacity: inList ? 0.45 : 1 }}>
                          <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                            border:`2px solid ${selected?C.accent:C.border}`,
                            background: selected ? C.accent : "transparent",
                            display:"flex", alignItems:"center", justifyContent:"center" }}>
                            {selected&&<Ic n="check" s={11} c="#fff"/>}
                            {inList&&!selected&&<Ic n="check" s={11} c={C.textMuted}/>}
                          </div>
                          <div style={{ width:7, height:7, borderRadius:"50%", background:masteryColor(m.mastery), flexShrink:0 }}/>
                          <span style={{ flex:1, fontSize:13, color:C.text, fontFamily:FONT_BODY }}>{m.name}</span>
                          {showMastery&&<span style={{ fontSize:11, color:masteryColor(m.mastery), fontWeight:700 }}>{m.mastery}%</span>}
                        </div>
                      );
                    })}
                  </div>
                );
              })
            )}

            {/* ── SETS section (only in grouped view) ── */}
            {!filteredMoves && sets.length>0&&(
              <div>
                <div style={{ display:"flex", alignItems:"center", background:C.surfaceAlt,
                  borderTop:`2px solid ${C.border}`, borderBottom:`1px solid ${C.borderLight}` }}>
                  <div onClick={()=>{
                    const avail = sets.filter(s=>!isInList(s.id)).map(s=>s.id);
                    const allSel = avail.every(id=>pickerSel.includes(id));
                    if(allSel) setPickerSel(p=>p.filter(id=>!avail.includes(id)));
                    else setPickerSel(p=>[...new Set([...p,...avail])]);
                  }} style={{ padding:"7px 6px 7px 14px", cursor:"pointer", display:"flex", alignItems:"center" }}>
                    {(()=>{
                      const avail = sets.filter(s=>!isInList(s.id)).map(s=>s.id);
                      const allS = avail.length>0 && avail.every(id=>pickerSel.includes(id));
                      const partS = avail.some(id=>pickerSel.includes(id)) && !allS;
                      return (
                        <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                          border:`2px solid ${allS||partS?C.accent:C.border}`,
                          background:allS?C.accent:"transparent",
                          display:"flex", alignItems:"center", justifyContent:"center" }}>
                          {allS  && <Ic n="check" s={11} c="#fff"/>}
                          {partS && <div style={{ width:8, height:2, background:C.accent, borderRadius:1 }}/>}
                        </div>
                      );
                    })()}
                  </div>
                  <button onClick={()=>setExpCats(p=>({...p,"__sets__":p["__sets__"]===false?true:false}))}
                    style={{ flex:1, display:"flex", alignItems:"center", gap:7, padding:"7px 14px 7px 4px",
                      background:"transparent", border:"none", cursor:"pointer", textAlign:"left" }}>
                    <span style={{ fontSize:12, fontWeight:800, letterSpacing:1.5, color:C.brownMid, fontFamily:FONT_DISPLAY }}>SETS</span>
                    <span style={{ fontSize:10, color:C.textMuted, marginLeft:"auto" }}>{sets.length}</span>
                    <Ic n={expCats["__sets__"]===false?"chevR":"chevD"} s={11} c={C.textMuted}/>
                  </button>
                </div>
                {expCats["__sets__"]!==false && sets.map(s=>{
                  const inList   = isInList(s.id);
                  const selected = isSelected(s.id);
                  return (
                    <div key={s.id} onClick={()=>{ if(!inList) togglePick(s.id); }}
                      style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 14px",
                        borderBottom:`1px solid ${C.borderLight}`,
                        background: selected ? `${C.accent}12` : "transparent",
                        cursor: inList ? "default" : "pointer", opacity: inList ? 0.45 : 1 }}>
                      <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                        border:`2px solid ${selected?C.accent:C.border}`,
                        background: selected ? C.accent : "transparent",
                        display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {selected&&<Ic n="check" s={11} c="#fff"/>}
                        {inList&&!selected&&<Ic n="check" s={11} c={C.textMuted}/>}
                      </div>
                      <div style={{ width:7, height:7, borderRadius:2, background:s.color||C.accent, flexShrink:0 }}/>
                      <span style={{ flex:1, fontSize:13, color:C.text, fontFamily:FONT_BODY }}>{s.name}</span>
                      <span style={{ fontSize:9, fontWeight:800, letterSpacing:1, color:C.textMuted, fontFamily:FONT_DISPLAY,
                        background:C.surface, borderRadius:4, padding:"2px 5px" }}>
                        {(s.moveIds||[]).length} moves
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Picker footer */}
          <div style={{ padding:"10px 14px", borderTop:`1px solid ${C.border}`, background:C.surface, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span style={{ fontSize:12, color:C.textMuted }}>
              {pickerSel.length>0 ? `${pickerSel.length} selected` : t("tapToSelect")}
            </span>
            <button onClick={confirmPick} disabled={pickerSel.length===0}
              style={{ padding:"8px 18px", background:pickerSel.length>0?C.accent:C.border, border:"none",
                borderRadius:8, color:C.bg, fontSize:13, fontWeight:800, fontFamily:FONT_DISPLAY,
                letterSpacing:1, cursor:pickerSel.length>0?"pointer":"default" }}>
              DONE {pickerSel.length>0?`(${pickerSel.length})`:""}
            </button>
          </div>
        </div>
      )}

      {/* Save List Modal */}
      {showSaveList&&(
        <Modal title="SAVE FREESTYLE LIST" onClose={()=>setShowSaveList(false)}>
          <p style={{ fontSize:13, color:C.textSec, marginBottom:14, lineHeight:1.6 }}>
            Saves your current list of {toUse.length} move{toUse.length!==1?"s":""} to reuse later.
          </p>
          <div style={{ marginBottom:20 }}>
            <label style={lbl()}>LIST NAME *</label>
            <input autoFocus value={saveListName} onChange={e=>setSaveListName(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") saveList(); }}
              placeholder="e.g. Battle Set, Warm-Up Routine…"
              style={{ width:"100%", background:C.surface, border:`1.5px solid ${C.accent}`, borderRadius:8,
                padding:"9px 12px", color:C.text, fontSize:14, outline:"none",
                fontFamily:FONT_BODY, boxSizing:"border-box" }}/>
          </div>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn variant="secondary" onClick={()=>setShowSaveList(false)}>Cancel</Btn>
            <Btn onClick={saveList} disabled={!saveListName.trim()}>💾 Save List</Btn>
          </div>
        </Modal>
      )}

      {/* Load List Modal */}
      {showLoadList&&!confirmLoadList&&!confirmDeleteList&&(
        <Modal title="LOAD FREESTYLE LIST" onClose={()=>setShowLoadList(false)}>
          {savedLists.length===0 ? (
            <div style={{ textAlign:"center", padding:"24px 0", color:C.textMuted }}>
              <div style={{ fontSize:28, marginBottom:8 }}>📂</div>
              <div style={{ fontSize:13, fontWeight:700, fontFamily:FONT_DISPLAY, marginBottom:4 }}>No saved lists yet</div>
              <div style={{ fontSize:12 }}>Build a list then tap 💾 Save to store it for later.</div>
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              <p style={{ fontSize:12, color:C.textMuted, marginBottom:4, lineHeight:1.5 }}>
                Tap a list to load it. Your current list will be replaced.
              </p>
              {savedLists.map(entry=>(
                <div key={entry.id}
                  style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px",
                    background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, cursor:"pointer" }}
                  onClick={()=>setConfirmLoadList(entry)}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontWeight:800, fontSize:14, color:C.text, fontFamily:FONT_DISPLAY, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{entry.name}</div>
                    <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>
                      {entry.items.length} move{entry.items.length!==1?"s":""} · Saved {entry.savedAt}
                    </div>
                  </div>
                  <button onClick={e=>{ e.stopPropagation(); setConfirmDeleteList(entry); }}
                    style={{ background:"none", border:"none", cursor:"pointer", padding:6, display:"flex" }}>
                    <Ic n="trash" s={14} c={C.accent}/>
                  </button>
                </div>
              ))}
            </div>
          )}
          <div style={{ display:"flex", justifyContent:"flex-end", marginTop:16 }}>
            <Btn variant="secondary" onClick={()=>setShowLoadList(false)}>Close</Btn>
          </div>
        </Modal>
      )}

      {/* Confirm Load */}
      {confirmLoadList&&(
        <Modal title="LOAD LIST" onClose={()=>setConfirmLoadList(null)}>
          <p style={{ fontSize:13, color:C.textSec, marginBottom:8, lineHeight:1.6 }}>
            Load <strong style={{color:C.text}}>{confirmLoadList.name}</strong>?
          </p>
          <p style={{ fontSize:12, color:C.accent, fontWeight:700, marginBottom:20 }}>
            ⚠️ Your current list will be replaced.
          </p>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn variant="secondary" onClick={()=>setConfirmLoadList(null)}>Cancel</Btn>
            <Btn variant="danger" onClick={()=>loadList(confirmLoadList)}>Yes, Load</Btn>
          </div>
        </Modal>
      )}

      {/* Confirm Delete List */}
      {confirmDeleteList&&(
        <Modal title="DELETE LIST" onClose={()=>setConfirmDeleteList(null)}>
          <p style={{ fontSize:13, color:C.textSec, marginBottom:8, lineHeight:1.6 }}>
            Delete <strong style={{color:C.text}}>{confirmDeleteList.name}</strong>?
          </p>
          <p style={{ fontSize:12, color:C.accent, fontWeight:700, marginBottom:20 }}>⚠️ This cannot be undone.</p>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn variant="secondary" onClick={()=>setConfirmDeleteList(null)}>Cancel</Btn>
            <Btn variant="danger" onClick={()=>deleteList(confirmDeleteList.id)}>Delete</Btn>
          </div>
        </Modal>
      )}

      {/* Confirm reset modal */}
      {confirmReset&&(
        <Modal title="RESET LIST" onClose={()=>setConfirmReset(false)}>
          <p style={{ color:C.textSec, marginBottom:20, lineHeight:1.6 }}>
            This will clear all <strong style={{color:C.text}}>{toUse.length} moves</strong> from your freestyle list. This cannot be undone.
          </p>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn variant="secondary" onClick={()=>setConfirmReset(false)}>{t("cancel")}</Btn>
            <Btn variant="danger" onClick={reset}>Reset</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};
const EditRoundView = ({ round, onSave, onClose, getMove, getSet, setPickerEntry, setPickerSearch, setPickerSel, showMoveCount }) => {
  const t = useT();
  const { C } = useSettings();
  const [localRound, setLocalRound] = useState({...round, entries: round.entries || []});
  const [localExpEntries, setLocalExpEntries] = useState({});
  const [renaming, setRenaming] = useState(null);
  const [renameVal, setRenameVal] = useState("");
  const itemDragRef = useRef(null);
  const [itemDragOver, setItemDragOver] = useState(null);
  const [confirmDeleteEntry, setConfirmDeleteEntry] = useState(null);

  const save = () => {
    onSave(round.id, { name:localRound.name, color:localRound.color, notes:localRound.notes, entries:localRound.entries });
    onClose();
  };

  const localAddEntry = () => {
    const n = (localRound.entries||[]).length + 1;
    setLocalRound(r => ({...r, entries:[...(r.entries||[]), { id:Date.now(), name:`Entry ${n}`, items:[] }]}));
  };
  const localRemoveEntry = eid => setLocalRound(r => ({...r, entries:(r.entries||[]).filter(e=>e.id!==eid)}));
  const localAddItems = (eid, newItems) => setLocalRound(r => ({...r, entries:(r.entries||[]).map(e=>{
    if(e.id!==eid) return e;
    const ex = new Set((e.items||[]).map(i=>i.type+":"+i.refId));
    return {...e, items:[...(e.items||[]), ...newItems.filter(i=>!ex.has(i.type+":"+i.refId))]};
  })}));
  const localRemoveItem = (eid, idx) => setLocalRound(r => ({...r, entries:(r.entries||[]).map(e=>
    e.id!==eid?e:{...e,items:(e.items||[]).filter((_,i)=>i!==idx)}
  )}));
  const localReorder = (eid, fromIdx, toIdx) => setLocalRound(r => ({...r, entries:(r.entries||[]).map(e=>{
    if(e.id!==eid) return e;
    const items=[...(e.items||[])];
    const [moved]=items.splice(fromIdx,1);
    const adj = fromIdx<toIdx?toIdx-1:toIdx;
    items.splice(adj,0,moved);
    return {...e,items};
  })}));
  const localRenameEntry = (eid, name) => setLocalRound(r => ({...r, entries:(r.entries||[]).map(e=>e.id===eid?{...e,name}:e)}));
  const findLocalDupes = (type, refId, currentEid) => {
    const found = [];
    (localRound.entries||[]).forEach(e => {
      if(e.id!==currentEid && (e.items||[]).some(i=>i.type===type&&i.refId===refId)) found.push(e.name);
    });
    return found;
  };

  return (
    <div style={{ position:"absolute", inset:0, background:C.bg, zIndex:500, display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px", background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <button onClick={save} style={{ background:"none", border:"none", cursor:"pointer", color:C.accent, fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700, padding:0 }}>{`← ${t("save")}`}</button>
        <div style={{ width:10, height:10, borderRadius:"50%", background:localRound.color||C.accent, flexShrink:0 }}/>
        <span style={{ flex:1, fontWeight:900, fontSize:15, letterSpacing:1.5, color:C.brown, fontFamily:FONT_DISPLAY }}>{localRound.name}</span>
        <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", padding:2 }}><Ic n="x" s={16} c={C.textMuted}/></button>
      </div>
      {/* Round meta */}
      <div style={{ padding:"10px 14px", borderBottom:`1px solid ${C.borderLight}`, flexShrink:0, background:C.surface }}>
        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:8 }}>
          <input value={localRound.name} onChange={e=>setLocalRound(r=>({...r,name:e.target.value}))}
            style={{ flex:1, background:C.bg, border:`1px solid ${C.border}`, borderRadius:7, padding:"7px 10px",
              color:C.text, fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700, outline:"none" }}/>
        </div>
        <textarea value={localRound.notes||""} onChange={e=>setLocalRound(r=>({...r,notes:e.target.value}))}
          placeholder={t("notesRound")} rows={2}
          style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:7, padding:"7px 10px",
            color:C.text, fontSize:12, fontFamily:FONT_BODY, outline:"none", resize:"none", boxSizing:"border-box" }}/>
      </div>
      {/* Entries list */}
      <div style={{ flex:1, overflow:"auto", padding:"10px 12px" }}>
        {(localRound.entries||[]).map((entry) => {
          const isOpen = localExpEntries[entry.id] !== false;
          return (
            <div key={entry.id} style={{ marginBottom:10, borderRadius:10, border:`1.5px solid ${C.border}`, overflow:"hidden", background:C.bg }}>
              <div style={{ display:"flex", alignItems:"center", padding:"8px 10px", background:C.surface, gap:6 }}>
                <button onClick={()=>setLocalExpEntries(p=>({...p,[entry.id]:!isOpen}))}
                  style={{ background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", flexShrink:0 }}>
                  <Ic n={isOpen?"chevD":"chevR"} s={12} c={C.textMuted}/>
                </button>
                {renaming===entry.id ? (
                  <input autoFocus value={renameVal}
                    onChange={e=>setRenameVal(e.target.value)}
                    onBlur={()=>{ if(renameVal.trim()) localRenameEntry(entry.id,renameVal.trim()); setRenaming(null); }}
                    onKeyDown={e=>{ if(e.key==="Enter"){ if(renameVal.trim()) localRenameEntry(entry.id,renameVal.trim()); setRenaming(null); } }}
                    style={{ flex:1, background:C.bg, border:`1px solid ${C.accent}`, borderRadius:5, padding:"2px 6px",
                      color:C.text, fontSize:12, fontFamily:FONT_DISPLAY, fontWeight:700, outline:"none" }}/>
                ) : (
                  <span onDoubleClick={()=>{ setRenaming(entry.id); setRenameVal(entry.name); }}
                    style={{ flex:1, fontSize:12, fontWeight:800, color:C.brownMid, fontFamily:FONT_DISPLAY, letterSpacing:0.8, cursor:"pointer" }}
                    title={t("doubleTapRename")}>{entry.name}</span>
                )}
                {showMoveCount&&<span style={{ fontSize:10, color:C.textMuted }}>{(entry.items||[]).length}</span>}
                <button onClick={()=>{ setPickerEntry({roundId:localRound.id,entryId:entry.id,applyLocal:localAddItems}); setPickerSearch(""); setPickerSel([]); }}
                  style={{ background:C.accent, border:"none", borderRadius:6, cursor:"pointer",
                    color:C.bg, padding:"2px 7px", fontSize:10, fontFamily:FONT_DISPLAY, fontWeight:700, display:"flex", alignItems:"center", gap:3 }}>
                  <Ic n="plus" s={9} c={C.bg}/> ADD
                </button>
                <button onClick={()=>setConfirmDeleteEntry(entry)}
                  style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex", flexShrink:0 }}>
                  <Ic n="x" s={13} c={C.accent}/>
                </button>
              </div>
              {isOpen && (
                <div style={{ padding:"4px 0" }}
                  onDragOver={e=>e.preventDefault()}
                  onDrop={e=>{ e.stopPropagation(); if(itemDragRef.current?.eid===entry.id) localReorder(entry.id, itemDragRef.current.idx, (entry.items||[]).length); }}>
                  {(entry.items||[]).length===0&&(
                    <div style={{ padding:"8px 14px", fontSize:11, color:C.textMuted, fontStyle:"italic" }}>Empty — tap ADD to fill this entry</div>
                  )}
                  {(entry.items||[]).map((item,idx)=>{
                    const label = item.type==="move" ? getMove(item.refId)?.name : getSet(item.refId)?.name;
                    if(!label) return null;
                    const dupes = findLocalDupes(item.type, item.refId, entry.id);
                    const isDragging = itemDragRef.current?.eid===entry.id&&itemDragRef.current?.idx===idx;
                    const isOver = itemDragOver?.eid===entry.id&&itemDragOver?.idx===idx;
                    return (
                      <div key={idx}
                        draggable
                        onDragStart={e=>{ e.stopPropagation(); itemDragRef.current={eid:entry.id,idx}; }}
                        onDragEnd={()=>{ itemDragRef.current=null; setItemDragOver(null); }}
                        onDragOver={e=>{ e.preventDefault(); e.stopPropagation(); if(itemDragRef.current?.eid===entry.id) setItemDragOver({eid:entry.id,idx}); }}
                        onDrop={e=>{ e.stopPropagation(); if(itemDragRef.current?.eid===entry.id) { localReorder(entry.id,itemDragRef.current.idx,idx); itemDragRef.current=null; setItemDragOver(null); } }}
                        style={{ display:"flex", alignItems:"center", gap:7, padding:"7px 12px",
                          borderTop:`1px solid ${C.borderLight}`,
                          background: isOver ? `${C.accent}0e` : dupes.length>0 ? `${C.yellow}10` : "transparent",
                          opacity: isDragging ? 0.4 : 1 }}>
                        <div style={{ width:7, height:7, borderRadius:"50%", flexShrink:0,
                          background: item.type==="set" ? (getSet(item.refId)?.color||C.blue) : masteryColor(getMove(item.refId)?.mastery||0) }}/>
                        <span style={{ flex:1, fontSize:12, color:C.text }}>{label}</span>
                        {item.type==="set"&&<span style={{ fontSize:9, background:`${C.blue}22`, color:C.blue, padding:"1px 5px", borderRadius:4, fontFamily:FONT_DISPLAY, fontWeight:700 }}>SET</span>}
                        {dupes.length>0&&(
                          <span style={{ fontSize:9, color:C.yellow, fontWeight:700, fontFamily:FONT_DISPLAY }} title={`Also in: ${dupes.join(", ")}`}>
                            also in {dupes[0]}
                          </span>
                        )}
                        <button onClick={()=>localRemoveItem(entry.id,idx)}
                          style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex", flexShrink:0 }}>
                          <Ic n="x" s={11} c={C.textMuted}/>
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
        <button onClick={localAddEntry}
          style={{ width:"100%", padding:"10px", background:"none", border:`1.5px dashed ${C.accent}`,
            borderRadius:10, cursor:"pointer", color:C.accent, fontSize:12,
            fontFamily:FONT_DISPLAY, fontWeight:700, letterSpacing:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
          <Ic n="plus" s={13} c={C.accent}/> ADD ENTRY
        </button>
      </div>
      {/* Save bar */}
      <div style={{ padding:"10px 14px", borderTop:`1px solid ${C.border}`, background:C.surface, flexShrink:0 }}>
        <button onClick={save}
          style={{ width:"100%", padding:"11px", background:C.accent, border:"none", borderRadius:8,
            color:C.bg, fontSize:13, fontWeight:900, fontFamily:FONT_DISPLAY, letterSpacing:1.5, cursor:"pointer" }}>
          SAVE ROUND
        </button>
      </div>

      {/* Delete entry confirmation */}
      {confirmDeleteEntry&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.55)", zIndex:600, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ background:C.bg, border:`1px solid ${C.border}`, borderRadius:14, width:"100%", maxWidth:300, padding:20, boxShadow:"0 24px 60px rgba(0,0,0,0.4)" }}>
            <div style={{ fontWeight:900, fontSize:14, letterSpacing:1.5, fontFamily:FONT_DISPLAY, color:C.brown, marginBottom:8 }}>DELETE ENTRY?</div>
            <p style={{ fontSize:13, color:C.textSec, marginBottom:16, lineHeight:1.5 }}>
              "<span style={{ color:C.text, fontWeight:700 }}>{confirmDeleteEntry.name}</span>" and its {(confirmDeleteEntry.items||[]).length} item{(confirmDeleteEntry.items||[]).length!==1?"s":""} will be removed.
            </p>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <button onClick={()=>setConfirmDeleteEntry(null)}
                style={{ padding:"8px 16px", borderRadius:8, border:`1px solid ${C.border}`, background:"none", color:C.textSec, fontSize:13, cursor:"pointer", fontFamily:FONT_BODY }}>
                Cancel
              </button>
              <button onClick={()=>{ localRemoveEntry(confirmDeleteEntry.id); setConfirmDeleteEntry(null); }}
                style={{ padding:"8px 16px", borderRadius:8, border:"none", background:C.accent, color:C.bg, fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:FONT_BODY }}>
                Delete
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const ReadyPage = ({ moves, sets, setSets, rounds, setRounds, settings={}, onAddTrigger, onAddTrigger2=0, onSubTabChange }) => {
  const t = useT();
  const { C } = useSettings();
  const showMastery   = settings.showMastery  === true;
  const showMoveCount = settings.showMoveCount === true;
  const [battleTab, setBattleTab] = useState("plan");
  const setBattleTabAndNotify = (t) => { setBattleTab(t); if(onSubTabChange) onSubTabChange(t==="freestyle"?"freestyle":"plan"); };
  // Notify parent of initial sub-tab
  useEffect(()=>{ if(onSubTabChange) onSubTabChange("plan"); },[]);

  // ── PLAN sub-tab state ──────────────────────────────────────────────────────
  const [expRounds, setExpRounds] = useState({});
  const [expEntries, setExpEntries] = useState({});
  const [editRound, setEditRound] = useState(null);
  const [addingRound, setAddingRound] = useState(false);
  const [confirmRestore, setConfirmRestore] = useState(false);
  const [reorderRounds, setReorderRounds] = useState(false);
  const moveRoundUp   = (idx) => { if(idx===0) return; setRounds(prev=>{ const n=[...prev]; [n[idx],n[idx-1]]=[n[idx-1],n[idx]]; return n; }); };
  const moveRoundDown = (idx) => { setRounds(prev=>{ if(idx>=prev.length-1) return prev; const n=[...prev]; [n[idx],n[idx+1]]=[n[idx+1],n[idx]]; return n; }); };

  // ── Battle Templates ────────────────────────────────────────────────────────
  const [templates, setTemplates] = useState(() => {
    try { const s = localStorage.getItem("mb_templates"); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  useEffect(() => {
    try { localStorage.setItem("mb_templates", JSON.stringify(templates)); } catch {}
    const timer = setTimeout(() => {
      if (window.__MB_USER__?.uid && window.__MB_DB__) window.__MB_DB__.save(window.__MB_USER__.uid, "templates", templates);
    }, 1500);
    return () => clearTimeout(timer);
  }, [templates]);
  useEffect(() => {
    const handler = () => {
      const raw = localStorage.getItem("mb_templates");
      if (raw) { try { const p = JSON.parse(raw); setTemplates(p); } catch {} }
    };
    window.addEventListener("mb-auth-resolved", handler);
    return () => window.removeEventListener("mb-auth-resolved", handler);
  }, []);

  const [showSaveTemplate,  setShowSaveTemplate]  = useState(false);
  const [showLoadTemplate,  setShowLoadTemplate]  = useState(false);
  const [templateName,      setTemplateName]      = useState("");
  const [confirmLoadTpl,    setConfirmLoadTpl]    = useState(null); // template to load
  const [confirmDeleteTpl,  setConfirmDeleteTpl]  = useState(null); // template to delete

  const saveTemplate = () => {
    if (!templateName.trim()) return;
    const tpl = {
      id: Date.now(),
      name: templateName.trim(),
      savedAt: new Date().toLocaleDateString("en-AU", {day:"2-digit", month:"short", year:"numeric"}),
      rounds: JSON.parse(JSON.stringify(rounds)), // deep clone
    };
    setTemplates(p => [...p, tpl]);
    setTemplateName("");
    setShowSaveTemplate(false);
  };

  const loadTemplate = (tpl) => {
    setRounds(JSON.parse(JSON.stringify(tpl.rounds)));
    setConfirmLoadTpl(null);
    setShowLoadTemplate(false);
  };

  const deleteTemplate = (id) => {
    setTemplates(p => p.filter(t => t.id !== id));
    setConfirmDeleteTpl(null);
  };

  const [freestyleAddTick, setFreestyleAddTick] = useState(0);
  useEffect(()=>{
    if(!onAddTrigger) return;
    if(battleTab==="freestyle") setFreestyleAddTick(t=>t+1);
    else setAddingRound(true);
  },[onAddTrigger]);
  // onAddTrigger2 in Battle: "Add Move" opens freestyle picker regardless of sub-tab
  useEffect(()=>{
    if(!onAddTrigger2) return;
    setFreestyleAddTick(t=>t+1);
  },[onAddTrigger2]);

  // ── Vocab picker state (inside Edit Round) ──────────────────────────────────
  const [pickerEntry, setPickerEntry] = useState(null); // { roundId, entryId }
  const [pickerSearch, setPickerSearch] = useState("");
  const [pickerSel, setPickerSel] = useState([]);       // [{ type, refId }]

  // ── Sets detail modal ───────────────────────────────────────────────────────
  const [editSet, setEditSet] = useState(null);
  const [addingSet, setAddingSet] = useState(false);

  const allCats = [...new Set(moves.map(m => m.category))].sort();
  const getMove = id => moves.find(m => m.id === id);
  const getSet  = id => sets.find(s => s.id === id);

  // ── Round/Entry helpers ─────────────────────────────────────────────────────
  const addRound = (name, color=PRESET_COLORS[0], entryCount=1) => {
    const id = Date.now();
    const entries = Array.from({length: Math.max(1, entryCount)}, (_,i) => ({
      id: id + i + 1, name: entryCount === 1 ? "Entry 1" : `Entry ${i+1}`, items: []
    }));
    setRounds(p => [...p, { id, name, color, notes:"", date: new Date().toISOString().split("T")[0], entries }]);
  };
  const deleteRound = rid => setRounds(p => p.filter(r => r.id !== rid));
  const updateRound = (rid, fields) => setRounds(p => p.map(r => r.id === rid ? {...r,...fields} : r));

  const addEntry = rid => setRounds(p => p.map(r => {
    if (r.id !== rid) return r;
    const n = (r.entries||[]).length + 1;
    return {...r, entries:[...(r.entries||[]), { id: Date.now(), name:`Entry ${n}`, items:[] }]};
  }));
  const removeEntry = (rid, eid) => setRounds(p => p.map(r =>
    r.id !== rid ? r : {...r, entries: (r.entries||[]).filter(e => e.id !== eid)}
  ));
  const addItemToEntry = (rid, eid, items) => setRounds(p => p.map(r => {
    if (r.id !== rid) return r;
    return {...r, entries: (r.entries||[]).map(e => {
      if (e.id !== eid) return e;
      const existing = new Set((e.items||[]).map(i => i.type+":"+i.refId));
      const toAdd = items.filter(i => !existing.has(i.type+":"+i.refId));
      return {...e, items:[...e.items, ...toAdd]};
    })};
  }));
  const removeItemFromEntry = (rid, eid, idx) => setRounds(p => p.map(r =>
    r.id !== rid ? r : {...r, entries: (r.entries||[]).map(e =>
      e.id !== eid ? e : {...e, items: (e.items||[]).filter((_,i) => i !== idx)}
    )}
  ));
  const reorderEntryItems = (rid, eid, fromIdx, toIdx) => setRounds(p => p.map(r => {
    if (r.id !== rid) return r;
    return {...r, entries: (r.entries||[]).map(e => {
      if (e.id !== eid) return e;
      const items = [...e.items];
      const [moved] = items.splice(fromIdx, 1);
      const adj = fromIdx < toIdx ? toIdx - 1 : toIdx;
      items.splice(adj, 0, moved);
      return {...e, items};
    })};
  }));

  // find which entry in a round already contains an item
  const findDupes = (round, type, refId) => {
    const found = [];
    (round.entries||[]).forEach(e => {
      if (e.items.some(i => i.type === type && i.refId === refId)) found.push(e.name);
    });
    return found;
  };

  // ── Drag within entry items ─────────────────────────────────────────────────
  const entryDragItem = useRef(null);
  const [entryDragOver, setEntryDragOver] = useState(null);

  // ── Sets CRUD ────────────────────────────────────────────────────────────────
  const addSet = name => setSets(p => [...p, { id:Date.now(), name, color:PRESET_COLORS[1], notes:"", mastery:0, date:new Date().toISOString().split("T")[0] }]);
  const deleteSet = sid => setSets(p => p.filter(s => s.id !== sid));
  const updateSet = (sid, fields) => setSets(p => p.map(s => s.id === sid ? {...s,...fields} : s));

  const masteryColor = p => p < 30 ? C.red : p < 60 ? C.yellow : p < 80 ? C.blue : C.green;

  // ── PLAN layout ─────────────────────────────────────────────────────────────
  const PlanView = () => {
    return (
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 14px", borderBottom:`1px solid ${C.border}`, background:C.surface, flexShrink:0 }}>
          <span style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.brownMid, fontFamily:FONT_DISPLAY }}>{t("rounds")}</span>
          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
            <button onClick={()=>setConfirmRestore(true)}
              style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, cursor:"pointer",
                color:C.textMuted, padding:"5px 11px", fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700,
                display:"flex", alignItems:"center", gap:3 }}>
              ↺
            </button>
            <button onClick={()=>setShowLoadTemplate(true)}
              style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, cursor:"pointer",
                color:C.textMuted, padding:"5px 11px", fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700,
                display:"flex", alignItems:"center", gap:3 }}
              title="Load a saved battle template">
              📂 Load{templates.length>0&&<span style={{ marginLeft:3, background:C.accent, color:C.bg, borderRadius:8, padding:"0 5px", fontSize:10 }}>{templates.length}</span>}
            </button>
            <button onClick={()=>{ setTemplateName(""); setShowSaveTemplate(true); }}
              style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, cursor:"pointer",
                color:C.textMuted, padding:"5px 11px", fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700,
                display:"flex", alignItems:"center", gap:3 }}
              title="Save current rounds as a template">
              💾 Save
            </button>
            {rounds.length>1&&<button onClick={()=>setReorderRounds(r=>!r)}
              style={{ background:reorderRounds?C.accent:"none", border:"none", cursor:"pointer", padding:"4px 8px", borderRadius:5,
                color:reorderRounds?C.bg:C.textMuted, fontSize:13, fontWeight:800, fontFamily:FONT_DISPLAY, letterSpacing:1 }}>
              {reorderRounds?"DONE":"⇅"}
            </button>}
          </div>
        </div>

        {/* Confirm restore modal */}
        {confirmRestore&&(
          <Modal title="RESTORE DEFAULT ROUNDS" onClose={()=>setConfirmRestore(false)}>
            <p style={{ color:C.textSec, marginBottom:8, lineHeight:1.6, fontSize:13 }}>
              This will replace your current rounds with the default battle structure:
            </p>
            <div style={{ background:C.surfaceAlt, borderRadius:8, padding:"10px 14px", marginBottom:16, fontSize:12, color:C.textSec, lineHeight:1.9 }}>
              Prelims · Top 32 · Top 16 · Top 8 · Semi-Finals · Finals · Reserve
            </div>
            <p style={{ color:C.accent, fontWeight:700, fontSize:12, marginBottom:20, lineHeight:1.6 }}>
              ⚠️ All your current rounds and their entries will be permanently erased. This cannot be undone.
            </p>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <Btn variant="secondary" onClick={()=>setConfirmRestore(false)}>{t("cancel")}</Btn>
              <Btn variant="danger" onClick={()=>{ setRounds(INIT_ROUNDS); setConfirmRestore(false); }}>Yes, Restore</Btn>
            </div>
          </Modal>
        )}

        {/* Save Template Modal */}
        {showSaveTemplate&&(
          <Modal title="SAVE BATTLE TEMPLATE" onClose={()=>setShowSaveTemplate(false)}>
            <p style={{ fontSize:13, color:C.textSec, marginBottom:14, lineHeight:1.6 }}>
              Saves your current round structure and all entries as a reusable template.
            </p>
            <div style={{ marginBottom:6 }}>
              <label style={lbl()}>TEMPLATE NAME *</label>
              <input autoFocus value={templateName} onChange={e=>setTemplateName(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter") saveTemplate(); }}
                placeholder="e.g. Red Bull BC One, Local Jam, 2v2 Format…"
                style={{ width:"100%", background:C.surface, border:`1.5px solid ${C.accent}`, borderRadius:8,
                  padding:"9px 12px", color:C.text, fontSize:14, outline:"none", fontFamily:FONT_BODY, boxSizing:"border-box" }}/>
            </div>
            <div style={{ fontSize:11, color:C.textMuted, marginBottom:20, marginTop:6 }}>
              {rounds.length} round{rounds.length!==1?"s":""} will be saved ·{" "}
              {rounds.reduce((n,r)=>n+(r.entries?.length||0),0)} entr{rounds.reduce((n,r)=>n+(r.entries?.length||0),0)!==1?"ies":"y"} total
            </div>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <Btn variant="secondary" onClick={()=>setShowSaveTemplate(false)}>Cancel</Btn>
              <Btn onClick={saveTemplate} disabled={!templateName.trim()}>💾 Save Template</Btn>
            </div>
          </Modal>
        )}

        {/* Load Template Modal */}
        {showLoadTemplate&&!confirmLoadTpl&&!confirmDeleteTpl&&(
          <Modal title="LOAD BATTLE TEMPLATE" onClose={()=>setShowLoadTemplate(false)}>
            {templates.length===0 ? (
              <div style={{ textAlign:"center", padding:"24px 0", color:C.textMuted }}>
                <div style={{ fontSize:28, marginBottom:8 }}>📂</div>
                <div style={{ fontSize:13, fontWeight:700, fontFamily:FONT_DISPLAY, marginBottom:4 }}>No templates saved yet</div>
                <div style={{ fontSize:12 }}>Set up your rounds then tap 💾 Save to create your first template.</div>
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                <p style={{ fontSize:12, color:C.textMuted, marginBottom:4, lineHeight:1.5 }}>
                  Tap a template to load it. This will replace your current rounds and entries.
                </p>
                {templates.map(tpl=>(
                  <div key={tpl.id}
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px",
                      background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, cursor:"pointer" }}
                    onClick={()=>setConfirmLoadTpl(tpl)}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontWeight:800, fontSize:14, color:C.text, fontFamily:FONT_DISPLAY, letterSpacing:0.5, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{tpl.name}</div>
                      <div style={{ fontSize:11, color:C.textMuted, marginTop:3 }}>
                        {tpl.rounds.length} round{tpl.rounds.length!==1?"s":""} ·{" "}
                        {tpl.rounds.reduce((n,r)=>n+(r.entries?.length||0),0)} entr{tpl.rounds.reduce((n,r)=>n+(r.entries?.length||0),0)!==1?"ies":"y"} · Saved {tpl.savedAt}
                      </div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:5 }}>
                        {tpl.rounds.slice(0,6).map(r=>(
                          <span key={r.id} style={{ fontSize:10, padding:"1px 7px", borderRadius:10,
                            background:`${r.color||C.accent}25`, color:r.color||C.accent,
                            fontFamily:FONT_DISPLAY, fontWeight:700 }}>{r.name}</span>
                        ))}
                        {tpl.rounds.length>6&&<span style={{ fontSize:10, color:C.textMuted }}>+{tpl.rounds.length-6} more</span>}
                      </div>
                    </div>
                    <button onClick={e=>{ e.stopPropagation(); setConfirmDeleteTpl(tpl); }}
                      style={{ background:"none", border:"none", cursor:"pointer", padding:6, display:"flex", flexShrink:0 }}>
                      <Ic n="trash" s={14} c={C.accent}/>
                    </button>
                  </div>
                ))}
              </div>
            )}
            <div style={{ display:"flex", justifyContent:"flex-end", marginTop:16 }}>
              <Btn variant="secondary" onClick={()=>setShowLoadTemplate(false)}>Close</Btn>
            </div>
          </Modal>
        )}

        {/* Confirm Load */}
        {confirmLoadTpl&&(
          <Modal title="LOAD TEMPLATE" onClose={()=>setConfirmLoadTpl(null)}>
            <p style={{ fontSize:13, color:C.textSec, marginBottom:8, lineHeight:1.6 }}>
              Load <strong style={{color:C.text}}>{confirmLoadTpl.name}</strong>?
            </p>
            <p style={{ fontSize:12, color:C.accent, fontWeight:700, marginBottom:20, lineHeight:1.6 }}>
              ⚠️ Your current rounds and all their entries will be replaced. This cannot be undone.
            </p>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <Btn variant="secondary" onClick={()=>setConfirmLoadTpl(null)}>Cancel</Btn>
              <Btn variant="danger" onClick={()=>loadTemplate(confirmLoadTpl)}>Yes, Load Template</Btn>
            </div>
          </Modal>
        )}

        {/* Confirm Delete Template */}
        {confirmDeleteTpl&&(
          <Modal title="DELETE TEMPLATE" onClose={()=>setConfirmDeleteTpl(null)}>
            <p style={{ fontSize:13, color:C.textSec, marginBottom:8, lineHeight:1.6 }}>
              Delete <strong style={{color:C.text}}>{confirmDeleteTpl.name}</strong>?
            </p>
            <p style={{ fontSize:12, color:C.accent, fontWeight:700, marginBottom:20 }}>
              ⚠️ This cannot be undone.
            </p>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <Btn variant="secondary" onClick={()=>setConfirmDeleteTpl(null)}>Cancel</Btn>
              <Btn variant="danger" onClick={()=>deleteTemplate(confirmDeleteTpl.id)}>Delete</Btn>
            </div>
          </Modal>
        )}

        {/* Rounds list */}
        <div style={{ flex:1, overflow:"auto", padding:"10px 12px" }}>
          {rounds.length === 0 && (
            <div style={{ textAlign:"center", padding:40, color:C.textMuted }}>
              <div style={{ fontSize:28, marginBottom:8 }}>⚔</div>
              <p style={{ fontSize:12 }}>No rounds yet — tap ADD to create one</p>
            </div>
          )}
          {rounds.map((round, roundIdx) => {
            const rColor = round.color || C.accent;
            const isOpen = expRounds[round.id] !== false; // default open
            const entryCount = (round.entries||[]).length;
            return (
              <div key={round.id} style={{ position:"relative", marginBottom:8, borderRadius:10, border:`1.5px solid ${C.border}`, overflow:"hidden", background:C.bg }}>
                {/* Color bar */}
                <div style={{ height:3, background:`linear-gradient(90deg,${rColor},${rColor}55)` }}/>
                {/* Round header */}
                <div style={{ display:"flex", alignItems:"center", padding:"9px 12px", gap:6 }}>
                  {/* Chevron toggle */}
                  {!reorderRounds&&<button onClick={()=>setExpRounds(p=>({...p,[round.id]:!isOpen}))}
                    style={{ background:"none", border:"none", cursor:"pointer", display:"flex", padding:0, flexShrink:0 }}>
                    <Ic n={isOpen?"chevD":"chevR"} s={13} c={rColor}/>
                  </button>}
                  {/* Title */}
                  <span onClick={()=>{ if(!reorderRounds) setEditRound(round); }}
                    style={{ flex:1, fontWeight:800, fontSize:13, color:C.brown, fontFamily:FONT_DISPLAY, letterSpacing:0.8, cursor:reorderRounds?"default":"pointer" }}>
                    {round.name}
                  </span>
                  {!reorderRounds&&<span style={{ fontSize:10, color:rColor, fontWeight:700, fontFamily:FONT_DISPLAY, flexShrink:0 }}>
                    {entryCount} {entryCount===1?"entry":"entries"}
                  </span>}
                  {!reorderRounds&&<button onClick={()=>setEditRound(round)}
                    style={{ background:"none", border:"none", cursor:"pointer", padding:3, display:"flex", flexShrink:0 }}>
                    <Ic n="edit" s={12} c={C.textMuted}/>
                  </button>}
                  {!reorderRounds&&<button onClick={()=>deleteRound(round.id)}
                    style={{ background:"none", border:"none", cursor:"pointer", padding:3, display:"flex", flexShrink:0 }}>
                    <Ic n="x" s={13} c={C.accent}/>
                  </button>}
                  {reorderRounds&&<div style={{ display:"flex", flexDirection:"column", gap:2, flexShrink:0 }}>
                    <button onClick={()=>moveRoundUp(roundIdx)} disabled={roundIdx===0}
                      style={{ width:26, height:26, borderRadius:6, border:`1px solid ${C.border}`, background:C.bg,
                        cursor:roundIdx===0?"default":"pointer", color:roundIdx===0?C.border:C.accent,
                        fontSize:14, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>▲</button>
                    <button onClick={()=>moveRoundDown(roundIdx)} disabled={roundIdx===rounds.length-1}
                      style={{ width:26, height:26, borderRadius:6, border:`1px solid ${C.border}`, background:C.bg,
                        cursor:roundIdx===rounds.length-1?"default":"pointer", color:roundIdx===rounds.length-1?C.border:C.accent,
                        fontSize:14, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>▼</button>
                  </div>}
                </div>
                {/* Entries — expanded by default */}
                {isOpen && (round.entries||[]).map(entry => (
                  <div key={entry.id}
                    style={{ borderTop:`1px solid ${C.borderLight}`, padding:"6px 12px 6px 28px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                      <Ic n="chevR" s={10} c={C.textMuted}/>
                      <span style={{ fontSize:11, fontWeight:700, color:C.brownMid, fontFamily:FONT_DISPLAY, flex:1 }}>{entry.name}</span>
                      <span style={{ fontSize:9, color:C.textMuted }}>{(entry.items||[]).length} items</span>
                    </div>
                    {(entry.items||[]).map((item,i) => {
                      const label = item.type==="move" ? getMove(item.refId)?.name : getSet(item.refId)?.name;
                      if (!label) return null;
                      return (
                        <div key={i} style={{ fontSize:10, color:C.textMuted, paddingLeft:14, paddingTop:2, display:"flex", alignItems:"center", gap:4 }}>
                          <span>·</span>
                          {item.type==="set"&&<span style={{ fontSize:8, background:`${C.blue}22`, color:C.blue, padding:"0 3px", borderRadius:3, fontFamily:FONT_DISPLAY, fontWeight:700 }}>SET</span>}
                          <span>{label}</span>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ── Edit Round full-screen ───────────────────────────────────────────────────
  // EditRoundView is defined as a top-level component below ReadyPage

  // ── Vocab Picker overlay ─────────────────────────────────────────────────────
  const VocabPicker = ({ pickerState }) => {
    const t = useT();
  const { entryId, applyLocal } = pickerState;
    const q = pickerSearch.toLowerCase().trim();
    const toggleSel = (type, refId) => {
      const key = type+":"+refId;
      setPickerSel(p => p.some(i=>i.type+":"+i.refId===key) ? p.filter(i=>i.type+":"+i.refId!==key) : [...p,{type,refId}]);
    };
    const isSelected = (type, refId) => pickerSel.some(i=>i.type===type&&i.refId===refId);
    const confirm = () => {
      if (pickerState.applyLocal) pickerState.applyLocal(entryId, pickerSel);
      setPickerEntry(null);
    };

    return (
      <div style={{ position:"absolute", inset:0, background:C.bg, zIndex:600, display:"flex", flexDirection:"column" }}>
        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px", background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
          <button onClick={()=>setPickerEntry(null)} style={{ background:"none", border:"none", cursor:"pointer", color:C.accent, fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700, padding:0 }}>← Back</button>
          <span style={{ flex:1, fontWeight:900, fontSize:14, letterSpacing:1.5, color:C.brown, fontFamily:FONT_DISPLAY }}>{t("addToEntry")}</span>
          {pickerSel.length>0&&<span style={{ fontSize:11, color:C.accent, fontWeight:700, fontFamily:FONT_DISPLAY }}>{pickerSel.length} selected</span>}
        </div>
        {/* Search */}
        <div style={{ padding:"8px 12px", borderBottom:`1px solid ${C.borderLight}`, flexShrink:0 }}>
          <div style={{ display:"flex", alignItems:"center", background:C.surface, borderRadius:7, padding:"6px 10px", gap:6, border:`1px solid ${q?C.accent:C.border}` }}>
            <Ic n="search" s={13} c={C.textMuted}/>
            <input value={pickerSearch} onChange={e=>setPickerSearch(e.target.value)}
              placeholder={t("searchMovesAndSets")}
              style={{ flex:1, background:"none", border:"none", outline:"none", color:C.text, fontSize:13, fontFamily:"inherit" }}/>
            {pickerSearch&&<button onClick={()=>setPickerSearch("")} style={{ background:"none", border:"none", cursor:"pointer", color:C.textMuted, padding:0, display:"flex" }}><Ic n="x" s={13}/></button>}
          </div>
        </div>
        {/* List */}
        <div style={{ flex:1, overflow:"auto" }}>
          {/* Sets section */}
          {sets.filter(s=>!q||s.name.toLowerCase().includes(q)).length>0&&(
            <div>
              <div style={{ padding:"6px 12px", background:C.surfaceAlt, borderBottom:`1px solid ${C.border}` }}>
                <span style={{ fontSize:10, fontWeight:800, letterSpacing:1.5, color:C.textMuted, fontFamily:FONT_DISPLAY }}>{t("sets")}</span>
              </div>
              {sets.filter(s=>!q||s.name.toLowerCase().includes(q)).map(s => {
                const sel = isSelected("set", s.id);
                return (
                  <button key={s.id} onClick={()=>toggleSel("set",s.id)}
                    style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
                      background: sel ? `${C.accent}12` : "transparent",
                      border:"none", borderBottom:`1px solid ${C.borderLight}`, cursor:"pointer", textAlign:"left" }}>
                    <div style={{ width:16, height:16, borderRadius:4, border:`2px solid ${sel?C.accent:C.border}`,
                      background:sel?C.accent:"transparent", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                      {sel&&<Ic n="check" s={10} c="#fff"/>}
                    </div>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:s.color||C.blue, flexShrink:0 }}/>
                    <span style={{ flex:1, fontSize:13, color:C.text }}>{s.name}</span>
                    <span style={{ fontSize:9, background:`${C.blue}22`, color:C.blue, padding:"1px 5px", borderRadius:4, fontFamily:FONT_DISPLAY, fontWeight:700 }}>SET</span>
                    {showMastery&&<span style={{ fontSize:11, color:masteryColor(s.mastery||0), fontWeight:700 }}>{s.mastery||0}%</span>}
                  </button>
                );
              })}
            </div>
          )}
          {/* Moves by category */}
          {allCats.map(cat => {
            const catMoves = moves.filter(m=>m.category===cat&&(!q||m.name.toLowerCase().includes(q)));
            if(catMoves.length===0) return null;
            return (
              <div key={cat}>
                <div style={{ padding:"6px 12px", background:C.surfaceAlt, borderBottom:`1px solid ${C.border}` }}>
                  <span style={{ fontSize:10, fontWeight:800, letterSpacing:1.5, color:C.textMuted, fontFamily:FONT_DISPLAY, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", display:"block" }}>{cat.toUpperCase()}</span>
                </div>
                {catMoves.map(m => {
                  const sel = isSelected("move", m.id);
                  return (
                    <button key={m.id} onClick={()=>toggleSel("move",m.id)}
                      style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
                        background: sel ? `${C.accent}12` : "transparent",
                        border:"none", borderBottom:`1px solid ${C.borderLight}`, cursor:"pointer", textAlign:"left" }}>
                      <div style={{ width:16, height:16, borderRadius:4, border:`2px solid ${sel?C.accent:C.border}`,
                        background:sel?C.accent:"transparent", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {sel&&<Ic n="check" s={10} c="#fff"/>}
                      </div>
                      <div style={{ width:8, height:8, borderRadius:"50%", background:masteryColor(m.mastery), flexShrink:0 }}/>
                      <span style={{ flex:1, fontSize:13, color:C.text }}>{m.name}</span>
                      {showMastery&&<span style={{ fontSize:11, color:masteryColor(m.mastery), fontWeight:700 }}>{m.mastery}%</span>}
                    </button>
                  );
                })}
              </div>
            );
          })}
        </div>
        {/* Confirm bar */}
        <div style={{ padding:"10px 14px", borderTop:`1px solid ${C.border}`, background:C.surface, flexShrink:0 }}>
          <button onClick={confirm} disabled={pickerSel.length===0}
            style={{ width:"100%", padding:"11px", background:pickerSel.length>0?C.accent:C.border, border:"none", borderRadius:8,
              color:C.bg, fontSize:13, fontWeight:900, fontFamily:FONT_DISPLAY, letterSpacing:1.5, cursor:pickerSel.length>0?"pointer":"default",
              opacity: pickerSel.length>0?1:0.5 }}>
            ADD {pickerSel.length>0?pickerSel.length+" SELECTED":"TO ENTRY"}
          </button>
        </div>
      </div>
    );
  };

  // ── Sets detail modal ─────────────────────────────────────────────────────────
  const SetDetailModal = ({ set, onClose }) => {
    const [f, setF] = useState({ name:set.name, color:set.color||C.blue, notes:set.notes||"", mastery:set.mastery||0 });
    const save = () => { updateSet(set.id, f); onClose(); };
    return (
      <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", zIndex:800, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
        <div style={{ background:C.bg, border:`1px solid ${C.border}`, borderRadius:14, width:"100%", maxWidth:400, overflow:"hidden", boxShadow:"0 24px 80px rgba(0,0,0,0.4)" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 16px", background:C.surface, borderBottom:`1px solid ${C.border}` }}>
            <span style={{ fontWeight:900, fontSize:15, letterSpacing:2, fontFamily:FONT_DISPLAY, color:C.text }}>{t("editSet")}</span>
            <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", padding:2 }}><Ic n="x" s={18} c={C.textMuted}/></button>
          </div>
          <div style={{ padding:"16px 16px 20px" }}>
            <label style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.textMuted, fontFamily:FONT_DISPLAY, display:"block", marginBottom:5 }}>{t("name")}</label>
            <input value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))}
              style={{ width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"9px 12px", color:C.text, fontSize:14, outline:"none", boxSizing:"border-box", fontFamily:FONT_BODY, marginBottom:14 }}/>
            <label style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.textMuted, fontFamily:FONT_DISPLAY, display:"block", marginBottom:5 }}>{t("color")}</label>
            <div style={{ display:"flex", gap:8, marginBottom:14 }}>
              {PRESET_COLORS.map(col=>(
                <button key={col} onClick={()=>setF(p=>({...p,color:col}))}
                  style={{ width:24, height:24, borderRadius:"50%", background:col, border:f.color===col?`2px solid ${C.text}`:"2px solid transparent", cursor:"pointer", padding:0 }}/>
              ))}
            </div>
            <label style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.textMuted, fontFamily:FONT_DISPLAY, display:"block", marginBottom:5 }}>{t("notes")}</label>
            <textarea value={f.notes} onChange={e=>setF(p=>({...p,notes:e.target.value}))} rows={3}
              placeholder={t("describeSet")}
              style={{ width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"9px 12px", color:C.text, fontSize:13, outline:"none", boxSizing:"border-box", fontFamily:FONT_BODY, resize:"vertical", marginBottom:14 }}/>
            {showMastery&&(<Fragment>
              <label style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.textMuted, fontFamily:FONT_DISPLAY, display:"block", marginBottom:5 }}>MASTERY — {f.mastery}%</label>
              <input type="range" min={0} max={100} value={f.mastery} onChange={e=>setF(p=>({...p,mastery:+e.target.value}))}
                style={{ width:"100%", accentColor:C.accent, cursor:"pointer", marginBottom:14 }}/>
            </Fragment>)}
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:4 }}>
              <button onClick={onClose} style={{ padding:"9px 18px", borderRadius:8, border:`1px solid ${C.border}`, background:C.surface, color:C.text, cursor:"pointer", fontSize:13, fontWeight:700, fontFamily:FONT_DISPLAY }}>{t("cancel")}</button>
              <button onClick={save} style={{ padding:"9px 18px", borderRadius:8, border:"none", background:C.accent, color:C.bg, cursor:"pointer", fontSize:13, fontWeight:900, fontFamily:FONT_DISPLAY, letterSpacing:0.8 }}>{t("save")}</button>
            </div>
          </div>
        </div>
      </div>
    );
  };


  // ── Sub-tab bar ──────────────────────────────────────────────────────────────
  const subTabs = [["plan",t("plan")],["freestyle",t("freestyle")]];

  return (
    <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column", position:"relative" }}>
      {/* Sub-tab bar */}
      <div style={{ display:"flex", borderBottom:`1px solid ${C.border}`, background:C.surface, flexShrink:0 }}>
        {subTabs.map(([id,label])=>(
          <button key={id} onClick={()=>setBattleTabAndNotify(id)}
            style={{ flex:1, padding:"9px 0", background:"none", border:"none", cursor:"pointer",
              fontSize:11, fontWeight:800, letterSpacing:1.5, fontFamily:FONT_DISPLAY,
              color: battleTab===id ? C.accent : C.textMuted,
              borderBottom: battleTab===id ? `2px solid ${C.accent}` : "2px solid transparent" }}>
            {label}
          </button>
        ))}
      </div>

      {/* PLAN tab */}
      {battleTab==="plan"&&(
        <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column", position:"relative" }}>
          <PlanView/>
          {editRound&&<EditRoundView round={editRound}
            onSave={updateRound} onClose={()=>setEditRound(null)}
            getMove={getMove} getSet={getSet}
            setPickerEntry={setPickerEntry} setPickerSearch={setPickerSearch} setPickerSel={setPickerSel}
            showMoveCount={showMoveCount}/>}
          {pickerEntry&&<VocabPicker pickerState={pickerEntry}/>}
        </div>
      )}

      {/* FREESTYLE tab */}
      {battleTab==="freestyle"&&<FreestylePage moves={moves} sets={sets} settings={settings} onAddTrigger={freestyleAddTick}/>}

      {/* Modals */}
      {addingRound&&<NewRoundModal onClose={()=>setAddingRound(false)}
        onConfirm={({name,color,entries})=>{ addRound(name,color,entries); setAddingRound(false); }}/>}
      {addingSet&&<NameModal title="NEW SET" placeholder="e.g. Opening Combo…" onClose={()=>setAddingSet(false)}
        onConfirm={name=>{ addSet(name); setAddingSet(false); }}/>}
      {editSet&&<SetDetailModal set={editSet} onClose={()=>setEditSet(null)}/>}
    </div>
  );
};
