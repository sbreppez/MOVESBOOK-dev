                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Picker footer */}
          <div style={{ padding:"10px 14px", borderTop:`1px solid ${C.border}`, background:C.surface, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span style={{ fontSize:12, color:C.textMuted }}>
              {pickerSel.length>0 ? `${pickerSel.length} selected` : t("tapToSelect")}
            </span>
            <button onClick={confirmPick} disabled={pickerSel.length===0}
              style={{ padding:"8px 18px", background:pickerSel.length>0?C.accent:C.border, border:"none",
                borderRadius:8, color:"#fff", fontSize:13, fontWeight:800, fontFamily:FONT_DISPLAY,
                letterSpacing:1, cursor:pickerSel.length>0?"pointer":"default" }}>
              DONE {pickerSel.length>0?`(${pickerSel.length})`:""}
            </button>
          </div>
        </div>
      )}

      {/* Confirm reset modal */}
      {confirmReset&&(
        <Modal title="RESET LIST" onClose={()=>setConfirmReset(false)}>
          <p style={{ color:C.textSec, marginBottom:20, lineHeight:1.6 }}>
            This will clear all <strong style={{color:C.text}}>{toUse.length} moves</strong> from your freestyle list. This cannot be undone.
          </p>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <Btn variant="secondary" onClick={()=>setConfirmReset(false)}>{t("cancel")}</Btn>
            <Btn variant="danger" onClick={reset}>Reset</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};
const EditRoundView = ({ round, onSave, onClose, getMove, getSet, setPickerEntry, setPickerSearch, setPickerSel, showMoveCount }) => {
  const t = useT();
  const { C } = useSettings();
  const [localRound, setLocalRound] = useState({...round, entries: round.entries || []});
  const [localExpEntries, setLocalExpEntries] = useState({});
  const [renaming, setRenaming] = useState(null);
  const [renameVal, setRenameVal] = useState("");
  const itemDragRef = useRef(null);
  const [itemDragOver, setItemDragOver] = useState(null);
  const [confirmDeleteEntry, setConfirmDeleteEntry] = useState(null);

  const save = () => {
    onSave(round.id, { name:localRound.name, color:localRound.color, notes:localRound.notes, entries:localRound.entries });
    onClose();
  };

  const localAddEntry = () => {
    const n = (localRound.entries||[]).length + 1;
    setLocalRound(r => ({...r, entries:[...(r.entries||[]), { id:Date.now(), name:`Entry ${n}`, items:[] }]}));
  };
  const localRemoveEntry = eid => setLocalRound(r => ({...r, entries:(r.entries||[]).filter(e=>e.id!==eid)}));
  const localAddItems = (eid, newItems) => setLocalRound(r => ({...r, entries:(r.entries||[]).map(e=>{
    if(e.id!==eid) return e;
    const ex = new Set((e.items||[]).map(i=>i.type+":"+i.refId));
    return {...e, items:[...(e.items||[]), ...newItems.filter(i=>!ex.has(i.type+":"+i.refId))]};
  })}));
  const localRemoveItem = (eid, idx) => setLocalRound(r => ({...r, entries:(r.entries||[]).map(e=>
    e.id!==eid?e:{...e,items:(e.items||[]).filter((_,i)=>i!==idx)}
  )}));
  const localReorder = (eid, fromIdx, toIdx) => setLocalRound(r => ({...r, entries:(r.entries||[]).map(e=>{
    if(e.id!==eid) return e;
    const items=[...(e.items||[])];
    const [moved]=items.splice(fromIdx,1);
    const adj = fromIdx<toIdx?toIdx-1:toIdx;
    items.splice(adj,0,moved);
    return {...e,items};
  })}));
  const localRenameEntry = (eid, name) => setLocalRound(r => ({...r, entries:(r.entries||[]).map(e=>e.id===eid?{...e,name}:e)}));
  const findLocalDupes = (type, refId, currentEid) => {
    const found = [];
    (localRound.entries||[]).forEach(e => {
      if(e.id!==currentEid && (e.items||[]).some(i=>i.type===type&&i.refId===refId)) found.push(e.name);
    });
    return found;
  };

  return (
    <div style={{ position:"absolute", inset:0, background:C.bg, zIndex:500, display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px", background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <button onClick={save} style={{ background:"none", border:"none", cursor:"pointer", color:C.accent, fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700, padding:0 }}>{`← ${t("save")}`}</button>
        <div style={{ width:10, height:10, borderRadius:"50%", background:localRound.color||C.accent, flexShrink:0 }}/>
        <span style={{ flex:1, fontWeight:900, fontSize:15, letterSpacing:1.5, color:C.brown, fontFamily:FONT_DISPLAY }}>{localRound.name}</span>
        <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", padding:2 }}><Ic n="x" s={16} c={C.textMuted}/></button>
      </div>
      {/* Round meta */}
      <div style={{ padding:"10px 14px", borderBottom:`1px solid ${C.borderLight}`, flexShrink:0, background:C.surface }}>
        <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:8 }}>
          <input value={localRound.name} onChange={e=>setLocalRound(r=>({...r,name:e.target.value}))}
            style={{ flex:1, background:C.bg, border:`1px solid ${C.border}`, borderRadius:7, padding:"7px 10px",
              color:C.text, fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700, outline:"none" }}/>
        </div>
        <textarea value={localRound.notes||""} onChange={e=>setLocalRound(r=>({...r,notes:e.target.value}))}
          placeholder={t("notesRound")} rows={2}
          style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:7, padding:"7px 10px",
            color:C.text, fontSize:12, fontFamily:FONT_BODY, outline:"none", resize:"none", boxSizing:"border-box" }}/>
      </div>
      {/* Entries list */}
      <div style={{ flex:1, overflow:"auto", padding:"10px 12px" }}>
        {(localRound.entries||[]).map((entry) => {
          const isOpen = localExpEntries[entry.id] !== false;
          return (
            <div key={entry.id} style={{ marginBottom:10, borderRadius:10, border:`1.5px solid ${C.border}`, overflow:"hidden", background:C.bg }}>
              <div style={{ display:"flex", alignItems:"center", padding:"8px 10px", background:C.surface, gap:6 }}>
                <button onClick={()=>setLocalExpEntries(p=>({...p,[entry.id]:!isOpen}))}
                  style={{ background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", flexShrink:0 }}>
                  <Ic n={isOpen?"chevD":"chevR"} s={12} c={C.textMuted}/>
                </button>
                {renaming===entry.id ? (
                  <input autoFocus value={renameVal}
                    onChange={e=>setRenameVal(e.target.value)}
                    onBlur={()=>{ if(renameVal.trim()) localRenameEntry(entry.id,renameVal.trim()); setRenaming(null); }}
                    onKeyDown={e=>{ if(e.key==="Enter"){ if(renameVal.trim()) localRenameEntry(entry.id,renameVal.trim()); setRenaming(null); } }}
                    style={{ flex:1, background:C.bg, border:`1px solid ${C.accent}`, borderRadius:5, padding:"2px 6px",
                      color:C.text, fontSize:12, fontFamily:FONT_DISPLAY, fontWeight:700, outline:"none" }}/>
                ) : (
                  <span onDoubleClick={()=>{ setRenaming(entry.id); setRenameVal(entry.name); }}
                    style={{ flex:1, fontSize:12, fontWeight:800, color:C.brownMid, fontFamily:FONT_DISPLAY, letterSpacing:0.8, cursor:"pointer" }}
                    title={t("doubleTapRename")}>{entry.name}</span>
                )}
                {showMoveCount&&<span style={{ fontSize:10, color:C.textMuted }}>{(entry.items||[]).length}</span>}
                <button onClick={()=>{ setPickerEntry({roundId:localRound.id,entryId:entry.id,applyLocal:localAddItems}); setPickerSearch(""); setPickerSel([]); }}
                  style={{ background:C.accent, border:"none", borderRadius:6, cursor:"pointer",
                    color:"#fff", padding:"2px 7px", fontSize:10, fontFamily:FONT_DISPLAY, fontWeight:700, display:"flex", alignItems:"center", gap:3 }}>
                  <Ic n="plus" s={9} c="#fff"/> ADD
                </button>
                <button onClick={()=>setConfirmDeleteEntry(entry)}
                  style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex", flexShrink:0 }}>
                  <Ic n="x" s={13} c={C.accent}/>
                </button>
              </div>
              {isOpen && (
                <div style={{ padding:"4px 0" }}
                  onDragOver={e=>e.preventDefault()}
                  onDrop={e=>{ e.stopPropagation(); if(itemDragRef.current?.eid===entry.id) localReorder(entry.id, itemDragRef.current.idx, (entry.items||[]).length); }}>
                  {(entry.items||[]).length===0&&(
                    <div style={{ padding:"8px 14px", fontSize:11, color:C.textMuted, fontStyle:"italic" }}>Empty — tap ADD to fill this entry</div>
                  )}
                  {(entry.items||[]).map((item,idx)=>{
                    const label = item.type==="move" ? getMove(item.refId)?.name : getSet(item.refId)?.name;
                    if(!label) return null;
                    const dupes = findLocalDupes(item.type, item.refId, entry.id);
                    const isDragging = itemDragRef.current?.eid===entry.id&&itemDragRef.current?.idx===idx;
                    const isOver = itemDragOver?.eid===entry.id&&itemDragOver?.idx===idx;
                    return (
                      <div key={idx}
                        draggable
                        onDragStart={e=>{ e.stopPropagation(); itemDragRef.current={eid:entry.id,idx}; }}
                        onDragEnd={()=>{ itemDragRef.current=null; setItemDragOver(null); }}
                        onDragOver={e=>{ e.preventDefault(); e.stopPropagation(); if(itemDragRef.current?.eid===entry.id) setItemDragOver({eid:entry.id,idx}); }}
                        onDrop={e=>{ e.stopPropagation(); if(itemDragRef.current?.eid===entry.id) { localReorder(entry.id,itemDragRef.current.idx,idx); itemDragRef.current=null; setItemDragOver(null); } }}
                        style={{ display:"flex", alignItems:"center", gap:7, padding:"7px 12px",
                          borderTop:`1px solid ${C.borderLight}`,
                          background: isOver ? `${C.accent}0e` : dupes.length>0 ? `${C.yellow}10` : "transparent",
                          opacity: isDragging ? 0.4 : 1 }}>
                        <span style={{ cursor:"grab", display:"flex", flexShrink:0 }}><Ic n="grip" s={11} c={C.textMuted}/></span>
                        <div style={{ width:7, height:7, borderRadius:"50%", flexShrink:0,
                          background: item.type==="set" ? (getSet(item.refId)?.color||C.blue) : masteryColor(getMove(item.refId)?.mastery||0) }}/>
                        <span style={{ flex:1, fontSize:12, color:C.text }}>{label}</span>
                        {item.type==="set"&&<span style={{ fontSize:9, background:`${C.blue}22`, color:C.blue, padding:"1px 5px", borderRadius:4, fontFamily:FONT_DISPLAY, fontWeight:700 }}>SET</span>}
                        {dupes.length>0&&(
                          <span style={{ fontSize:9, color:C.yellow, fontWeight:700, fontFamily:FONT_DISPLAY }} title={`Also in: ${dupes.join(", ")}`}>
                            also in {dupes[0]}
                          </span>
                        )}
                        <button onClick={()=>localRemoveItem(entry.id,idx)}
                          style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex", flexShrink:0 }}>
                          <Ic n="x" s={11} c={C.textMuted}/>
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
        <button onClick={localAddEntry}
          style={{ width:"100%", padding:"10px", background:"none", border:`1.5px dashed ${C.accent}`,
            borderRadius:10, cursor:"pointer", color:C.accent, fontSize:12,
            fontFamily:FONT_DISPLAY, fontWeight:700, letterSpacing:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
          <Ic n="plus" s={13} c={C.accent}/> ADD ENTRY
        </button>
      </div>
      {/* Save bar */}
      <div style={{ padding:"10px 14px", borderTop:`1px solid ${C.border}`, background:C.surface, flexShrink:0 }}>
        <button onClick={save}
          style={{ width:"100%", padding:"11px", background:C.accent, border:"none", borderRadius:8,
            color:"#fff", fontSize:13, fontWeight:900, fontFamily:FONT_DISPLAY, letterSpacing:1.5, cursor:"pointer" }}>
          SAVE ROUND
        </button>
      </div>

      {/* Delete entry confirmation */}
      {confirmDeleteEntry&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.55)", zIndex:600, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ background:C.bg, border:`1px solid ${C.border}`, borderRadius:14, width:"100%", maxWidth:300, padding:20, boxShadow:"0 24px 60px rgba(0,0,0,0.4)" }}>
            <div style={{ fontWeight:900, fontSize:14, letterSpacing:1.5, fontFamily:FONT_DISPLAY, color:C.brown, marginBottom:8 }}>DELETE ENTRY?</div>
            <p style={{ fontSize:13, color:C.textSec, marginBottom:16, lineHeight:1.5 }}>
              "<span style={{ color:C.text, fontWeight:700 }}>{confirmDeleteEntry.name}</span>" and its {(confirmDeleteEntry.items||[]).length} item{(confirmDeleteEntry.items||[]).length!==1?"s":""} will be removed.
            </p>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <button onClick={()=>setConfirmDeleteEntry(null)}
                style={{ padding:"8px 16px", borderRadius:8, border:`1px solid ${C.border}`, background:"none", color:C.textSec, fontSize:13, cursor:"pointer", fontFamily:FONT_BODY }}>
                Cancel
              </button>
              <button onClick={()=>{ localRemoveEntry(confirmDeleteEntry.id); setConfirmDeleteEntry(null); }}
                style={{ padding:"8px 16px", borderRadius:8, border:"none", background:C.accent, color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:FONT_BODY }}>
                Delete
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const ReadyPage = ({ moves, sets, setSets, rounds, setRounds, settings={}, onAddTrigger }) => {
  const t = useT();
  const { C } = useSettings();
  const showMastery   = settings.showMastery  === true;
  const showMoveCount = settings.showMoveCount === true;
  const [battleTab, setBattleTab] = useState("plan");

  // ── PLAN sub-tab state ──────────────────────────────────────────────────────
  const [expRounds, setExpRounds] = useState({});
  const [expEntries, setExpEntries] = useState({});
  const [editRound, setEditRound] = useState(null);   // round being edited full-screen
  const [addingRound, setAddingRound] = useState(false);
  const [confirmRestore, setConfirmRestore] = useState(false);

  // ── Battle Templates ────────────────────────────────────────────────────────
  const [templates, setTemplates] = useState(() => {
    try { const s = localStorage.getItem("mb_templates"); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  useEffect(() => {
    try { localStorage.setItem("mb_templates", JSON.stringify(templates)); } catch {}
    const timer = setTimeout(() => {
      if (window.__MB_USER__?.uid && window.__MB_DB__) window.__MB_DB__.save(window.__MB_USER__.uid, "templates", templates);
    }, 1500);
    return () => clearTimeout(timer);
  }, [templates]);
  useEffect(() => {
    const handler = () => {
      const raw = localStorage.getItem("mb_templates");
      if (raw) { try { const p = JSON.parse(raw); setTemplates(p); } catch {} }
    };
    window.addEventListener("mb-auth-resolved", handler);
    return () => window.removeEventListener("mb-auth-resolved", handler);
  }, []);

  const [showSaveTemplate,  setShowSaveTemplate]  = useState(false);
  const [showLoadTemplate,  setShowLoadTemplate]  = useState(false);
  const [templateName,      setTemplateName]      = useState("");
  const [confirmLoadTpl,    setConfirmLoadTpl]    = useState(null); // template to load
  const [confirmDeleteTpl,  setConfirmDeleteTpl]  = useState(null); // template to delete

  const saveTemplate = () => {
    if (!templateName.trim()) return;
    const tpl = {
      id: Date.now(),
      name: templateName.trim(),
      savedAt: new Date().toLocaleDateString("en-AU", {day:"2-digit", month:"short", year:"numeric"}),
      rounds: JSON.parse(JSON.stringify(rounds)), // deep clone
    };
    setTemplates(p => [...p, tpl]);
    setTemplateName("");
    setShowSaveTemplate(false);

    setRounds(JSON.parse(JSON.stringify(tpl.rounds)));
    setConfirmLoadTpl(null);
    setShowLoadTemplate(false);
  };

  const deleteTemplate = (id) => {
    setTemplates(p => p.filter(t => t.id !== id));
    setConfirmDeleteTpl(null);
  };

  useEffect(()=>{ if(onAddTrigger) setAddingRound(true); },[onAddTrigger]);

  // ── Vocab picker state (inside Edit Round) ──────────────────────────────────
  const [pickerEntry, setPickerEntry] = useState(null); // { roundId, entryId }
  const [pickerSearch, setPickerSearch] = useState("");
  const [pickerSel, setPickerSel] = useState([]);       // [{ type, refId }]

  // ── Sets detail modal ───────────────────────────────────────────────────────

  const getSet  = id => sets.find(s => s.id === id);

  // ── Round/Entry helpers ─────────────────────────────────────────────────────
  const addRound = name => {
    const id = Date.now();
    setRounds(p => [...p, { id, name, color: PRESET_COLORS[0], notes:"", date: new Date().toISOString().split("T")[0],
      entries:[{ id: id+1, name:"Entry 1", items:[] }] }]);
  };
  const deleteRound = rid => setRounds(p => p.filter(r => r.id !== rid));
  const updateRound = (rid, fields) => setRounds(p => p.map(r => r.id === rid ? {...r,...fields} : r));

  const addEntry = rid => setRounds(p => p.map(r => {
    if (r.id !== rid) return r;
    const n = (r.entries||[]).length + 1;
    return {...r, entries:[...(r.entries||[]), { id: Date.now(), name:`Entry ${n}`, items:[] }]};
  }));
  const removeEntry = (rid, eid) => setRounds(p => p.map(r =>
    r.id !== rid ? r : {...r, entries: (r.entries||[]).filter(e => e.id !== eid)}
  ));
  const addItemToEntry = (rid, eid, items) => setRounds(p => p.map(r => {
    if (r.id !== rid) return r;

      if (e.id !== eid) return e;
      const existing = new Set((e.items||[]).map(i => i.type+":"+i.refId));
      const toAdd = items.filter(i => !existing.has(i.type+":"+i.refId));
      return {...e, items:[...e.items, ...toAdd]};
    })};
  }));
  const removeItemFromEntry = (rid, eid, idx) => setRounds(p => p.map(r =>
    r.id !== rid ? r : {...r, entries: (r.entries||[]).map(e =>
      e.id !== eid ? e : {...e, items: (e.items||[]).filter((_,i) => i !== idx)}
    )}
  ));
  const reorderEntryItems = (rid, eid, fromIdx, toIdx) => setRounds(p => p.map(r => {
    if (r.id !== rid) return r;
    return {...r, entries: (r.entries||[]).map(e => {
      if (e.id !== eid) return e;
      const items = [...e.items];
      const [moved] = items.splice(fromIdx, 1);
      const adj = fromIdx < toIdx ? toIdx - 1 : toIdx;
      items.splice(adj, 0, moved);
      return {...e, items};
    })};
  }));

  // find which entry in a round already contains an item
  const findDupes = (round, type, refId) => {
    const found = [];
    (round.entries||[]).forEach(e => {
      if (e.items.some(i => i.type === type && i.refId === refId)) found.push(e.name);
    });
    return found;
  };

  // ── Drag within entry items ─────────────────────────────────────────────────
  const entryDragItem = useRef(null);
  const [entryDragOver, setEntryDragOver] = useState(null);

  // ── Sets CRUD ────────────────────────────────────────────────────────────────
  const addSet = name => setSets(p => [...p, { id:Date.now(), name, color:PRESET_COLORS[1], notes:"", mastery:0, date:new Date().toISOString().split("T")[0] }]);
  const deleteSet = sid => setSets(p => p.filter(s => s.id !== sid));
  const updateSet = (sid, fields) => setSets(p => p.map(s => s.id === sid ? {...s,...fields} : s));

  const masteryColor = p => p < 30 ? C.red : p < 60 ? C.yellow : p < 80 ? C.blue : C.green;

  // ── PLAN layout ─────────────────────────────────────────────────────────────
  const PlanView = () => {
    return (
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 14px", borderBottom:`1px solid ${C.border}`, background:C.surface, flexShrink:0 }}>

          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
            <button onClick={()=>setConfirmRestore(true)}

                color:C.textMuted, padding:"3px 8px", fontSize:10, fontFamily:FONT_DISPLAY, fontWeight:700,
                display:"flex", alignItems:"center", gap:3 }}>
              ↺
            </button>
            <button onClick={()=>setShowLoadTemplate(true)}
              style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, cursor:"pointer",
                color:C.textMuted, padding:"3px 8px", fontSize:10, fontFamily:FONT_DISPLAY, fontWeight:700,
                display:"flex", alignItems:"center", gap:3 }}
              title="Load a saved battle template">
              📂 Load{templates.length>0&&<span style={{ marginLeft:3, background:C.accent, color:"#fff", borderRadius:8, padding:"0 5px", fontSize:9 }}>{templates.length}</span>}
            </button>
            <button onClick={()=>{ setTemplateName(""); setShowSaveTemplate(true); }}

              💾 Save
            </button>
            <button onClick={()=>setAddingRound(true)}
              style={{ background:C.accent, border:"none", borderRadius:6, cursor:"pointer",

            </button>
          </div>
        </div>

        {/* Confirm restore modal */}
        {confirmRestore&&(
          <Modal title="RESTORE DEFAULT ROUNDS" onClose={()=>setConfirmRestore(false)}>

            <div style={{ background:C.surfaceAlt, borderRadius:8, padding:"10px 14px", marginBottom:16, fontSize:12, color:C.textSec, lineHeight:1.9 }}>

            </div>
            <p style={{ color:C.accent, fontWeight:700, fontSize:12, marginBottom:20, lineHeight:1.6 }}>
              ⚠️ All your current rounds and their entries will be permanently erased. This cannot be undone.
            </p>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <Btn variant="secondary" onClick={()=>setConfirmRestore(false)}>{t("cancel")}</Btn>
              <Btn variant="danger" onClick={()=>{ setRounds(INIT_ROUNDS); setConfirmRestore(false); }}>Yes, Restore</Btn>
            </div>
          </Modal>
        )}

        {/* Save Template Modal */}
        {showSaveTemplate&&(
          <Modal title="SAVE BATTLE TEMPLATE" onClose={()=>setShowSaveTemplate(false)}>
            <p style={{ fontSize:13, color:C.textSec, marginBottom:14, lineHeight:1.6 }}>
              Saves your current round structure and all entries as a reusable template.
            </p>
            <div style={{ marginBottom:6 }}>
              <label style={lbl()}>TEMPLATE NAME *</label>
              <input autoFocus value={templateName} onChange={e=>setTemplateName(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter") saveTemplate(); }}
                placeholder="e.g. Red Bull BC One, Local Jam, 2v2 Format…"
                style={{ width:"100%", background:C.surface, border:`1.5px solid ${C.accent}`, borderRadius:8,
                  padding:"9px 12px", color:C.text, fontSize:14, outline:"none", fontFamily:FONT_BODY, boxSizing:"border-box" }}/>
            </div>
            <div style={{ fontSize:11, color:C.textMuted, marginBottom:20, marginTop:6 }}>
              {rounds.length} round{rounds.length!==1?"s":""} will be saved ·{" "}
              {rounds.reduce((n,r)=>n+(r.entries?.length||0),0)} entr{rounds.reduce((n,r)=>n+(r.entries?.length||0),0)!==1?"ies":"y"} total
            </div>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <Btn variant="secondary" onClick={()=>setShowSaveTemplate(false)}>Cancel</Btn>

          </Modal>

        {/* Load Template Modal */}
        {showLoadTemplate&&!confirmLoadTpl&&!confirmDeleteTpl&&(
          <Modal title="LOAD BATTLE TEMPLATE" onClose={()=>setShowLoadTemplate(false)}>
            {templates.length===0 ? (

                {templates.map(tpl=>(

                      <div style={{ fontSize:11, color:C.textMuted, marginTop:3 }}>
                        {tpl.rounds.length} round{tpl.rounds.length!==1?"s":""} ·{" "}
                        {tpl.rounds.reduce((n,r)=>n+(r.entries?.length||0),0)} entr{tpl.rounds.reduce((n,r)=>n+(r.entries?.length||0),0)!==1?"ies":"y"} · Saved {tpl.savedAt}
                      </div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:5 }}>
                        {tpl.rounds.slice(0,6).map(r=>(

        {/* Confirm Delete Template */}

        {/* Rounds list */}
        <div style={{ flex:1, overflow:"auto", padding:"10px 12px" }}>
          {rounds.length === 0 && (
            <div style={{ textAlign:"center", padding:40, color:C.textMuted }}>
              <div style={{ fontSize:28, marginBottom:8 }}>⚔</div>
              <p style={{ fontSize:12 }}>No rounds yet — tap ADD to create one</p>
            </div>
          )}
          {rounds.map(round => {

            const entryCount = (round.entries||[]).length;
            return (
              <div key={round.id} style={{ marginBottom:8, borderRadius:10, border:`1.5px solid ${C.border}`, overflow:"hidden", background:C.bg }}>

                <div style={{ height:3, background:`linear-gradient(90deg,${rColor},${rColor}55)` }}/>
                {/* Round header */}
                <div style={{ display:"flex", alignItems:"center", padding:"9px 12px", gap:6 }}>
                  {/* Chevron toggle */}

                    <Ic n={isOpen?"chevD":"chevR"} s={13} c={rColor}/>
                  </button>
                  {/* Title — tap to edit */}
                  <span onClick={()=>setEditRound(round)}
                    style={{ flex:1, fontWeight:800, fontSize:13, color:C.brown, fontFamily:FONT_DISPLAY, letterSpacing:0.8, cursor:"pointer" }}>
                    {round.name}
                  </span>
                  <span style={{ fontSize:10, color:rColor, fontWeight:700, fontFamily:FONT_DISPLAY, flexShrink:0 }}>
                    {entryCount} {entryCount===1?"entry":"entries"}

                  <button onClick={()=>setEditRound(round)}
                    style={{ background:"none", border:"none", cursor:"pointer", padding:3, display:"flex", flexShrink:0 }}>
                    <Ic n="edit" s={12} c={C.textMuted}/>

                  <button onClick={()=>deleteRound(round.id)}
                    style={{ background:"none", border:"none", cursor:"pointer", padding:3, display:"flex", flexShrink:0 }}>
                    <Ic n="x" s={13} c={C.accent}/>
                  </button>
                </div>
                {/* Entries — expanded by default */}
                {isOpen && (round.entries||[]).map(entry => (
                  <div key={entry.id}
                    style={{ borderTop:`1px solid ${C.borderLight}`, padding:"6px 12px 6px 28px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                      <Ic n="chevR" s={10} c={C.textMuted}/>
                      <span style={{ fontSize:11, fontWeight:700, color:C.brownMid, fontFamily:FONT_DISPLAY, flex:1 }}>{entry.name}</span>
                      <span style={{ fontSize:9, color:C.textMuted }}>{(entry.items||[]).length} items</span>
                    </div>
                    {(entry.items||[]).map((item,i) => {
                      const label = item.type==="move" ? getMove(item.refId)?.name : getSet(item.refId)?.name;
                      if (!label) return null;

                        <div key={i} style={{ fontSize:10, color:C.textMuted, paddingLeft:14, paddingTop:2, display:"flex", alignItems:"center", gap:4 }}>

                          <span>{label}</span>

                      );
                    })}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ── Edit Round full-screen ───────────────────────────────────────────────────
  // EditRoundView is defined as a top-level component below ReadyPage

  // ── Vocab Picker overlay ─────────────────────────────────────────────────────
  const VocabPicker = ({ pickerState }) => {
    const t = useT();
  const { entryId, applyLocal } = pickerState;
    const q = pickerSearch.toLowerCase().trim();
    const toggleSel = (type, refId) => {
      const key = type+":"+refId;
      setPickerSel(p => p.some(i=>i.type+":"+i.refId===key) ? p.filter(i=>i.type+":"+i.refId!==key) : [...p,{type,refId}]);

      if (pickerState.applyLocal) pickerState.applyLocal(entryId, pickerSel);

          <button onClick={()=>setPickerEntry(null)} style={{ background:"none", border:"none", cursor:"pointer", color:C.accent, fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700, padding:0 }}>← Back</button>
          <span style={{ flex:1, fontWeight:900, fontSize:14, letterSpacing:1.5, color:C.brown, fontFamily:FONT_DISPLAY }}>{t("addToEntry")}</span>
          {pickerSel.length>0&&<span style={{ fontSize:11, color:C.accent, fontWeight:700, fontFamily:FONT_DISPLAY }}>{pickerSel.length} selected</span>}

                    style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 14px",

                    <div style={{ width:16, height:16, borderRadius:4, border:`2px solid ${sel?C.accent:C.border}`,

  // ── Sets detail modal ─────────────────────────────────────────────────────────

              placeholder={t("describeSet")}
              style={{ width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"9px 12px", color:C.text, fontSize:13, outline:"none", boxSizing:"border-box", fontFamily:FONT_BODY, resize:"vertical", marginBottom:14 }}/>

  // ── Sub-tab bar ──────────────────────────────────────────────────────────────

  return (
    <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column", position:"relative" }}>

              borderBottom: battleTab===id ? `2px solid ${C.accent}` : "2px solid transparent" }}>

      </div>

      {/* PLAN tab */}
      {battleTab==="plan"&&(
        <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column", position:"relative" }}>
          <PlanView/>
          {editRound&&<EditRoundView round={editRound}
            onSave={updateRound} onClose={()=>setEditRound(null)}
            getMove={getMove} getSet={getSet}
            setPickerEntry={setPickerEntry} setPickerSearch={setPickerSearch} setPickerSel={setPickerSel}
            showMoveCount={showMoveCount}/>}
          {pickerEntry&&<VocabPicker pickerState={pickerEntry}/>}
        </div>
      )}

      {/* FREESTYLE tab */}
      {battleTab==="freestyle"&&<FreestylePage moves={moves} sets={sets} settings={settings}/>}

      {/* Modals */}
      {addingRound&&<NameModal title="NEW ROUND" placeholder="e.g. Semi Finals…" onClose={()=>setAddingRound(false)}
        onConfirm={name=>{ addRound(name); setAddingRound(false); }}/>}
      {addingSet&&<NameModal title="NEW SET" placeholder="e.g. Opening Combo…" onClose={()=>setAddingSet(false)}
        onConfirm={name=>{ addSet(name); setAddingSet(false); }}/>}
      {editSet&&<SetDetailModal set={editSet} onClose={()=>setEditSet(null)}/>}
    </div>
  );
};

// ─── WALKTHROUGH OVERLAY ───────────────────────────────────────────────────────
const TOUR_STEPS = [
  { type:"center",    emoji:"🕺", title:"WELCOME TO MOVESBOOK", cta:"LET'S GO →",
    body:"Your personal breaking tracker. Let's take a 30-second tour so you know where everything lives." },
  { type:"spotlight", emoji:"🎯", title:"TRAIN",   target:"tour-tab-ideas", pos:"below",
    body:"Set goals, capture ideas, and decide what to focus on in your next session." },
  { type:"spotlight", emoji:"📜", title:"MOVES",   target:"tour-tab-wip",   pos:"below",
    body:"Your move library. Add every move you know, track your mastery, and keep it growing." },
  { type:"spotlight", emoji:"⚔️", title:"BATTLE",  target:"tour-tab-ready", pos:"below",
    body:"Plan your sets and rounds for battle, or freestyle through your full arsenal." },
  { type:"spotlight", emoji:"👤", title:"PROFILE", target:"tour-profile",   pos:"below",
    body:"Make it yours. Set your b-boy / b-girl name, when you started breaking, and remind yourself why you're doing it." },
  { type:"center",    emoji:"🔥", title:"YOU'RE ALL SET.", cta:"LET'S GET IT",
    body:"Go add your first move. The rest will follow." },
];

const Walkthrough = ({ onDone }) => {
  const [step,setStep] = useState(0);
  const [rect,setRect] = useState(null);
  const [fade,setFade] = useState(true);
  const current = TOUR_STEPS[step];
  const isLast  = step === TOUR_STEPS.length - 1;

  useEffect(()=>{
    if (current.type==="spotlight" && current.target) {
      const el = document.getElementById(current.target);
      if (el) {
        const r = el.getBoundingClientRect();
        setRect({ top:r.top, left:r.left, width:r.width, height:r.height });
      } else { setRect(null); }
    } else { setRect(null); }
  },[step]);

  const advance = () => {
    setFade(false);
    setTimeout(()=>{ if(isLast){ onDone(); return; } setStep(s=>s+1); setFade(true); },180);
  };

  const tooltipStyle = () => {
    if (!rect) return { top:"50%", left:"50%", transform:"translate(-50%,-50%)" };
    const PAD=12, TW=260;
    const appEl = document.getElementById("movesbook-root");
    const appRect = appEl ? appEl.getBoundingClientRect() : { left:0 };
    const cx = rect.left + rect.width/2 - appRect.left;
    return {
      position:"absolute",
      top: rect.top + rect.height + PAD,
      left: Math.max(10, Math.min(cx - TW/2, (appEl?.offsetWidth||window.innerWidth) - TW - 10)),
      width: TW,
    };
  };

  const dots = (
    <div style={{ display:"flex", gap:5 }}>
      {TOUR_STEPS.map((_,i)=>(
        <div key={i} style={{ width:i===step?14:5, height:5, borderRadius:3,
          background:i===step?"#cf0000":i<step?"#5a2a1a":"#2a1a0a", transition:"all 0.2s" }}/>
      ))}
    </div>
  );

  return (
    <div style={{ position:"fixed", inset:0, zIndex:10000,
      opacity:fade?1:0, transition:"opacity 0.18s ease" }}>

      {current.type==="center" ? (
        <div style={{ position:"absolute", inset:0, background:"rgba(10,5,2,0.92)" }}/>
      ) : (
        <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%" }}>
          <defs>
            <mask id="tour-mask">
              <rect width="100%" height="100%" fill="white"/>
              {rect&&<rect x={rect.left-6} y={rect.top-6} width={rect.width+12} height={rect.height+12} rx={10} fill="black"/>}
            </mask>
          </defs>
          <rect width="100%" height="100%" fill="rgba(10,5,2,0.88)" mask="url(#tour-mask)"/>
          {rect&&<rect x={rect.left-6} y={rect.top-6} width={rect.width+12} height={rect.height+12} rx={10}
            fill="none" stroke="#cf0000" strokeWidth="2" style={{ filter:"drop-shadow(0 0 8px rgba(207,0,0,0.6))" }}/>}
        </svg>
      )}

      {current.type==="center" && (
        <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center",
          justifyContent:"center", padding:24, flexDirection:"column", gap:0 }}>
          <div style={{ background:"#1c1008", border:"1px solid #3a2a1a", borderRadius:20,
            padding:"32px 28px", maxWidth:320, width:"100%", textAlign:"center",
            boxShadow:"0 24px 80px rgba(0,0,0,0.7)" }}>
            <div style={{ fontSize:44, marginBottom:14 }}>{current.emoji}</div>
            <div style={{ fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:18,
              letterSpacing:3, color:"#e8d5b0", marginBottom:12 }}>{current.title}</div>
            <p style={{ fontSize:14, color:"#9a8a7a", lineHeight:1.6, marginBottom:24 }}>{current.body}</p>
            <button onClick={advance} style={{ width:"100%", background:"#8b1a1a", border:"none",
              borderRadius:10, padding:13, color:"#fff", fontFamily:FONT_DISPLAY, fontWeight:900,
              fontSize:14, letterSpacing:2.5, cursor:"pointer", boxShadow:"0 4px 20px rgba(139,26,26,0.5)" }}>
              {current.cta}
            </button>
            {step===0&&<button onClick={onDone} style={{ marginTop:14, background:"none", border:"none",
              color:"#4a3a2a", fontSize:12, cursor:"pointer", fontFamily:FONT_DISPLAY, letterSpacing:1 }}>
              Skip tour
            </button>}
          </div>
          <div style={{ marginTop:20 }}>{dots}</div>
        </div>
      )}

      {current.type==="spotlight" && (
        <div style={{ ...tooltipStyle(), background:"#1c1008", border:"1px solid #3a2a1a",
          borderRadius:14, padding:"16px 18px", boxShadow:"0 16px 60px rgba(0,0,0,0.8)", position:"absolute" }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
            <span style={{ fontSize:20 }}>{current.emoji}</span>
            <span style={{ fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:16,
              letterSpacing:2.5, color:"#e8d5b0" }}>{current.title}</span>
          </div>
          <p style={{ fontSize:13, color:"#9a8a7a", lineHeight:1.5, margin:"0 0 14px" }}>{current.body}</p>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            {dots}
            <button onClick={advance} style={{ background:"#8b1a1a", border:"none", borderRadius:8,
              padding:"8px 16px", color:"#fff", fontFamily:FONT_DISPLAY, fontWeight:900,
              fontSize:12, letterSpacing:2, cursor:"pointer" }}>
              {isLast?"DONE":"NEXT →"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
};

const FEEDBACK_TYPES = [
  { id:"bug",     emoji:"🐛", label:"Bug Report",       q1:"What happened?",                    q2:"What were you trying to do?",         q2opt:true  },
  { id:"feature", emoji:"💡", label:"Feature Request",  q1:"What would you like to see?",       q2:"Why would it help you?",              q2opt:true  },

const FeedbackModal = ({ onClose }) => {
  const { C } = useSettings();
  const [type,   setType]   = useState(null);
  const [msg1,   setMsg1]   = useState("");
  const [msg2,   setMsg2]   = useState("");
  const [name,   setName]   = useState("");
  const [email,  setEmail]  = useState("");
  const [status, setStatus] = useState("idle"); // idle | sending | done | error

  const selected = FEEDBACK_TYPES.find(f=>f.id===type);

  const send = async () => {
    if (!selected || !msg1.trim()) return;
    setStatus("sending");
    try {
      await emailjs.send(
        "service_3bmzxw4",
        "template_skmmjbi",
        {
          type:      selected.emoji + " " + selected.label,
          message:   msg1.trim() + (msg2.trim() ? "\n\n" + selected.q2 + ":\n" + msg2.trim() : ""),
          user_name: name.trim() || "Anonymous",
          user_email: email.trim() || "—",
        }
      );
      setStatus("done");
    } catch(e) {
      console.error(e);
      setStatus("error");
    }
  };

  const overlayStyle = {
    position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:900,
    display:"flex", alignItems:"flex-end", justifyContent:"center",
  };
  const sheetStyle = {
    background:C.bg, borderRadius:"18px 18px 0 0", width:"100%", maxWidth:520,
    maxHeight:"90vh", overflowY:"auto", padding:"24px 20px 36px",
    boxShadow:"0 -8px 40px rgba(0,0,0,0.25)",
  };
  const inp = {
    width:"100%", background:C.surface, border:`1px solid ${C.border}`,
    borderRadius:8, padding:"10px 12px", color:C.text, fontSize:14,
    outline:"none", boxSizing:"border-box", fontFamily:FONT_BODY, resize:"vertical",
  };

  // ── DONE screen ──
  if (status === "done") return (
    <div style={overlayStyle} onClick={onClose}>
      <div style={{...sheetStyle, textAlign:"center", padding:"40px 24px 48px"}} onClick={e=>e.stopPropagation()}>
        <div style={{ fontSize:52, marginBottom:16 }}>🙏</div>
        <div style={{ fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:22, letterSpacing:2, color:C.text, marginBottom:12 }}>
          THANK YOU!
        </div>
        <div style={{ fontSize:14, color:C.textSec, lineHeight:1.7, marginBottom:28 }}>
          Your feedback means a lot and helps make MovesBook better for every b-boy and b-girl out there.{"\n\n"}We read every single message. 🕺
        </div>
        <button onClick={onClose} style={{ padding:"12px 32px", background:C.accent, color:"#fff",
          border:"none", borderRadius:10, fontFamily:FONT_DISPLAY, fontWeight:800,
          fontSize:14, letterSpacing:1.5, cursor:"pointer" }}>
          CLOSE
        </button>
      </div>
    </div>
  );

  return (
    <div style={overlayStyle} onClick={onClose}>
      <div style={sheetStyle} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <div>
            <div style={{ fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:18, letterSpacing:2, color:C.text }}>
              SEND FEEDBACK
            </div>
            <div style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>
              Help us improve MovesBook
            </div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer",
            color:C.textMuted, fontSize:22, lineHeight:1, padding:4 }}>×</button>
        </div>

        {/* Type selector */}
        <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.textSec,
          fontFamily:FONT_DISPLAY, marginBottom:10 }}>WHAT KIND OF FEEDBACK?</div>
        <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:20 }}>
          {FEEDBACK_TYPES.map(ft=>(
            <button key={ft.id} onClick={()=>{ setType(ft.id); setMsg1(""); setMsg2(""); }}
              style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px",
                background: type===ft.id ? C.accent+"18" : C.surface,
                border: `2px solid ${type===ft.id ? C.accent : C.border}`,
                borderRadius:10, cursor:"pointer", textAlign:"left",
                transition:"all 0.15s" }}>
              <span style={{ fontSize:22 }}>{ft.emoji}</span>
              <span style={{ fontFamily:FONT_DISPLAY, fontWeight:800, fontSize:14,
                letterSpacing:1, color: type===ft.id ? C.accent : C.text }}>
                {ft.label}
              </span>
            </button>
          ))}
        </div>

        {/* Dynamic fields */}
        {selected && (<>
          <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.textSec,
            fontFamily:FONT_DISPLAY, marginBottom:8 }}>{selected.q1.toUpperCase()}</div>
          <textarea value={msg1} onChange={e=>setMsg1(e.target.value)} rows={4}
            placeholder={selected.q1 + "…"}
            style={{ ...inp, marginBottom:16 }}/>

          {selected.q2 && (<>
            <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.textSec,

          <input value={name} onChange={e=>setName(e.target.value)}
            placeholder="How should we call you?"
            style={{ ...inp, marginBottom:14 }}/>

          <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.textSec,
            fontFamily:FONT_DISPLAY, marginBottom:8 }}>
            YOUR EMAIL <span style={{ fontWeight:400, color:C.textMuted, letterSpacing:0 }}>· optional</span>

          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}

            style={{ ...inp, marginBottom:8 }}/>
          <div style={{ fontSize:11, color:C.textMuted, marginBottom:20, fontStyle:"italic" }}>
            We'll only use it to follow up on your feedback. No spam, ever.
          </div>

          {status === "error" && (
            <div style={{ fontSize:12, color:"#c0391b", marginBottom:12, textAlign:"center" }}>
              Something went wrong. Please try again.
            </div>
          )}

          <button onClick={send} disabled={!msg1.trim() || status==="sending"}
            style={{ width:"100%", padding:"13px", background: !msg1.trim() ? C.border : C.accent,
              color: !msg1.trim() ? C.textMuted : "#fff", border:"none", borderRadius:10,
              fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:15, letterSpacing:2,
              cursor: !msg1.trim() ? "default" : "pointer", transition:"all 0.2s" }}>
            {status==="sending" ? "SENDING…" : "SEND FEEDBACK"}
          </button>
        </>)}

      </div>
    </div>
  );
};

// ── Firebase stubs for preview ──
if (typeof window !== "undefined") {
  window.__MB_USER__ = window.__MB_USER__ || null;
  window.__MB_DB__   = window.__MB_DB__   || null;
}
// ── SCHEMA & MIGRATION ───────────────────────────────────────────────────────
const SCHEMA_VERSION = "5";

function migrateMove(m) {
  return {
    id:       m.id       || Date.now(),
    name:     m.name     || "",
    category: m.category || "Footworks",
    mastery:  typeof m.mastery === "number" ? m.mastery : 0,
    status:   m.status   || "ideas",
    notes:    m.notes    || "",
    link:     m.link     || "",
    date:     m.date     || Date.now(),
  };
}

function loadLocal(key, fallback) {
  try {
    const v = localStorage.getItem("mb_data_version");
    if (v !== SCHEMA_VERSION) return fallback;
    const s = localStorage.getItem(key);
    return s ? JSON.parse(s) : fallback;
  } catch { return fallback; }
}

function saveLocal(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

function App() {
  const [tab,setTab]=useState("wip");

  // ── Data state ─────────────────────────────────────────────────────────────
  const [moves,  setMoves]  = useState(() => {
    const raw = loadLocal("mb_moves", INIT_MOVES);
    return Array.isArray(raw) ? raw.map(migrateMove) : INIT_MOVES;
  });
  const [sets,   setSets]   = useState(() => loadLocal("mb_sets",    INIT_SETS));
  const [rounds, setRounds] = useState(() => { const r = loadLocal("mb_rounds", INIT_ROUNDS); return (Array.isArray(r) && r.length > 0) ? r : INIT_ROUNDS; });
  const [profile, setProfile] = useState(() => loadLocal("mb_profile", {
    nickname:"", age:"", gender:"", goals:"", years:"",
    startYear:"", startMonth:"", startDay:"", why:""
  }));

  // ── Persist to localStorage on every change ────────────────────────────────
  useEffect(()=>{ saveLocal("mb_moves",   moves);   },[moves]);
  useEffect(()=>{ saveLocal("mb_sets",    sets);    },[sets]);
  useEffect(()=>{ saveLocal("mb_rounds",  rounds);  },[rounds]);
  useEffect(()=>{ saveLocal("mb_profile", profile); },[profile]);

  // ── Firestore sync ─────────────────────────────────────────────────────────
  const [fbUser, setFbUser] = useState(null);
  const dbSave = useRef({});

  useEffect(() => {
    const save = (key, ms=1500) => debounce(
      (uid, val) => window.__MB_DB__?.save(uid, key, val), ms
    );
    dbSave.current = {
      moves:    save("moves"),
      sets:     save("sets"),
      rounds:   save("rounds"),
      profile:  save("profile"),
      ideas:    save("ideas"),
      settings: save("settings"),
    };
  }, []);

  useEffect(()=>{ if(fbUser?.uid) dbSave.current.moves?.(fbUser.uid,   moves);   },[moves,   fbUser]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.sets?.(fbUser.uid,    sets);    },[sets,    fbUser]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.rounds?.(fbUser.uid,  rounds);  },[rounds,  fbUser]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.profile?.(fbUser.uid, profile); },[profile, fbUser]);

  // ── Auth resolution ────────────────────────────────────────────────────────
  useEffect(()=>{
    function handleAuthResolved() {
      if (window.__MB_USER__) {
        setFbUser(window.__MB_USER__);
        try {
          const m = localStorage.getItem("mb_moves");
          const s = localStorage.getItem("mb_sets");
          const r = localStorage.getItem("mb_rounds");
          const p = localStorage.getItem("mb_profile");
          if (m) setMoves(JSON.parse(m).map(migrateMove));
          if (s) setSets(JSON.parse(s));
          if (r) { const parsed = JSON.parse(r); setRounds(parsed.length > 0 ? parsed : INIT_ROUNDS); }
          const tpl = localStorage.getItem("mb_templates");
          if (tpl) { try { setTemplatesSynced(JSON.parse(tpl)); } catch {} }
          if (p) setProfile(JSON.parse(p));
          const st = localStorage.getItem("mb_settings");
          if (st) setAppSettings(prev=>({...prev,...JSON.parse(st)}));
          localStorage.setItem("mb_data_version", SCHEMA_VERSION);
        } catch {}
      } else {
        setFbUser(null);
        setMoves(INIT_MOVES);
        setSets(INIT_SETS);
        setRounds(INIT_ROUNDS);
        setProfile({ nickname:"", age:"", gender:"", goals:"", years:"",
          startYear:"", startMonth:"", startDay:"", why:"" });
      }
    }
    window.addEventListener("mb-auth-resolved", handleAuthResolved);
    if (window.__MB_USER__) handleAuthResolved();
    return () => window.removeEventListener("mb-auth-resolved", handleAuthResolved);
  },[]);

  const [toasts,setToasts]=useState([]);
  const [ideaToMove,setIdeaToMove]=useState(null);
  const [showProfile,setShowProfile]=useState(false);
  const [showFeedback,setShowFeedback]=useState(false);
  const [zoom, setZoom] = useState(1);
  const zoomMin=0.6, zoomMax=1.4, zoomStep=0.1;
  const [addTick, setAddTick] = useState(0);
  const triggerAdd = () => setAddTick(t=>t+1);
  const [trainModal,  setTrainModal]  = useState({});
  const [trainMenu,   setTrainMenu]   = useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [showTour,setShowTour]=useState(false);
  const [appSettings,setAppSettings]=useState(()=>({
    ...{
      theme:"light", defaultTab:"wip", showMastery:false, autoGraduate:true,
      compactCards:false, sortMoves:"date", fontSize:"medium",
      showReadyBadge:true, showMoveCount:false, confirmDelete:true, practiceReminders:false,
      reminderTime:"18:00", streakTracking:true, hideFullyMastered:false,
      categorySort:"manual", accentColor:"crimson", defaultView:"list", language:"en", linkOnCard:"inside", targetAutoLink:false,
    },
    ...loadLocal("mb_settings", {}),
  }));
  useEffect(()=>{ saveLocal("mb_settings", appSettings); },[appSettings]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.settings?.(fbUser.uid, appSettings); },[appSettings, fbUser]);

  // ── Apply theme: mutate the shared C object so all components re-read it ──
  const newPalette = buildPalette(appSettings.theme, appSettings.accentColor);
  Object.assign(C, newPalette);

  // Font scale — inject into document root so all px-based sizes scale via CSS zoom
  const fontScale = FONT_SIZES[appSettings.fontSize] || 1;
  // Card padding scale
  const cardPad = appSettings.compactCards ? "6px 8px" : "10px 12px";
  const cardFontSize = appSettings.compactCards ? 11 : 13;

  const addToast=useCallback(t=>{ const id=Date.now(); setToasts(prev=>[...prev,{...t,id}]); setTimeout(()=>setToasts(prev=>prev.filter(x=>x.id!==id)),5500); },[]);
  const removeToast=id=>setToasts(prev=>prev.filter(t=>t.id!==id));

  const setMovesGrad = useCallback(updater => {
    setMoves(prev => typeof updater==="function" ? updater(prev) : updater);
  }, []);

  const handleAddMoveFromIdea = (text) => { setIdeaToMove(text); setTab("wip"); };
  const handleTourDone = () => {
    setShowTour(false);
    if (fbUser?.uid) localStorage.setItem('mb_toured_' + fbUser.uid, '1');
  };

  // Apply hideFullyMastered filter for Vocab display
  const vocabMoves = appSettings.hideFullyMastered
    ? moves.filter(m=>!(m.status==="wip"&&m.mastery>=100))
    : moves;

  return (
    <SettingsCtx.Provider value={{ settings:appSettings, C, cardPad, cardFontSize }}>
      <style>{`
        #movesbook-root { zoom: ${fontScale}; }
        #movesbook-root * { box-sizing: border-box; }
      `}</style>
      <div id="movesbook-root" style={{ fontFamily:FONT_BODY, background:C.bg, color:C.text,
        height:"100vh", width:"100%", display:"flex", flexDirection:"column",
        boxShadow:"0 0 60px rgba(0,0,0,0.35)", overflow:"hidden", transition:"background 0.3s, color 0.3s" }}>

        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"10px 16px", background:C.header, borderBottom:`2px solid ${C.border}`, flexShrink:0 }}>
          <div style={{ display:"flex", alignItems:"baseline", gap:0 }}>
            <span style={{ fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:24, letterSpacing:4 }}>
              <span style={{ color:"#cf0000", WebkitTextStroke: appSettings.theme==="dark" ? "0.5px rgba(255,255,255,0.6)" : "none" }}>MOVES</span><span style={{ color:C.headerText, WebkitTextStroke: appSettings.theme==="dark" ? "0.5px rgba(255,255,255,0.6)" : "none" }}>BOOK</span>
            </span>
            {profile.nickname&&(
              <span style={{ fontFamily:FONT_BODY, fontSize:13, color:C.textMuted, marginLeft:7, fontWeight:500, letterSpacing:0.3 }}>
                of {profile.nickname}
              </span>
            )}
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            {fbUser?.photo
              ? <button id="tour-profile" onClick={()=>setShowProfile(true)} style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex", borderRadius:"50%", overflow:"hidden" }}>
                  <img src={fbUser.photo} alt={fbUser.name} style={{ width:26, height:26, borderRadius:"50%", objectFit:"cover", border:`1.5px solid ${C.border}` }}/>
                </button>
              : <button id="tour-profile" onClick={()=>setShowProfile(true)} style={{ background:"none", border:"none", cursor:"pointer", color:C.brownLight, padding:5 }}><Ic n="user" s={17} c={C.brownLight}/></button>
            }
            <button onClick={()=>setShowSettings(true)} style={{ background:"none", border:"none", cursor:"pointer", color:C.brownLight, padding:5 }}><Ic n="cog" s={17} c={C.brownLight}/></button>
          </div>
        </div>

        <TabBar active={tab} onChange={setTab}/>

        <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column", position:"relative" }}>
          {/* Train modals + menu — inside position:relative so absolute children are scoped to app width */}
          {(trainModal.type==="note"||trainModal.type==="goal"||trainModal.type==="target")&&(
            <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)", zIndex:3000, display:"flex", alignItems:"center", justifyContent:"center", padding:10 }}>
              {trainModal.type==="note"&&<NoteModal
                idea={trainModal.idea}
                onClose={()=>setTrainModal({})}
                onSave={fields=>{ trainModal.onSave(fields); setTrainModal({}); }}/>}
              {trainModal.type==="goal"&&<GoalModal
                idea={trainModal.idea}
                onClose={()=>setTrainModal({})}
                onSave={fields=>{ trainModal.onSave(fields); setTrainModal({}); }}/>}
              {trainModal.type==="target"&&<TargetGoalModal
                idea={trainModal.idea}
                moves={moves}
                onClose={()=>setTrainModal({})}
                onSave={fields=>{ trainModal.onSave(fields); setTrainModal({}); }}/>}
            </div>
          )}
          <IdeaMenu menu={trainMenu} onClose={()=>setTrainMenu(null)}/>
          <TrainModalCtx.Provider value={{ openModal:(type,idea,onSave)=>setTrainModal({type,idea,onSave}) }}>
          <TrainMenuCtx.Provider value={{ openMenu:(m)=>setTrainMenu(m), closeMenu:()=>setTrainMenu(null) }}>
            {tab==="ideas" && <ZoomWrap zoom={zoom}><IdeasPage onAddMove={handleAddMoveFromIdea} onAddTrigger={addTick}/></ZoomWrap>}
          </TrainMenuCtx.Provider>
          </TrainModalCtx.Provider>
          {tab==="wip"   && <ZoomWrap zoom={zoom}><WIPPage moves={vocabMoves} setMoves={setMovesGrad} sets={sets} setSets={setSets} addToast={addToast} pendingDesc={ideaToMove} clearPendingDesc={()=>setIdeaToMove(null)} settings={appSettings} onAddTrigger={addTick}/></ZoomWrap>}
          {tab==="ready" && <ZoomWrap zoom={zoom}><ReadyPage moves={moves} sets={sets} setSets={setSets} rounds={rounds} setRounds={setRounds} settings={appSettings} onAddTrigger={addTick}/></ZoomWrap>}
        </div>

        <Toast toasts={toasts} remove={removeToast}/>
        {showProfile&&<ProfileModal onClose={()=>setShowProfile(false)} profile={profile} onSave={setProfile}/>}
        {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} settings={appSettings} onSave={setAppSettings} onClearMoves={()=>setMoves([])} onRestoreRounds={()=>setRounds(INIT_ROUNDS)} onRestartTour={()=>setShowTour(true)} zoom={zoom} onZoomChange={setZoom}/> }
        {showTour&&<Walkthrough onDone={handleTourDone}/>}
        {showFeedback&&<FeedbackModal onClose={()=>setShowFeedback(false)}/>}

        {/* ── Bottom Bar ── */}
        {!showTour&&(
          <div style={{ display:"flex", alignItems:"stretch", borderTop:`2px solid ${C.border}`,
            background:C.bg, flexShrink:0, height:58, zIndex:100 }}>

            {/* 💬 Feedback */}
            <button onClick={()=>setShowFeedback(true)}
              style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center",
                justifyContent:"center", gap:3, background:"none", border:"none", cursor:"pointer",
                color: showFeedback ? C.accent : C.textMuted, transition:"color 0.15s" }}>
              <span style={{ fontSize:20, lineHeight:1 }}>💬</span>
              <span style={{ fontSize:9, fontFamily:FONT_DISPLAY, fontWeight:800, letterSpacing:1.2 }}>FEEDBACK</span>
            </button>

            {/* ＋ ADD — centre, accent pill */}
            <button onClick={triggerAdd}
              style={{ flex:"0 0 64px", display:"flex", flexDirection:"column", alignItems:"center",
                justifyContent:"center", gap:3, background:"none", border:"none", cursor:"pointer",
                position:"relative" }}>
              <div style={{ width:48, height:48, borderRadius:"50%", background:C.accent,
                display:"flex", alignItems:"center", justifyContent:"center",
                boxShadow:`0 4px 16px rgba(139,26,26,0.4)`,
                transform:"translateY(-10px)", transition:"transform 0.15s" }}
                onMouseEnter={e=>e.currentTarget.style.transform="translateY(-13px) scale(1.07)"}
                onMouseLeave={e=>e.currentTarget.style.transform="translateY(-10px) scale(1)"}>
                <Ic n="plus" s={22} c="#f5ede0"/>
              </div>
            </button>

            {/* ⚙️ Settings */}
            <button onClick={()=>setShowSettings(true)}
              style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center",
                justifyContent:"center", gap:3, background:"none", border:"none", cursor:"pointer",
                color: showSettings ? C.accent : C.textMuted, transition:"color 0.15s" }}>
              <Ic n="cog" s={20} c={showSettings ? C.accent : C.textMuted}/>
              <span style={{ fontSize:9, fontFamily:FONT_DISPLAY, fontWeight:800, letterSpacing:1.2 }}>SETTINGS</span>
            </button>

          </div>
        )}
      </div>
    </SettingsCtx.Provider>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script>
    (function() {
      var splash = document.getElementById('splash');
      var root   = document.getElementById('root');
      var t = setInterval(function() {
        if (root.children.length > 0) {
          clearInterval(t);
          splash.style.display = 'none';
          root.style.display = 'flex';
          // Notify Firebase that React is ready
          window.dispatchEvent(new Event('mb-auth-resolved'));
        }
      }, 100);
    })();
  </script>
</body>
</html>
