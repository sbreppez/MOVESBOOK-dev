  // We get moves count from localStorage as a proxy (no prop needed)
  useEffect(() => {
    if (!ideaSettings2.targetAutoLink) return;
    try {
      const m = localStorage.getItem("mb_moves");
      const cnt = m ? JSON.parse(m).length : 0;
      setIdeas(p => p.map(i => (i.type==="target" && i.autoLink) ? {...i, current:cnt} : i));
    } catch {}
  }, [ideaSettings2.targetAutoLink]);
  const [search,     setSearch]     = useState("");
  const [showSearch, setShowSearch] = useState(false);

  const dragItem = useRef(null);
  const [dragOver,    setDragOver]    = useState(null);
  const [confirmDel,  setConfirmDel]  = useState(null); // holds idea to delete

  const addIdea   = (fields) => setIdeas(p=>[...p,{ id:Date.now(), ...fields }]);
  const del       = id => setIdeas(p=>p.filter(i=>i.id!==id));
  const askDelete = (idea) => setConfirmDel(idea);
  const save      = (id, fields) => setIdeas(p=>p.map(i=>i.id===id?{...i,...fields}:i));
  const incrTarget = (id) => setIdeas(p=>p.map(i=>i.id===id?{...i,current:Math.min((i.current||0)+1,i.target||9999)}:i));
  const decrTarget = (id) => setIdeas(p=>p.map(i=>i.id===id?{...i,current:Math.max(0,(i.current||0)-1)}:i));
  const dup       = id => { const orig=ideas.find(i=>i.id===id); if(orig) setIdeas(p=>[...p,{...orig,id:Date.now(),title:(orig.title||"")+" (copy)",pinned:false}]); };
  const changeColor = (id, color) => setIdeas(p=>p.map(i=>i.id===id?{...i,color}:i));
  const togglePin   = (id) => setIdeas(p=>p.map(i=>i.id===id&&i.type!=="goal"?{...i,pinned:!i.pinned}:i));

  const handleDragStart = (idx) => { dragItem.current = idx; };
  const handleDrop = (targetIdx) => {
    const from = dragItem.current;
    setDragOver(null);
    if (from === null || from === targetIdx) return;
    setIdeas(prev => {
      const next = [...prev];
      const [moved] = next.splice(from, 1);
      const insertAt = from < targetIdx ? targetIdx - 1 : targetIdx;
      next.splice(insertAt, 0, moved);
      return next;
    });
  };

  const q = search.toLowerCase().trim();
  const base = q ? ideas.filter(i=>(i.title||"").toLowerCase().includes(q)||(i.text||"").toLowerCase().includes(q)) : ideas;
  // Goals always first, then pinned notes, then rest
  const filtered = [
    ...base.filter(i=>i.type==="goal"),
    ...base.filter(i=>i.type!=="goal"&&i.pinned),
    ...base.filter(i=>i.type!=="goal"&&!i.pinned),
  ];

  // Split ideas by type for sub-tabs
  const goals = ideas.filter(i=>i.type==="goal"||i.type==="target");
  const notes = ideas.filter(i=>i.type==="note");

  return (
    <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>
      <SectionBanner tab="ideas"/>
      {/* Sub-tab nav */}
      <div style={{ display:"flex", background:C.surface, borderBottom:`2px solid ${C.border}`, flexShrink:0 }}>
        {[["goals","🎯 GOALS",goals.length],["notes","📝 NOTES",notes.length],["habits","🔥 HABITS",null]].map(([id,label,count])=>{
          const on = trainTab===id;
          return (
            <button key={id} onClick={()=>setTrainTab(id)}
              style={{ flex:1, padding:"9px 4px", border:"none", cursor:"pointer",
                background: on ? C.bg : "transparent",
                color: on ? C.accent : C.textSec,
                borderBottom:`3px solid ${on?C.accent:"transparent"}`,
                fontSize:11, fontWeight:800, letterSpacing:1, fontFamily:FONT_DISPLAY,
                display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
              {label}
              {count!==null&&<span style={{ fontSize:10, color:on?C.accent:C.textMuted,
                background:C.surfaceAlt, borderRadius:10, padding:"0 5px" }}>{count}</span>}
            </button>
          );
        })}
      </div>
      {/* Search + view toggle (only for goals/notes) */}
      {trainTab!=="habits"&&<div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"6px 14px", borderBottom:`1px solid ${C.borderLight}`, background:C.surface, flexShrink:0 }}>
        <span style={{ fontSize:12, fontWeight:700, letterSpacing:1.5, color:C.textMuted, fontFamily:FONT_DISPLAY }}>
          {trainTab==="goals"?"GOALS":"NOTES"} · {trainTab==="goals"?goals.length:notes.length}
        </span>
        <div style={{ display:"flex", gap:3 }}>
          <button onClick={()=>{ setShowSearch(s=>!s); setSearch(""); }}
            style={{ background:showSearch?C.surfaceAlt:"none", border:"none", cursor:"pointer", padding:5, borderRadius:5, color:showSearch?C.accent:C.textMuted }}>
            <Ic n="search" s={16}/>
          </button>
          <button onClick={()=>setView(v=>v==="list"?"tiles":"list")}
            style={{ background:"none", border:"none", cursor:"pointer", padding:5, borderRadius:5, color:C.textMuted }}>
            <Ic n={view==="list"?"grid":"list"} s={16}/>
          </button>
        </div>
      </div>}
      {trainTab==="habits" && <HabitsPage onAddTrigger={trainTab==="habits"?onAddTrigger:null}/>}
      {trainTab!=="habits"&&showSearch&&(
        <div style={{ padding:"6px 14px", background:C.surface, borderBottom:`1px solid ${C.borderLight}` }}>
          <div style={{ display:"flex", alignItems:"center", background:C.bg, borderRadius:7, padding:"5px 10px", gap:6, border:`1px solid ${search?C.accent:C.border}` }}>
            <Ic n="search" s={13} c={C.textMuted}/>
            <input autoFocus value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…"
              style={{ flex:1, background:"none", border:"none", outline:"none", color:C.text, fontSize:13, fontFamily:"inherit" }}/>
            {search&&<button onClick={()=>setSearch("")} style={{ background:"none", border:"none", cursor:"pointer", color:C.textMuted, padding:0, display:"flex" }}><Ic n="x" s={13}/></button>}
          </div>
          {search&&<div style={{ fontSize:11, color:C.textMuted, marginTop:4 }}>{filtered.length} result{filtered.length!==1?"s":""}</div>}
        </div>
      )}
      {trainTab!=="habits"&&<div style={{ flex:1, overflow:"auto", padding:10, paddingBottom:76 }}>
        <div
          style={view==="tiles"
            ? {display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}
            : {display:"flex",flexDirection:"column",gap:8}}
          onDragOver={e=>e.preventDefault()}
          onDragEnd={()=>{ dragItem.current=null; setDragOver(null); }}
          onDragLeave={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setDragOver(null); }}
        >
          {filtered.filter(i=>trainTab==="goals"?(i.type==="goal"||i.type==="target"):i.type==="note").map((idea, idx) => (
            <IdeaTile
              key={idea.id}
              idea={idea}
              viewMode={view}
              searchQuery={search}
              onEdit={()=>openModal(idea.type, idea, fields=>save(idea.id,fields))}
              onDelete={()=>askDelete(idea)}
              onDuplicate={()=>dup(idea.id)}
              onAddToMove={text=>onAddMove(text)}
              onChangeColor={col=>changeColor(idea.id,col)}
              onTogglePin={()=>togglePin(idea.id)}
              onIncrTarget={()=>incrTarget(idea.id)}
              onDecrTarget={()=>decrTarget(idea.id)}
              draggable={true}
              onDragStart={()=>handleDragStart(idx)}
              onDragOver={e=>{ e.preventDefault(); e.stopPropagation(); if(dragItem.current!==null) setDragOver(idx); }}
              onDrop={e=>{ e.preventDefault(); e.stopPropagation(); handleDrop(idx); }}/>
          ))}
          {view!=="tiles"&&filtered.filter(i=>trainTab==="goals"?(i.type==="goal"||i.type==="target"):i.type==="note").length>0&&(
            <div
              onDragOver={e=>{ e.preventDefault(); e.stopPropagation(); if(dragItem.current!==null) setDragOver(filtered.length); }}
              onDragLeave={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setDragOver(null); }}
              onDrop={e=>{ e.preventDefault(); e.stopPropagation(); handleDrop(filtered.length); }}
              style={{ minHeight:36, display:"flex", alignItems:"flex-start", paddingTop:2 }}>
              {dragOver===filtered.length&&dragItem.current!==null&&(
                <div style={{ height:2, borderRadius:1, background:C.accent, flex:1, margin:"0 6px" }}/>
              )}
            </div>
          )}
        </div>
        {ideas.length===0&&<div style={{ textAlign:"center", padding:50, color:C.textMuted }}><div style={{ fontSize:32, marginBottom:10 }}>💪</div><p style={{fontSize:13}}>Nothing here yet — tap + to add a note or set a goal</p></div>}
        {filtered.length===0&&search&&<div style={{ textAlign:"center", padding:30, color:C.textMuted }}><p style={{fontSize:13}}>No results for "{search}"</p></div>}
      </div>
      }
      {typeChooser&&<TypeChooserModal onClose={()=>setTypeChooser(false)} onChoose={t=>{ setTypeChooser(false); setTrainTab((t==="goal"||t==="target")?"goals":"notes"); openModal(t, null, addIdea); }}/>}
      {confirmDel&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)", zIndex:4000, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ background:C.bg, border:`2px solid ${C.border}`, borderRadius:14, padding:24, width:"100%" }}>
            <div style={{ fontWeight:800, fontSize:15, letterSpacing:2, color:C.brown, fontFamily:FONT_DISPLAY, marginBottom:12 }}>
              {confirmDel.type==="goal"?t("deleteGoal"):t("deleteNote")}
            </div>
            <p style={{ color:C.textSec, marginBottom:20, lineHeight:1.6 }}>
              Delete <strong style={{color:C.text}}>{confirmDel.title}</strong>? This cannot be undone.
            </p>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <Btn variant="secondary" onClick={()=>setConfirmDel(null)}>Keep it</Btn>
              <Btn variant="danger" onClick={()=>{ del(confirmDel.id); setConfirmDel(null); }}>{t("delete")}</Btn>
            </div>
          </div>
        </div>
      )}
      {/* NoteModal, GoalModal, AddIdeaModal are rendered at App level via TrainModalCtx */}
    </div>
  );
};

// ─── MOVE LIST ROW (list view with Move To menu) ──────────────────────────────
const MoveListRow = ({ move, catColor, onEdit, onDelete, onMove, allCats, catColors }) => {
  const t = useT();
  const { settings } = useSettings();
  const [menu,setMenu]=useState(false);
  const [movingSub,setMovingSub]=useState(false);
  const otherCats=allCats.filter(c=>c!==move.category);
  const closeAll=()=>{ setMenu(false); setMovingSub(false); };
  const showMastery = settings.showMastery !== false;
  return (
    <div onClick={onEdit} style={{ position:"relative", display:"flex", alignItems:"center", gap:10, background:C.bg, borderRadius:8, padding:"10px 12px", border:`1px solid ${C.border}`, borderLeft:`4px solid ${catColor}`, cursor:"pointer" }}>
      <Ic n="grip" s={13} c={C.textMuted}/>
      <span style={{ flex:1, color:C.text, fontSize:14, fontWeight:600, fontFamily:FONT_DISPLAY }}>{move.name}</span>
      {showMastery&&<Fragment><div style={{ width:44, height:3, borderRadius:2, background:C.border }}><div style={{ height:"100%", width:`${move.mastery}%`, borderRadius:2, background:masteryColor(move.mastery) }}/></div>
      <span style={{ fontSize:12, color:masteryColor(move.mastery), fontWeight:700, width:30, textAlign:"right" }}>{move.mastery}%</span></Fragment>}
      <button onClick={e=>{e.stopPropagation();setMenu(!menu);setMovingSub(false);}} style={{ background:"none", border:"none", cursor:"pointer", color:C.textMuted, padding:2, display:"flex" }}><Ic n="more" s={14}/></button>
      {menu&&<div onClick={e=>e.stopPropagation()} style={{ position:"absolute", top:36, right:6, background:C.bg, border:`1px solid ${C.border}`, borderRadius:9, overflow:"hidden", zIndex:9999, minWidth:155, boxShadow:"0 8px 24px rgba(46,26,14,0.2)" }}>
        {!movingSub ? <Fragment>
          <button onClick={()=>{onEdit();closeAll();}} style={{ width:"100%", padding:"10px 14px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:8, color:C.text, fontSize:13, fontFamily:"inherit" }}>
            <Ic n="edit" s={13} c={C.textSec}/>Edit
          </button>
          <button onClick={()=>setMovingSub(true)} style={{ width:"100%", padding:"10px 14px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", color:C.brownMid, fontSize:13, fontFamily:"inherit", borderTop:`1px solid ${C.borderLight}` }}>
            <span style={{ display:"flex", alignItems:"center", gap:8 }}><Ic n="chevR" s={13} c={C.brownMid}/>{t("moveTo")}</span>
            <Ic n="chevR" s={13} c={C.textMuted}/>
          </button>
          <button onClick={()=>{onDelete();closeAll();}} style={{ width:"100%", padding:"10px 14px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:8, color:C.accent, fontSize:13, fontFamily:"inherit", borderTop:`1px solid ${C.borderLight}` }}>
            <Ic n="trash" s={13} c={C.accent}/>Delete
          </button>
        </Fragment> : <Fragment>
          <button onClick={()=>setMovingSub(false)} style={{ width:"100%", padding:"9px 14px", background:C.surfaceAlt, border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:6, color:C.textSec, fontSize:12, fontFamily:"inherit", borderBottom:`1px solid ${C.border}` }}>← Back</button>
          <div style={{ padding:"4px 0", maxHeight:200, overflow:"auto" }}>
            {otherCats.map(cat=>(
              <button key={cat} onClick={()=>{onMove(cat);closeAll();}} style={{ width:"100%", padding:"9px 14px", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:8, color:C.text, fontSize:13, fontFamily:"inherit" }}>
                <span style={{ width:9, height:9, borderRadius:"50%", background:catColors[cat]||C.accent, flexShrink:0, display:"inline-block" }}/>
                {cat}
              </button>
            ))}
          </div>
        </Fragment>}
      </div>}
    </div>
  );
};

// ─── WIP PAGE ─────────────────────────────────────────────────────────────────
const WIPPage = ({ moves, setMoves, sets=[], setSets=()=>{}, addToast, pendingDesc, clearPendingDesc, settings={}, onAddTrigger }) => {
  const t = useT();
  const { settings:ctxSettings } = useSettings();
  const st = {...ctxSettings,...settings};
  const [view,setView]=useState(st.defaultView||"list"); const [catView,setCatView]=useState("tiles");
  const [vocabTab,setVocabTab]=useState("moves"); // "moves" | "sets"
  const [openCat,setOpenCat]=useState(null);
  const [showAdd,setShowAdd]=useState(false); const [bulk,setBulk]=useState(false);
  useEffect(()=>{ if(onAddTrigger) setShowAdd(true); },[onAddTrigger]);
  const [editMove,setEditMove]=useState(null);
  const [cats,setCats]=useState(CATS);
  const [catColors,setCatColors]=useState({...CAT_COLORS});
  const [showAddCat,setShowAddCat]=useState(false);
  const [ideaDesc,setIdeaDesc]=useState(null);
  const [search,setSearch]=useState("");
  const [showSearch,setShowSearch]=useState(false);
  const catDragItem=useRef(null);
  const [catDragOver,setCatDragOver]=useState(null);
  const [addingSet,setAddingSet]=useState(false);
  const [editSetModal,setEditSetModal]=useState(null);
  const [setsView,setSetsView]=useState(st.defaultView||"list");
  // Sync view states when the defaultView setting changes
  useEffect(()=>{ setView(st.defaultView||"list"); setSetsView(st.defaultView||"list"); },[st.defaultView]);
  const [expSets,setExpSets]=useState({});
  const [confirmDeleteSet,setConfirmDeleteSet]=useState(null);
  const setDragItem=useRef(null);
  const [setDragOver,setSetDragOver]=useState(null);
  const masteryColorWip = p => p<30?C.red:p<60?C.yellow:p<80?C.blue:C.green;

  // When an idea is pushed in from the Ideas tab, open the add modal with its text
  useEffect(()=>{
    if(pendingDesc){ setIdeaDesc(pendingDesc); setShowAdd(true); clearPendingDesc(); }
  },[pendingDesc]);

  const wipMoves=moves; // show all moves regardless of status
  const sortFn = st.sortMoves==="name" ? (a,b)=>a.name.localeCompare(b.name)
    : st.sortMoves==="mastery" ? (a,b)=>b.mastery-a.mastery
    : (a,b)=>0; // date = insertion order
  const inCat=cat=>[...wipMoves.filter(m=>m.category===cat)].sort(sortFn);
  const masteredCount=cat=>inCat(cat).filter(m=>m.mastery>=80).length;

  const saveMove=(form,id)=>{
    if(id){
      setMoves(prev=>prev.map(m=>m.id===id?{...m,...form}:m));
    } else {
      setMoves(prev=>[...prev,{...form, id:Date.now(), status:form.status||"wip"}]);
    }
  };
  const bulkImport=newMoves=>{ const w=newMoves.map(m=>({...m,id:Date.now()+Math.random(),status:m.status||"wip"})); setMoves(prev=>[...prev,...w]); };
  const delMove=id=>setMoves(prev=>prev.filter(m=>m.id!==id));
  const dupMove=m=>setMoves(prev=>[...prev,{...m,id:Date.now(),name:m.name+" (copy)"}]);
  const moveToCat=(id,cat)=>setMoves(prev=>prev.map(m=>m.id===id?{...m,category:cat}:m));
  const addCategory=(name,color)=>{ setCats(prev=>[...prev,name]); setCatColors(prev=>({...prev,[name]:color})); };
  const dupCategory=(name)=>{ const newName=name+" (copy)"; setCats(prev=>[...prev,newName]); setCatColors(prev=>({...prev,[newName]:prev[name]||C.accent})); };
  const changeCatColor=(name,color)=>setCatColors(prev=>({...prev,[name]:color}));
  const handleCatDragStart=(idx)=>{ catDragItem.current=idx; };
  const handleCatDragOver=(e,idx)=>{ e.preventDefault(); setCatDragOver(idx); };
  const handleCatDrop=(targetIdx)=>{
    const from=catDragItem.current;
    // clear visual state immediately, but don't null catDragItem yet
    setCatDragOver(null);
    if(from===null||from===targetIdx) return;
    catDragItem.current=null; // clear only after reading
    setCats(prev=>{
      const next=[...prev];
      const [moved]=next.splice(from,1);
      const insertAt = from < targetIdx ? targetIdx-1 : targetIdx;
      next.splice(insertAt,0,moved);
      return next;
    });
  };

  if(openCat){
    const allCatMoves=inCat(openCat);
    const catColor=catColors[openCat]||C.accent;
    const catMoves=search.trim()?allCatMoves.filter(m=>m.name.toLowerCase().includes(search.toLowerCase())):allCatMoves;
    return (
      <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>
        <Crumbs items={[t("vocab"),openCat]}/>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"6px 14px", borderBottom:`1px solid ${C.borderLight}`, background:C.surface, flexShrink:0 }}>
          <button onClick={()=>{setOpenCat(null);setSearch("");setShowSearch(false);}} style={{ background:"none", border:"none", cursor:"pointer", color:C.accent, fontSize:14, fontFamily:FONT_DISPLAY, fontWeight:700 }}>← Back</button>
          <div style={{ display:"flex", gap:3 }}>
            <button onClick={()=>{ setShowSearch(s=>!s); setSearch(""); }} style={{ background:showSearch?C.surfaceAlt:"none", border:"none", cursor:"pointer", padding:5, borderRadius:5, color:showSearch?C.accent:C.textMuted }}><Ic n="search" s={16}/></button>
            <button onClick={()=>setCatView(v=>v==="tiles"?"list":"tiles")} style={{ background:"none", border:"none", cursor:"pointer", padding:5, borderRadius:5, color:C.textMuted }}><Ic n={catView==="tiles"?"list":"grid"} s={16}/></button>
            <button onClick={()=>setBulk(true)} style={{ background:"none", border:"none", cursor:"pointer", padding:5, borderRadius:5, color:C.textMuted }}><Ic n="upload" s={16}/></button>
          </div>
        </div>
        {showSearch&&(
          <div style={{ padding:"6px 14px", background:C.surface, borderBottom:`1px solid ${C.borderLight}` }}>
            <div style={{ display:"flex", alignItems:"center", background:C.bg, borderRadius:7, padding:"5px 10px", gap:6, border:`1px solid ${search?C.accent:C.border}` }}>
              <Ic n="search" s={13} c={C.textMuted}/>
              <input autoFocus value={search} onChange={e=>setSearch(e.target.value)} placeholder={t("searchMoves")}
                style={{ flex:1, background:"none", border:"none", outline:"none", color:C.text, fontSize:13, fontFamily:"inherit" }}/>
              {search&&<button onClick={()=>setSearch("")} style={{ background:"none", border:"none", cursor:"pointer", color:C.textMuted, padding:0, display:"flex" }}><Ic n="x" s={13}/></button>}
            </div>
            {search&&<div style={{ fontSize:11, color:C.textMuted, marginTop:4 }}>{catMoves.length} result{catMoves.length!==1?"s":""}</div>}
          </div>
        )}
        <div style={{ flex:1, overflow:"auto", padding:10, paddingBottom:76 }}>
          {allCatMoves.length===0 ? (
            <div style={{ textAlign:"center", padding:40, color:C.textMuted }}>
              <div style={{ fontSize:32, marginBottom:8 }}>📭</div>
              <p style={{ fontSize:15, margin:"0 0 4px" }}>No moves yet in {openCat}</p>
              <p style={{ fontSize:13 }}>Tap + to add your first move</p>
            </div>
          ) : catMoves.length===0 ? (
            <div style={{ textAlign:"center", padding:30, color:C.textMuted }}><p style={{fontSize:13}}>No moves match "{search}"</p></div>
          ) : catView==="tiles" ? (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {catMoves.map(m=><MoveTile key={m.id} move={m} searchQuery={search} onClick={()=>setEditMove(m)} onEdit={()=>setEditMove(m)} onDelete={()=>delMove(m.id)} onDuplicate={()=>dupMove(m)} onMove={cat=>moveToCat(m.id,cat)} allCats={cats} catColors={catColors}/>)}
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {catMoves.map(m=><MoveListRow key={m.id} move={m} searchQuery={search} catColor={catColor} onEdit={()=>setEditMove(m)} onDelete={()=>delMove(m.id)} onMove={cat=>moveToCat(m.id,cat)} allCats={cats} catColors={catColors}/>)}
            </div>
          )}
        </div>
        {showAdd&&<MoveModal initialCat={openCat} cats={cats} initialDesc={ideaDesc} onClose={()=>{setShowAdd(false);setIdeaDesc(null);}} onSave={f=>saveMove(f)}/>}
        {editMove&&<MoveModal move={editMove} cats={cats} onClose={()=>setEditMove(null)} onSave={f=>{saveMove(f,editMove.id);setEditMove(null);}}/>}
        {bulk&&<BulkModal onClose={()=>setBulk(false)} onImport={bulkImport} category={openCat}/>}
      </div>
    );
  }

  // — search across both categories and moves inside them —
  const searchResults = search.trim() ? (() => {
    const q = search.toLowerCase();
    const catHits = cats.filter(c => c.toLowerCase().includes(q));
    const moveHits = cats.flatMap(cat => inCat(cat).filter(m => m.name.toLowerCase().includes(q)).map(m => ({ ...m, _cat: cat })));
    return { catHits, moveHits };
  })() : null;

  return (
    <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>
      <SectionBanner tab="wip"/>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"6px 14px", borderBottom:`1px solid ${C.borderLight}`, background:C.surface, flexShrink:0 }}>
        {/* MOVES / SETS sub-tabs */}
        <div style={{ display:"flex", gap:0 }}>
          {[["moves","MOVES"],["sets","SETS"]].map(([id,label])=>(
            <button key={id} onClick={()=>setVocabTab(id)}
              style={{ padding:"4px 10px", background:"none", border:"none", cursor:"pointer",
                fontSize:10, fontWeight:800, letterSpacing:1.5, fontFamily:FONT_DISPLAY,
                color: vocabTab===id ? C.accent : C.textMuted,
                borderBottom: vocabTab===id ? `2px solid ${C.accent}` : "2px solid transparent" }}>
              {label}
            </button>
          ))}
        </div>
        <div style={{ display:"flex", gap:3 }}>
          {vocabTab==="moves"&&<Fragment>
            <button onClick={()=>{ setShowSearch(s=>!s); setSearch(""); }} style={{ background:showSearch?C.surfaceAlt:"none", border:"none", cursor:"pointer", padding:5, borderRadius:5, color:showSearch?C.accent:C.textMuted }}><Ic n="search" s={16}/></button>
            <button onClick={()=>setView(v=>v==="tiles"?"list":"tiles")} style={{ background:"none", border:"none", cursor:"pointer", padding:5, borderRadius:5, color:C.textMuted }}><Ic n={view==="tiles"?"list":"grid"} s={16}/></button>
          </Fragment>}
          {vocabTab==="sets"&&<Fragment>
            <button onClick={()=>setSetsView(v=>v==="list"?"tiles":"list")} style={{ background:"none", border:"none", cursor:"pointer", padding:5, borderRadius:5, color:C.textMuted }}><Ic n={setsView==="list"?"grid":"list"} s={16}/></button>
            <button onClick={()=>setAddingSet(true)} style={{ background:"none", border:"none", cursor:"pointer", padding:5, borderRadius:5 }}><Ic n="plus" s={16} c={C.accent}/></button>
          </Fragment>}
        </div>
      </div>

      {showSearch&&(
        <div style={{ padding:"6px 14px", background:C.surface, borderBottom:`1px solid ${C.borderLight}` }}>
          <div style={{ display:"flex", alignItems:"center", background:C.bg, borderRadius:7, padding:"5px 10px", gap:6, border:`1px solid ${search?C.accent:C.border}` }}>
            <Ic n="search" s={13} c={C.textMuted}/>
            <input autoFocus value={search} onChange={e=>setSearch(e.target.value)} placeholder={t("searchCatsMoves")}
              style={{ flex:1, background:"none", border:"none", outline:"none", color:C.text, fontSize:13, fontFamily:"inherit" }}/>
            {search&&<button onClick={()=>setSearch("")} style={{ background:"none", border:"none", cursor:"pointer", color:C.textMuted, padding:0, display:"flex" }}><Ic n="x" s={13}/></button>}
          </div>
          {searchResults&&<div style={{ fontSize:11, color:C.textMuted, marginTop:4 }}>
            {searchResults.catHits.length} categor{searchResults.catHits.length!==1?"ies":"y"} · {searchResults.moveHits.length} move{searchResults.moveHits.length!==1?"s":""}
          </div>}
        </div>
      )}

      <div style={{ flex:1, overflow:"auto", padding:10, paddingBottom:76 }}>
        {vocabTab==="sets" ? (
          <div>
            {sets.length===0&&(
              <div style={{ textAlign:"center", padding:40, color:C.textMuted }}>
                <div style={{ fontSize:28, marginBottom:8 }}>📋</div>
                <p style={{ fontSize:13 }}>No sets yet — tap + to create one</p>
                <p style={{ fontSize:11, marginTop:6, fontStyle:"italic" }}>Think of a Set like a Notion database — add your moves to it, then slot it into Battle rounds</p>
              </div>
            )}
            {/* ── Tiles view ── */}
            {setsView==="tiles" ? (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {sets.map(s=>{
                  const sColor=s.color||C.blue;
                  return (
                    <div key={s.id} onClick={()=>setEditSetModal(s)}
                      style={{ borderRadius:10, border:`1.5px solid ${C.border}`, overflow:"hidden", background:C.bg, cursor:"pointer" }}>
                      <div style={{ height:4, background:`linear-gradient(90deg,${sColor},${sColor}44)` }}/>
                      <div style={{ padding:"10px 10px 8px" }}>
                        <div style={{ display:"flex", alignItems:"flex-start", gap:6, marginBottom:4 }}>
                          <div style={{ width:8, height:8, borderRadius:"50%", background:sColor, flexShrink:0, marginTop:3 }}/>
                          <div style={{ fontWeight:800, fontSize:12, color:C.brown, fontFamily:FONT_DISPLAY, flex:1, lineHeight:1.3 }}>{s.name}</div>
                        </div>
                        <div style={{ fontSize:10, color:C.textMuted, paddingLeft:14 }}>{(s.moveIds||[]).length} move{(s.moveIds||[]).length!==1?"s":""}</div>
                        {st.showMastery&&<div style={{ paddingLeft:14, marginTop:4 }}>
                          <div style={{ height:2, borderRadius:1, background:C.border, overflow:"hidden" }}>
                            <div style={{ height:"100%", width:`${s.mastery||0}%`, background:masteryColor(s.mastery||0) }}/>
                          </div>
                        </div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              /* ── List view with grip, expand/collapse ── */
              <div onDragOver={e=>e.preventDefault()}
                onDrop={()=>{ if(setDragItem.current!==null){ const arr=[...sets]; const [m]=arr.splice(setDragItem.current,1); const adj=setDragItem.current<sets.length?sets.length-1:sets.length-1; arr.splice(arr.length,0,m); setSets(arr); setDragItem.current=null; setSetDragOver(null); } }}>
                {sets.map((s,idx)=>{
                  const sColor=s.color||C.blue;
                  const isExp=expSets[s.id]!==false; // default expanded
                  const isDragOver=setDragOver===idx;
                  return (
                    <div key={s.id}
                      draggable
                      onDragStart={e=>{ e.stopPropagation(); setDragItem.current=idx; }}
                      onDragEnd={()=>{ setDragItem.current=null; setSetDragOver(null); }}
                      onDragOver={e=>{ e.preventDefault(); e.stopPropagation(); setSetDragOver(idx); }}
                      onDrop={e=>{ e.preventDefault(); e.stopPropagation();
                        if(setDragItem.current===null||setDragItem.current===idx){setSetDragOver(null);setDragItem.current=null;return;}
                        const arr=[...sets];
                        const [moved]=arr.splice(setDragItem.current,1);
                        const adj=setDragItem.current<idx?idx-1:idx;
                        arr.splice(adj,0,moved);
                        setSets(arr); setDragItem.current=null; setSetDragOver(null);
                      }}
                      style={{ marginBottom:6, borderRadius:10, border:`1.5px solid ${isDragOver?C.accent:C.border}`,
                        overflow:"hidden", background:C.bg,
                        opacity:setDragItem.current===idx?0.4:1,
                        boxShadow:isDragOver?`0 0 0 2px ${C.accent}22`:"none" }}>
                      <div style={{ height:3, background:`linear-gradient(90deg,${sColor},${sColor}44)` }}/>
                      <div style={{ display:"flex", alignItems:"center", padding:"9px 10px", gap:6 }}>
                        {/* Grip handle */}
                        <span style={{ cursor:"grab", display:"flex", flexShrink:0, padding:"2px 2px" }}
                          onMouseDown={e=>e.stopPropagation()}>
                          <Ic n="grip" s={13} c={C.textMuted}/>
                        </span>
                        {/* Expand/collapse */}
                        <button onClick={()=>setExpSets(p=>({...p,[s.id]:!isExp}))}
                          style={{ background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", flexShrink:0 }}>
                          <Ic n={isExp?"chevD":"chevR"} s={12} c={sColor}/>
                        </button>
                        <div style={{ width:8, height:8, borderRadius:"50%", background:sColor, flexShrink:0 }}/>
                        {/* Name + subtitle */}
                        <div style={{ flex:1, minWidth:0, cursor:"pointer" }} onClick={()=>setEditSetModal(s)}>
                          <div style={{ fontWeight:800, fontSize:13, color:C.brown, fontFamily:FONT_DISPLAY, letterSpacing:0.5 }}>{s.name}</div>
                          <div style={{ fontSize:11, color:C.textMuted, marginTop:1 }}>
                            {(s.moveIds||[]).length} move{(s.moveIds||[]).length!==1?"s":""}
                            {s.notes?` · ${s.notes}`:""}
                          </div>
                        </div>
                        {st.showMastery&&<div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:2, flexShrink:0 }}>
                          <span style={{ fontSize:10, color:masteryColor(s.mastery||0), fontWeight:700 }}>{s.mastery||0}%</span>
                          <div style={{ width:36, height:2, borderRadius:1, background:C.border, overflow:"hidden" }}>
                            <div style={{ height:"100%", width:`${s.mastery||0}%`, background:masteryColor(s.mastery||0) }}/>
                          </div>
                        </div>}
                        <button onClick={e=>{ e.stopPropagation(); setConfirmDeleteSet(s); }}
                          style={{ background:"none", border:"none", cursor:"pointer", padding:3, flexShrink:0 }}>
                          <Ic n="x" s={13} c={C.accent}/>
                        </button>
                      </div>
                      {/* Expanded moves list */}
                      {isExp&&(s.moveIds||[]).length>0&&(
                        <div style={{ borderTop:`1px solid ${C.borderLight}`, padding:"4px 12px 8px 36px" }}>
                          {(s.moveIds||[]).map(mid=>{
                            const m=moves.find(mv=>mv.id===mid); if(!m) return null;
                            return (
                              <div key={mid} style={{ display:"flex", alignItems:"center", gap:6, paddingTop:3 }}>
                                <div style={{ width:5, height:5, borderRadius:"50%", background:masteryColor(m.mastery||0), flexShrink:0 }}/>
                                <span style={{ fontSize:11, color:C.textMuted }}>{m.name}</span>
                                <span style={{ fontSize:10, color:masteryColor(m.mastery||0), fontWeight:700, marginLeft:"auto" }}>{m.mastery||0}%</span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                      {isExp&&(s.moveIds||[]).length===0&&(
                        <div style={{ borderTop:`1px solid ${C.borderLight}`, padding:"6px 12px 8px 36px", fontSize:11, color:C.textMuted, fontStyle:"italic" }}>
                          No moves — tap the name to add some
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ) : searchResults ? <Fragment>
          {/* Category hits */}
          {searchResults.catHits.length>0&&<Fragment>
            <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.textMuted, fontFamily:FONT_DISPLAY, marginBottom:6 }}>{t("categories")}</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
              {searchResults.catHits.map(cat=>(
                <CatTile key={cat} name={cat} color={catColors[cat]||C.accent} total={inCat(cat).length} mastered={masteredCount(cat)}
                  moves={inCat(cat)} viewMode="tiles"
                  showMastery={st.showMastery} showMoveCount={st.showMoveCount}
                  onClick={()=>setOpenCat(cat)}
                  onDelete={()=>setCats(prev=>prev.filter(c=>c!==cat))}
                  onRename={n=>setCats(prev=>prev.map(c=>c===cat?n:c))}
                  onDuplicate={()=>dupCategory(cat)}
                  onChangeColor={col=>changeCatColor(cat,col)}/>
              ))}
            </div>
          </Fragment>}
          {/* Move hits */}
          {searchResults.moveHits.length>0&&<Fragment>
            <div style={{ fontSize:11, fontWeight:800, letterSpacing:1.5, color:C.textMuted, fontFamily:FONT_DISPLAY, marginBottom:6 }}>{t("moves")}</div>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {searchResults.moveHits.map(m=>(
                <div key={m.id} onClick={()=>{ setOpenCat(m._cat); setEditMove(m); }}
                  style={{ background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, padding:"9px 12px", display:"flex", alignItems:"center", gap:8, cursor:"pointer", borderLeft:`4px solid ${catColors[m._cat]||C.accent}` }}>
                  <Ic n="grip" s={12} c={C.textMuted}/>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontWeight:700, fontSize:13, color:C.text, fontFamily:FONT_DISPLAY }}><Highlight text={m.name} query={search}/></div>
                    <div style={{ fontSize:11, color:C.textMuted, marginTop:1 }}>{m._cat}</div>
                  </div>
                  <span style={{ fontSize:12, color:masteryColor(m.mastery), fontWeight:700 }}>{m.mastery}%</span>
                </div>
              ))}
            </div>
          </Fragment>}
          {searchResults.catHits.length===0&&searchResults.moveHits.length===0&&
            <div style={{ textAlign:"center", padding:30, color:C.textMuted }}><p style={{fontSize:13}}>Nothing matches "{search}"</p></div>}
        </Fragment> : (
          <div
            style={view==="tiles"
              ? {display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,alignItems:"stretch"}
              : {display:"flex",flexDirection:"column",gap:0}}
            onDragOver={e=>e.preventDefault()}
            onDragLeave={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setCatDragOver(null); }}
          >
            {cats.map((cat,idx)=>(
              <div key={cat}
                onDragOver={e=>{ e.preventDefault(); e.stopPropagation(); if(catDragItem.current!==null) setCatDragOver(idx); }}
                onDragLeave={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setCatDragOver(d=>d===idx?null:d); }}
                onDrop={e=>{ e.preventDefault(); e.stopPropagation(); handleCatDrop(idx); }}
                style={{ display:"flex", flexDirection:"column" }}>
                {/* Red insertion line above this slot */}
                {catDragOver===idx && catDragItem.current!==null && catDragItem.current!==idx &&(
                  <div style={{ height:2, borderRadius:1, background:C.accent,
                    margin: view==="tiles" ? "0 2px 4px" : "2px 6px 4px" }}/>
                )}
                <div style={{ marginBottom: view!=="tiles" ? 8 : 0, flex:1 }}>
                  <CatTile name={cat} color={catColors[cat]||C.accent} total={inCat(cat).length} mastered={masteredCount(cat)}
                    moves={inCat(cat)} viewMode={view}
                    showMastery={st.showMastery} showMoveCount={st.showMoveCount}
                    onClick={()=>setOpenCat(cat)}
                    onDelete={()=>setCats(prev=>prev.filter(c=>c!==cat))}
                    onRename={n=>setCats(prev=>prev.map(c=>c===cat?n:c))}
                    onDuplicate={()=>dupCategory(cat)}
                    onChangeColor={col=>changeCatColor(cat,col)}
                    draggable={true}
                    onDragStart={()=>handleCatDragStart(idx)}
                    onDragOver={e=>e.preventDefault()}
                    onDrop={e=>{ /* handled by wrapper */ }}
                    isDraggingOver={false}/>
                </div>
              </div>
            ))}
            {/* End-of-list sentinel — list view only, lets items drop to last spot */}
            {view!=="tiles"&&cats.length>0&&(
              <div
                onDragOver={e=>{ e.preventDefault(); e.stopPropagation(); setCatDragOver(cats.length); }}
                onDragLeave={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setCatDragOver(null); }}
                onDrop={e=>{ e.stopPropagation(); handleCatDrop(cats.length); }}
                style={{ minHeight:36, display:"flex", alignItems:"flex-start", paddingTop:2 }}>
                {catDragOver===cats.length&&<div style={{ height:2, borderRadius:1, background:C.accent, flex:1, margin:"0 6px" }}/>}
              </div>
            )}
          </div>
        )}
      </div>
      {vocabTab==="sets"&&addingSet&&<SetDetailModal type="set"
        item={{ name:"", color:PRESET_COLORS[1], moveIds:[], notes:"", mastery:0, date:new Date().toISOString().split("T")[0] }}
        onClose={()=>setAddingSet(false)}
        allMoves={moves} allSets={sets}
        onSave={fields=>{ setSets(p=>[...p,{id:Date.now(),...fields}]); setAddingSet(false); }}/>}
      {editSetModal&&<SetDetailModal type="set" item={editSetModal} onClose={()=>setEditSetModal(null)}
        allMoves={moves} allSets={sets}
        onSave={fields=>setSets(p=>p.map(s=>s.id===editSetModal.id?{...s,...fields}:s))}/>}
      {confirmDeleteSet&&(
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:900, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ background:C.bg, border:`1px solid ${C.border}`, borderRadius:14, width:"100%", maxWidth:320, padding:20, boxShadow:"0 24px 60px rgba(0,0,0,0.4)" }}>
            <div style={{ fontWeight:900, fontSize:14, letterSpacing:1.5, fontFamily:FONT_DISPLAY, color:C.brown, marginBottom:8 }}>DELETE SET?</div>
            <p style={{ fontSize:13, color:C.textSec, marginBottom:16, lineHeight:1.5 }}>
              "<span style={{ color:C.text, fontWeight:700 }}>{confirmDeleteSet.name}</span>" will be permanently deleted. This can't be undone.
            </p>
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <button onClick={()=>setConfirmDeleteSet(null)}
                style={{ padding:"8px 16px", borderRadius:8, border:`1px solid ${C.border}`, background:"none", color:C.textSec, fontSize:13, cursor:"pointer", fontFamily:FONT_BODY }}>
                Cancel
              </button>
              <button onClick={()=>{ setSets(p=>p.filter(x=>x.id!==confirmDeleteSet.id)); setConfirmDeleteSet(null); }}
                style={{ padding:"8px 16px", borderRadius:8, border:"none", background:C.accent, color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:FONT_BODY }}>
                Delete
              </button>
            </div>
          </div>
        </div>
      )}
      {showAddCat&&<AddCategoryModal onClose={()=>setShowAddCat(false)} onAdd={addCategory} existingCats={cats} existingColors={catColors}/>}
      {/* MoveModal at root level — for "Add to Move" arriving from Ideas tab */}
      {showAdd&&<MoveModal initialCat={cats[0]||""} cats={cats} initialDesc={ideaDesc} onClose={()=>{setShowAdd(false);setIdeaDesc(null);}} onSave={f=>saveMove(f)}/>}
    </div>
  );
};

// ─── SET DETAIL MODAL ────────────────────────────────────────────────────────
const SetDetailModal = ({ item, onClose, onSave, type="set", allMoves=[], allSets=[] }) => {
  const t = useT();
  const { C } = useSettings();
  const [name,    setName]    = useState(item.name   || "");
  const [color,   setColor]   = useState(item.color  || PRESET_COLORS[1]);
  const [link,    setLink]    = useState(item.link   || "");
  const [mastery, setMastery] = useState(item.mastery ?? 0);
  const [notes,   setNotes]   = useState(item.notes  || "");
  const [date,    setDate]    = useState(item.date   || new Date().toISOString().split("T")[0]);
  const [localIds, setLocalIds] = useState(type==="set" ? (item.moveIds||[]) : (item.setIds||[]));
  const [pickerOpen, setPickerOpen] = useState(false);
  const [pickerQ, setPickerQ] = useState("");
  const localDragItem = useRef(null);
  const [localDragOver, setLocalDragOver] = useState(null);
  const isSet = type === "set";

  const handleSave = () => {
    if (!name.trim()) return;
    const extra = isSet ? { moveIds: localIds } : { setIds: localIds };
    onSave({ name: name.trim(), color, link: link.trim(), mastery, notes: notes.trim(), date, ...extra });
    onClose();
  };

  const toggleId = (id) => setLocalIds(p => p.includes(id) ? p.filter(i=>i!==id) : [...p, id]);
  const removeId = (id) => setLocalIds(p => p.filter(i=>i!==id));

  const handleDragStart = idx => { localDragItem.current = idx; };
  const handleDragOver  = (e, idx) => { e.preventDefault(); e.stopPropagation(); setLocalDragOver(idx); };
  const handleDrop      = (toIdx) => {
    if (localDragItem.current===null||localDragItem.current===toIdx) { setLocalDragOver(null); localDragItem.current=null; return; }
    const arr = [...localIds];
    const [moved] = arr.splice(localDragItem.current, 1);
    const adj = localDragItem.current < toIdx ? toIdx-1 : toIdx;
    arr.splice(adj, 0, moved);
    setLocalIds(arr);
    localDragItem.current=null; setLocalDragOver(null);
  };

  // All categories from allMoves
  const allCats = [...new Set(allMoves.map(m=>m.category))].sort();
  const q = pickerQ.toLowerCase().trim();

  return (
    <Modal title={isSet ? "EDIT SET" : "EDIT ROUND"} onClose={onClose} wide>
      {/* Color stripe */}
      <div style={{ height:5, borderRadius:4, background:`linear-gradient(90deg,${color},${color}55)`, marginBottom:16 }}/>

      <Inp label="NAME *" value={name} onChange={setName} placeholder={isSet ? "e.g. Opening Set…" : "e.g. Top 16…"}/>

      {/* Colour */}
      <div style={{ marginBottom:16 }}>
        <label style={lbl()}>{t("colour")}</label>
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:4 }}>
          {PRESET_COLORS.map(c=>(
            <button key={c} onClick={()=>setColor(c)}
              style={{ width:30, height:30, borderRadius:6, background:c, cursor:"pointer", outline:"none",
                border: color===c ? `3px solid ${C.brown}` : `2px solid transparent` }}/>
          ))}
        </div>
      </div>

      {/* ── MOVES IN THIS SET — Notion-style inline picker ── */}
      {isSet && (
        <div style={{ marginBottom:16 }}>
          <label style={lbl()}>MOVES IN THIS SET ({localIds.length})</label>

          {/* Added moves — draggable to reorder */}
          {localIds.length > 0 && (
            <div onDragOver={e=>e.preventDefault()} onDrop={()=>{ if(localDragItem.current!==null) handleDrop(localIds.length); }}
              style={{ marginBottom:6 }}>
              {localIds.map((id, idx)=>{
                const m = allMoves.find(mv=>mv.id===id); if(!m) return null;
                const col = masteryColor(m.mastery||0);
                const isOver = localDragOver===idx;
                return (
                  <div key={id}
                    draggable
                    onDragStart={e=>{ e.stopPropagation(); handleDragStart(idx); }}
                    onDragEnd={()=>{ localDragItem.current=null; setLocalDragOver(null); }}
                    onDragOver={e=>handleDragOver(e,idx)}
                    onDrop={e=>{ e.stopPropagation(); handleDrop(idx); }}
                    style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px",
                      background: isOver ? `${C.accent}0e` : C.surfaceAlt,
                      borderRadius:8, marginBottom:3,
                      border:`1px solid ${isOver?C.accent:C.borderLight}`,
                      opacity: localDragItem.current===idx ? 0.4 : 1, cursor:"grab" }}>
                    <span style={{ cursor:"grab", display:"flex", flexShrink:0 }}><Ic n="grip" s={12} c={C.textMuted}/></span>
                    <span style={{ fontSize:11, fontWeight:700, color:C.textMuted, flexShrink:0, minWidth:16 }}>{idx+1}.</span>
                    <div style={{ width:7, height:7, borderRadius:"50%", background:col, flexShrink:0 }}/>
                    <span style={{ flex:1, fontSize:13, color:C.text }}>{m.name}</span>
                    <span style={{ fontSize:10, color:C.textMuted, flexShrink:0 }}>{m.category}</span>
                    <span style={{ fontSize:11, color:col, fontWeight:700, flexShrink:0 }}>{m.mastery||0}%</span>
                    <button onClick={()=>removeId(id)}
                      style={{ background:"none", border:"none", cursor:"pointer", padding:3, display:"flex", flexShrink:0 }}>
                      <Ic n="x" s={12} c={C.accent}/>
                    </button>
                  </div>
                );
              })}
            </div>
          )}

          {/* + Add moves button / inline picker */}
          {!pickerOpen ? (
            <button onClick={()=>{ setPickerOpen(true); setPickerQ(""); }}
              style={{ width:"100%", padding:"9px 12px", background:"none",
                border:`1.5px dashed ${C.border}`, borderRadius:8, cursor:"pointer",
                color:C.accent, fontSize:13, fontFamily:FONT_BODY,
                display:"flex", alignItems:"center", gap:8, textAlign:"left" }}>
              <Ic n="plus" s={14} c={C.accent}/>
              Add a move…
            </button>
          ) : (
            <div style={{ border:`1.5px solid ${C.accent}`, borderRadius:10, overflow:"hidden", background:C.bg }}>
              {/* Search bar */}
              <div style={{ display:"flex", alignItems:"center", padding:"8px 10px", gap:6, borderBottom:`1px solid ${C.borderLight}` }}>
                <Ic n="search" s={13} c={C.textMuted}/>
                <input value={pickerQ} onChange={e=>setPickerQ(e.target.value)}
                  placeholder={t("searchMoves")}
                  style={{ flex:1, background:"none", border:"none", outline:"none", color:C.text, fontSize:13, fontFamily:"inherit" }}/>
                <button onClick={()=>setPickerOpen(false)}
                  style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex" }}>
                  <Ic n="x" s={13} c={C.textMuted}/>
                </button>
              </div>
              {/* Move list grouped by category */}
              <div style={{ maxHeight:220, overflow:"auto" }}>
                {allCats.map(cat => {
                  const catMoves = allMoves.filter(m => m.category===cat && (!q || m.name.toLowerCase().includes(q) || cat.toLowerCase().includes(q)));
                  if (catMoves.length===0) return null;
                  return (
                    <div key={cat}>
                      <div style={{ padding:"5px 10px", background:C.surfaceAlt, fontSize:9, fontWeight:800, letterSpacing:1.5, color:C.textMuted, fontFamily:FONT_DISPLAY }}>
                        {cat.toUpperCase()}
                      </div>
                      {catMoves.map(m => {
                        const added = localIds.includes(m.id);
                        const col = masteryColor(m.mastery||0);
                        return (
                          <button key={m.id} onClick={()=>toggleId(m.id)}
                            style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:"9px 12px",
                              background: added ? `${C.accent}10` : "transparent",
                              border:"none", borderBottom:`1px solid ${C.borderLight}`,
                              cursor:"pointer", textAlign:"left" }}>
                            {/* Checkbox */}
                            <div style={{ width:16, height:16, borderRadius:4, flexShrink:0,
                              border:`2px solid ${added ? C.accent : C.border}`,
                              background: added ? C.accent : "transparent",
                              display:"flex", alignItems:"center", justifyContent:"center" }}>
                              {added&&<Ic n="check" s={10} c="#fff"/>}
                            </div>
                            <div style={{ width:7, height:7, borderRadius:"50%", background:col, flexShrink:0 }}/>
                            <span style={{ flex:1, fontSize:13, color:C.text }}>{m.name}</span>
                            <span style={{ fontSize:10, color:col, fontWeight:700 }}>{m.mastery||0}%</span>
                          </button>
                        );
                      })}
                    </div>
                  );
                })}
                {allMoves.filter(m=>!q||m.name.toLowerCase().includes(q)).length===0&&(
                  <div style={{ padding:"16px", textAlign:"center", color:C.textMuted, fontSize:12 }}>No moves match "{pickerQ}"</div>
                )}
              </div>
              {/* Done button */}
              <div style={{ padding:"8px 10px", borderTop:`1px solid ${C.borderLight}` }}>
                <button onClick={()=>setPickerOpen(false)}
                  style={{ width:"100%", padding:"8px", background:C.accent, border:"none", borderRadius:7,
                    color:"#fff", fontSize:12, fontWeight:900, fontFamily:FONT_DISPLAY, letterSpacing:1, cursor:"pointer" }}>
                  DONE — {localIds.length} move{localIds.length!==1?"s":""}
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Mastery slider */}
      <div style={{ marginBottom:16 }}>
        <label style={lbl()}>HOW WELL DO YOU KNOW THIS {isSet?"SET":"ROUND"}? — <span style={{ color:masteryColor(mastery), fontWeight:800 }}>{mastery}%</span></label>
        <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:6, flexWrap:"wrap" }}>
          {[[0,"🌱 Just started"],[25,"🔧 Learning"],[50,"⚡ Getting there"],[75,"🔥 Almost there"],[100,"💎 Mastered"]].map(([v,label])=>(
            <button key={v} onClick={()=>setMastery(v)}
              style={{ fontSize:11, padding:"3px 8px", borderRadius:12, cursor:"pointer", fontFamily:FONT_BODY,
                background: mastery===v ? masteryColor(v) : C.surfaceAlt,
                color: mastery===v ? "#fff" : C.textSec,
                border: `1px solid ${mastery===v ? masteryColor(v) : C.border}` }}>
              {label}
            </button>
          ))}
        </div>
        <input type="range" min={0} max={100} value={mastery} onChange={e=>setMastery(Number(e.target.value))}
          style={{ width:"100%", accentColor:masteryColor(mastery), marginTop:4 }}/>
        <div style={{ height:4, borderRadius:2, background:C.border, marginTop:4 }}>
          <div style={{ height:"100%", width:`${mastery}%`, borderRadius:2, background:masteryColor(mastery), transition:"width 0.2s" }}/>
        </div>
      </div>

      {/* Video Link */}
      <Inp label="VIDEO LINK (optional)" value={link} onChange={setLink} placeholder="https://youtube.com/…"/>

      {/* Date Created */}
      <div style={{ marginBottom:14 }}>
        <label style={lbl()}>{t("date")}</label>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)}
          style={{ ...inp(), colorScheme:"light dark" }}/>
      </div>

      {/* Notes */}
      <div style={{ marginBottom:16 }}>
        <label style={lbl()}>{t("notes")}</label>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)}
          placeholder={isSet ? "Strategy, order, tips…" : "Round format, judges, notes…"}
          rows={3} style={{ ...inp(), resize:"vertical" }}/>
      </div>

      <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
        <Btn variant="secondary" onClick={onClose}>{t("cancel")}</Btn>
        <Btn onClick={handleSave} disabled={!name.trim()}>{t("save")}</Btn>
      </div>
    </Modal>
  );
};

// ─── NAME MODAL (reusable simple name prompt) ─────────────────────────────────
const NameModal = ({ title, placeholder, onClose, onConfirm }) => {
  const t = useT();
  const [val,setVal]=useState("");
  return (
    <Modal title={title} onClose={onClose}>
      <Inp label="NAME *" value={val} onChange={setVal} placeholder={placeholder}/>
      <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:4 }}>
        <Btn variant="secondary" onClick={onClose}>{t("cancel")}</Btn>
        <Btn onClick={()=>val.trim()&&onConfirm(val.trim())} disabled={!val.trim()}>Create</Btn>
      </div>
    </Modal>
  );
};

// ─── READY PAGE — full drag-and-drop + delete for Sets AND Rounds ─────────────

// ─── FREESTYLE PAGE ───────────────────────────────────────────────────────────
const FreestylePage = ({ moves, sets=[], settings={} }) => {
  const t = useT();
  const showMastery   = settings.showMastery  !== false;
  const showMoveCount = settings.showMoveCount !== false;
  const [toUse,        setToUse]        = useState([]);
  const [usedOpen,     setUsedOpen]     = useState(true);
  const [dragging,     setDragging]     = useState(null);
  const [dropping,     setDropping]     = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [pickerOpen,   setPickerOpen]   = useState(false);
  const [pickerSearch, setPickerSearch] = useState("");
  const [pickerSel,    setPickerSel]    = useState([]);
  const [expCats,      setExpCats]      = useState({});
  const toUseDragItem = useRef(null);
  const [toUseDragOver, setToUseDragOver] = useState(null);

  const getMoveById = id => moves.find(m=>m.id===id);
  const getSetById  = id => sets.find(s=>s.id===id);
  const allCats = [...new Set(moves.map(m=>m.category))].sort();

  const handleToUseReorderDrop = toIdx => {
    if (toUseDragItem.current===null||toUseDragItem.current===toIdx) { setToUseDragOver(null); toUseDragItem.current=null; return; }
    const uncheckedItems = toUse.filter(i=>!i.checked);
    const checkedItems   = toUse.filter(i=>i.checked);
    const arr = [...uncheckedItems];
    const [moved] = arr.splice(toUseDragItem.current, 1);
    const adj = toUseDragItem.current < toIdx ? toIdx-1 : toIdx;
    arr.splice(adj, 0, moved);
    setToUse([...arr, ...checkedItems]);
    toUseDragItem.current=null; setToUseDragOver(null);
  };

  const addToUse = (refId, type="move") => {
    if (toUse.find(i=>i.refId===refId)) return;
    setToUse(p=>[...p, { id:Date.now(), refId, type, checked:false }]);
  };
  const toggle     = (id) => setToUse(p=>p.map(i=>i.id===id ? {...i, checked:!i.checked} : i));
  const removeItem = (id) => setToUse(p=>p.filter(i=>i.id!==id));
  const reset      = ()  => { setToUse([]); setConfirmReset(false); };

  // Picker helpers
  const isInList   = (refId) => !!toUse.find(i=>i.refId===refId);
  const isSelected = (refId) => pickerSel.includes(refId);
  const togglePick = (refId) => setPickerSel(p => p.includes(refId) ? p.filter(x=>x!==refId) : [...p,refId]);
  const confirmPick = () => {
    const now = Date.now();
    const toAddMoves = pickerSel.filter(id=>moves.find(m=>m.id===id) && !toUse.find(i=>i.refId===id));
    const toAddSets  = pickerSel.filter(id=>sets.find(s=>s.id===id)  && !toUse.find(i=>i.refId===id));
    const newItems = [
      ...toAddMoves.map((id,i)=>({ id:now+i,       refId:id, type:"move", checked:false })),
      ...toAddSets.map((id,i) =>({ id:now+1000+i,  refId:id, type:"set",  checked:false })),
    ];
    if (newItems.length) setToUse(p=>[...p,...newItems]);
    setPickerOpen(false); setPickerSel([]);
  };
  const openPicker = () => { setPickerSearch(""); setPickerSel([]); setExpCats({}); setPickerOpen(true); };

  // Category select helpers
  const catMoveIds   = cat => moves.filter(m=>m.category===cat).map(m=>m.id);
  const catAvail     = cat => catMoveIds(cat).filter(mid=>!isInList(mid));
  const isCatAll     = cat => catAvail(cat).length > 0 && catAvail(cat).every(mid=>pickerSel.includes(mid));
  const isCatPartial = cat => catAvail(cat).some(mid=>pickerSel.includes(mid)) && !isCatAll(cat);
  const toggleCat    = cat => {
    const avail = catAvail(cat);
    if (isCatAll(cat)) setPickerSel(p=>p.filter(id=>!avail.includes(id)));
    else setPickerSel(p=>[...new Set([...p, ...avail])]);
  };
  const allAvailMoveIds = moves.filter(m=>!isInList(m.id)).map(m=>m.id);
  const allAvailSetIds  = sets.filter(s=>!isInList(s.id)).map(s=>s.id);
  const allAvailIds = [...allAvailMoveIds, ...allAvailSetIds];
  const isAllSel    = allAvailIds.length > 0 && allAvailIds.every(id=>pickerSel.includes(id));
  const isAllPart   = allAvailIds.some(id=>pickerSel.includes(id)) && !isAllSel;
  const toggleAll   = () => { if(isAllSel) setPickerSel([]); else setPickerSel(allAvailIds); };

  const q = pickerSearch.toLowerCase().trim();
  const filteredMoves = q ? moves.filter(m=>m.name.toLowerCase().includes(q)||m.category.toLowerCase().includes(q)) : null;

  const unchecked = toUse.filter(i=>!i.checked);
  const checked   = toUse.filter(i=>i.checked);

  return (
    <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column", position:"relative" }}>

      {/* Header */}
      <div style={{ padding:"8px 12px", borderBottom:`1px solid ${C.borderLight}`, background:C.surface,
        flexShrink:0, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <span style={{ fontSize:12, fontWeight:800, letterSpacing:2, color:C.textMuted, fontFamily:FONT_DISPLAY }}>{t("toUse")}</span>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:11, color:C.textMuted }}>{unchecked.length} {t("remaining")} · {checked.length} {t("used").toLowerCase()}</span>
          <button onClick={openPicker}
            style={{ background:C.accent, border:"none", borderRadius:7, cursor:"pointer", color:"#fff",
              fontSize:11, fontWeight:800, fontFamily:FONT_DISPLAY, letterSpacing:0.8,
              padding:"5px 10px", display:"flex", alignItems:"center", gap:4 }}>
            <Ic n="plus" s={11} c="#fff"/> ADD
          </button>
        </div>
      </div>

      {/* List */}
      <div style={{ flex:1, overflow:"auto", paddingBottom:80 }}
        onDragOver={e=>{ e.preventDefault(); setDropping(true); }}
        onDragLeave={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setDropping(false); }}
        onDrop={e=>{ e.preventDefault(); setDropping(false); if(dragging) addToUse(dragging,"move"); setDragging(null); }}>

        {dropping&&(
          <div style={{ margin:10, padding:14, border:`2px dashed ${C.accent}`, borderRadius:10, textAlign:"center", color:C.accent, fontSize:13, fontWeight:700 }}>
            Drop to add ↓
          </div>
        )}

        {toUse.length===0&&!dropping&&(
          <div style={{ textAlign:"center", padding:40, color:C.textMuted }}>
            <div style={{ fontSize:28, marginBottom:8 }}>🎯</div>
            <p style={{ fontSize:13 }}>Tap ADD to build your freestyle list</p>
          </div>
        )}

        <div onDragOver={e=>e.preventDefault()}
          onDrop={e=>{ e.stopPropagation(); if(toUseDragItem.current!==null) handleToUseReorderDrop(unchecked.length); }}>
          {unchecked.map((item,idx)=>{
            const isSet = item.type==="set";
            const m = isSet ? getSetById(item.refId) : getMoveById(item.refId);
            if(!m) return null;
            const isDraggingThis = toUseDragItem.current===idx;
            const isOver = toUseDragOver===idx;
            const dotColor = isSet ? (m.color||C.accent) : masteryColor(m.mastery);
            return (
              <div key={item.id}
                draggable
                onDragStart={e=>{ e.stopPropagation(); toUseDragItem.current=idx; }}
                onDragEnd={()=>{ toUseDragItem.current=null; setToUseDragOver(null); }}
                onDragOver={e=>{ e.preventDefault(); e.stopPropagation(); if(toUseDragItem.current!==null) setToUseDragOver(idx); }}
                onDrop={e=>{ e.stopPropagation(); if(toUseDragItem.current!==null) handleToUseReorderDrop(idx); }}
                style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px",
                  borderBottom:`1px solid ${C.borderLight}`,
                  background: isOver ? `${C.accent}0e` : C.bg,
                  opacity: isDraggingThis ? 0.4 : 1 }}>
                <span style={{ cursor:"grab", display:"flex", flexShrink:0, touchAction:"none" }}><Ic n="grip" s={12} c={C.textMuted}/></span>
                <button onClick={()=>toggle(item.id)}
                  style={{ width:20, height:20, borderRadius:4, border:`2px solid ${C.accent}`,
                    background:"transparent", cursor:"pointer", flexShrink:0,
                    display:"flex", alignItems:"center", justifyContent:"center", padding:0 }}>
                </button>
                <div style={{ width:7, height:7, borderRadius: isSet?"2px":"50%", background:dotColor, flexShrink:0 }}/>
                <span style={{ flex:1, fontSize:13, color:C.text, fontFamily:FONT_BODY }}>{m.name}</span>
                {isSet && <span style={{ fontSize:9, fontWeight:800, letterSpacing:1, color:C.textMuted, fontFamily:FONT_DISPLAY, background:C.surface, borderRadius:4, padding:"2px 5px" }}>SET</span>}
                {!isSet && showMastery&&<span style={{ fontSize:11, color:masteryColor(m.mastery), fontWeight:700, flexShrink:0 }}>{m.mastery}%</span>}
                <button onClick={()=>removeItem(item.id)}
                  style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex", flexShrink:0 }}>
                  <Ic n="x" s={11} c={C.textMuted}/>
                </button>
              </div>
            );
          })}
        </div>

        {checked.length>0&&(
          <div>
            <button onClick={()=>setUsedOpen(o=>!o)}
              style={{ width:"100%", background:C.surfaceAlt, border:"none", borderTop:`1px solid ${C.border}`,
                borderBottom:`1px solid ${C.border}`, cursor:"pointer",
                display:"flex", alignItems:"center", gap:6, padding:"8px 12px", color:C.textMuted }}>
              <Ic n={usedOpen?"chevD":"chevR"} s={12} c={C.textMuted}/>
              <span style={{ fontSize:12, fontWeight:800, letterSpacing:1.5, fontFamily:FONT_DISPLAY }}>USED · {checked.length}</span>
            </button>
            {usedOpen && checked.map(item=>{
              const isSet = item.type==="set";
              const m = isSet ? getSetById(item.refId) : getMoveById(item.refId);
              if(!m) return null;
              const dotColor = isSet ? (m.color||C.accent) : masteryColor(m.mastery);
              return (
                <div key={item.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px",
                  borderBottom:`1px solid ${C.borderLight}`, background:C.surfaceAlt, opacity:0.6 }}>
                  <span style={{ display:"flex", flexShrink:0 }}><Ic n="grip" s={12} c={C.borderLight}/></span>
                  <button onClick={()=>toggle(item.id)}
                    style={{ width:20, height:20, borderRadius:4, border:`2px solid ${C.textMuted}`,
                      background:C.textMuted, cursor:"pointer", flexShrink:0,
                      display:"flex", alignItems:"center", justifyContent:"center", padding:0 }}>
                    <Ic n="check" s={12} c={C.bg}/>
                  </button>
                  <div style={{ width:7, height:7, borderRadius: isSet?"2px":"50%", background:dotColor, flexShrink:0 }}/>
                  <span style={{ flex:1, fontSize:13, color:C.textMuted, fontFamily:FONT_BODY, textDecoration:"line-through" }}>{m.name}</span>
                  {isSet && <span style={{ fontSize:9, fontWeight:800, letterSpacing:1, color:C.textMuted, fontFamily:FONT_DISPLAY, background:C.surface, borderRadius:4, padding:"2px 5px" }}>SET</span>}
                  {!isSet && showMastery&&<span style={{ fontSize:11, color:masteryColor(m.mastery), fontWeight:700, flexShrink:0 }}>{m.mastery}%</span>}
                  <button onClick={()=>removeItem(item.id)}
                    style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex", flexShrink:0 }}>
                    <Ic n="x" s={11} c={C.textMuted}/>
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Reset bar */}
      <div style={{ padding:"10px 12px", borderTop:`1px solid ${C.borderLight}`, background:C.surface, flexShrink:0 }}>
        <button onClick={()=>setConfirmReset(true)}
          style={{ width:"100%", padding:"9px 0", background:"transparent", border:`1.5px solid ${C.accent}`, borderRadius:8,
            color:C.accent, fontSize:13, fontWeight:800, fontFamily:FONT_DISPLAY, letterSpacing:1, cursor:"pointer" }}>
          ↺ RESET LIST
        </button>
      </div>

      {/* ── Notion-style Move Picker overlay ── */}
      {pickerOpen&&(
        <div style={{ position:"absolute", inset:0, background:C.bg, zIndex:600, display:"flex", flexDirection:"column" }}>
          {/* Picker header */}
          <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 12px",
            background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
            <input value={pickerSearch} onChange={e=>setPickerSearch(e.target.value)}
              placeholder={t("searchMoves")}
              style={{ flex:1, background:C.bg, border:`1px solid ${C.border}`, borderRadius:8,
                padding:"7px 10px", color:C.text, fontSize:13, fontFamily:FONT_BODY, outline:"none" }}/>
            <button onClick={()=>{ setPickerOpen(false); setPickerSel([]); }}
              style={{ background:"none", border:"none", cursor:"pointer", padding:4 }}>
              <Ic n="x" s={16} c={C.textMuted}/>
            </button>
          </div>
          {/* Select All row */}
          {!pickerSearch&&(
            <div onClick={toggleAll}
              style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 14px",
                borderBottom:`2px solid ${C.border}`, background:C.surfaceAlt, cursor:"pointer" }}>
              <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                border:`2px solid ${isAllSel||isAllPart ? C.accent : C.border}`,
                background: isAllSel ? C.accent : "transparent",
                display:"flex", alignItems:"center", justifyContent:"center" }}>
                {isAllSel && <Ic n="check" s={11} c="#fff"/>}
                {isAllPart && <div style={{ width:8, height:2, background:C.accent, borderRadius:1 }}/>}
              </div>
              <span style={{ fontSize:12, fontWeight:800, letterSpacing:1.5, color:C.brownMid, fontFamily:FONT_DISPLAY }}>
                SELECT ALL
              </span>
              <span style={{ fontSize:11, color:C.textMuted, marginLeft:"auto" }}>
                {allAvailIds.length} available
              </span>
            </div>
          )}

          {/* Picker list */}
          <div style={{ flex:1, overflow:"auto", padding:"8px 0" }}>
            {(filteredMoves || allCats.map(()=>null)).length===0&&(
              <div style={{ padding:24, textAlign:"center", color:C.textMuted, fontSize:13 }}>No moves found</div>
            )}
            {filteredMoves ? (
              // flat search results
              filteredMoves.map(m=>{
                const inList   = isInList(m.id);
                const selected = isSelected(m.id);
                return (
                  <div key={m.id} onClick={()=>{ if(!inList) togglePick(m.id); }}
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 14px",
                      borderBottom:`1px solid ${C.borderLight}`,
                      background: selected ? `${C.accent}12` : "transparent",
                      cursor: inList ? "default" : "pointer", opacity: inList ? 0.45 : 1 }}>
                    <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                      border:`2px solid ${selected?C.accent:C.border}`,
                      background: selected ? C.accent : "transparent",
                      display:"flex", alignItems:"center", justifyContent:"center" }}>
                      {selected&&<Ic n="check" s={11} c="#fff"/>}
                      {inList&&!selected&&<Ic n="check" s={11} c={C.textMuted}/>}
                    </div>
                    <div style={{ width:7, height:7, borderRadius:"50%", background:masteryColor(m.mastery), flexShrink:0 }}/>
                    <span style={{ flex:1, fontSize:13, color:C.text, fontFamily:FONT_BODY }}>{m.name}</span>
                    <span style={{ fontSize:10, color:C.textMuted, fontFamily:FONT_DISPLAY }}>{m.category}</span>
                    {showMastery&&<span style={{ fontSize:11, color:masteryColor(m.mastery), fontWeight:700 }}>{m.mastery}%</span>}
                  </div>
                );
              })
            ) : (
              // grouped by category + sets section
              allCats.map(cat=>{
                const catMoves = moves.filter(m=>m.category===cat);
                const isExp = expCats[cat] !== false;
                const col = CAT_COLORS[cat]||C.accent;
                return (
                  <div key={cat}>
                    <div style={{ display:"flex", alignItems:"center", background:C.surface,
                      borderBottom:`1px solid ${C.borderLight}` }}>
                      {/* Category checkbox */}
                      <div onClick={()=>toggleCat(cat)}
                        style={{ padding:"7px 6px 7px 14px", cursor:"pointer", display:"flex", alignItems:"center" }}>
                        <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                          border:`2px solid ${isCatAll(cat)||isCatPartial(cat) ? C.accent : C.border}`,
                          background: isCatAll(cat) ? C.accent : "transparent",
                          display:"flex", alignItems:"center", justifyContent:"center" }}>
                          {isCatAll(cat)     && <Ic n="check" s={11} c="#fff"/>}
                          {isCatPartial(cat) && <div style={{ width:8, height:2, background:C.accent, borderRadius:1 }}/>}
                        </div>
                      </div>
                      {/* Category expand button */}
                      <button onClick={()=>setExpCats(p=>({...p,[cat]:!isExp}))}
                        style={{ flex:1, display:"flex", alignItems:"center", gap:7, padding:"7px 14px 7px 4px",
                          background:"transparent", border:"none", cursor:"pointer", textAlign:"left" }}>
                        <div style={{ width:8, height:8, borderRadius:"50%", background:col, flexShrink:0 }}/>
                        <span style={{ flex:1, fontSize:12, fontWeight:800, letterSpacing:1, color:C.brownMid, fontFamily:FONT_DISPLAY }}>{cat}</span>
                        <span style={{ fontSize:10, color:C.textMuted }}>{catMoves.length}</span>
                        <Ic n={isExp?"chevD":"chevR"} s={11} c={C.textMuted}/>
                      </button>
                    </div>
                    {isExp && catMoves.map(m=>{

                    {(()=>{

                        <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                          border:`2px solid ${allS||partS?C.accent:C.border}`,

                        </div>
                      );

                  <button onClick={()=>setExpCats(p=>({...p,"__sets__":p["__sets__"]===false?true:false}))}
                    style={{ flex:1, display:"flex", alignItems:"center", gap:7, padding:"7px 14px 7px 4px",
                      background:"transparent", border:"none", cursor:"pointer", textAlign:"left" }}>

                    <span style={{ fontSize:10, color:C.textMuted, marginLeft:"auto" }}>{sets.length}</span>
                    <Ic n={expCats["__sets__"]===false?"chevR":"chevD"} s={11} c={C.textMuted}/>
                  </button>
                </div>
                {expCats["__sets__"]!==false && sets.map(s=>{
                  const inList   = isInList(s.id);
                  const selected = isSelected(s.id);
                  return (
                    <div key={s.id} onClick={()=>{ if(!inList) togglePick(s.id); }}
                      style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 14px",
                        borderBottom:`1px solid ${C.borderLight}`,
                        background: selected ? `${C.accent}12` : "transparent",
                        cursor: inList ? "default" : "pointer", opacity: inList ? 0.45 : 1 }}>
                      <div style={{ width:18, height:18, borderRadius:4, flexShrink:0,
                        border:`2px solid ${selected?C.accent:C.border}`,

                        display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {selected&&<Ic n="check" s={11} c="#fff"/>}
                        {inList&&!selected&&<Ic n="check" s={11} c={C.textMuted}/>}
                      </div>
                      <div style={{ width:7, height:7, borderRadius:2, background:s.color||C.accent, flexShrink:0 }}/>
                      <span style={{ flex:1, fontSize:13, color:C.text, fontFamily:FONT_BODY }}>{s.name}</span>
                      <span style={{ fontSize:9, fontWeight:800, letterSpacing:1, color:C.textMuted, fontFamily:FONT_DISPLAY,
                        background:C.surface, borderRadius:4, padding:"2px 5px" }}>
