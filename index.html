const ManualModal = ({ onClose }) => {
  const { C } = useSettings();
  const [search, setSearch] = useState("");
  const [openSections, setOpenSections] = useState({});
  const searchRef = useRef(null);

  const q = search.toLowerCase().trim();

  const filtered = MANUAL_SECTIONS.map(sec => ({
    ...sec,
    items: sec.items.filter(item =>
      !q ||
      item.title.toLowerCase().includes(q) ||
      item.body.toLowerCase().includes(q)
    )
  })).filter(sec => !q || sec.items.length > 0);

  // Auto-expand all sections when searching
  const sectionsOpen = q
    ? Object.fromEntries(filtered.map(s => [s.id, true]))
    : openSections;

  const toggleSection = (id) => {
    if (q) return; // don't toggle when searching
    setOpenSections(p => ({ ...p, [id]: !p[id] }));
  };

  const highlight = (text) => {
    if (!q) return text;
    const parts = text.split(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'));
    return parts.map((part, i) =>
      part.toLowerCase() === q
        ? <mark key={i} style={{ background:`${C.accent}40`, color:C.text, borderRadius:2, padding:"0 1px" }}>{part}</mark>
        : part
    );
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:900, display:"flex", flexDirection:"column",
      background:C.bg }}>

      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 16px",
        background:C.surface, borderBottom:`2px solid ${C.border}`, flexShrink:0 }}>
        <span style={{ fontWeight:900, fontSize:16, letterSpacing:2, fontFamily:FONT_DISPLAY, color:C.accent }}>
          USER MANUAL
        </span>
        <div style={{ flex:1 }}/>
        <button onClick={onClose}
          style={{ background:"none", border:"none", cursor:"pointer", padding:4, display:"flex" }}>
          <Ic n="x" s={20} c={C.textMuted}/>
        </button>
      </div>

      {/* Search bar */}
      <div style={{ padding:"10px 14px", background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, background:C.bg,
          border:`1.5px solid ${q ? C.accent : C.border}`, borderRadius:10, padding:"7px 12px",
          transition:"border-color 0.15s" }}>
          <span style={{ fontSize:14, color:C.textMuted }}>🔍</span>
          <input
            ref={searchRef}
            value={search}
            onChange={e=>setSearch(e.target.value)}
            placeholder="Search the manual…"
            style={{ flex:1, background:"none", border:"none", outline:"none", color:C.text,
              fontSize:13, fontFamily:FONT_BODY }}
            autoFocus
          />
          {search&&(
            <button onClick={()=>setSearch("")}
              style={{ background:"none", border:"none", cursor:"pointer", padding:0, display:"flex" }}>
              <Ic n="x" s={13} c={C.textMuted}/>
            </button>
          )}
        </div>
        {q&&(
          <div style={{ fontSize:11, color:C.textMuted, marginTop:6, fontFamily:FONT_DISPLAY }}>
            {filtered.reduce((acc,s)=>acc+s.items.length,0)} result{filtered.reduce((acc,s)=>acc+s.items.length,0)!==1?"s":""} for "{search}"
          </div>
        )}
      </div>

      {/* Sections */}
      <div style={{ flex:1, overflow:"auto", padding:"8px 0 80px" }}>
        {filtered.length===0&&(
          <div style={{ textAlign:"center", padding:"60px 20px", color:C.textMuted }}>
            <div style={{ fontSize:32, marginBottom:10 }}>🤷</div>
            <div style={{ fontSize:14, fontWeight:700, fontFamily:FONT_DISPLAY, marginBottom:6 }}>Nothing found</div>
            <div style={{ fontSize:12 }}>Try different keywords</div>
          </div>
        )}
        {filtered.map(sec=>{
          const isOpen = sectionsOpen[sec.id];
          return (
            <div key={sec.id} style={{ borderBottom:`1px solid ${C.borderLight}` }}>
              {/* Section header */}
              <button
                onClick={()=>toggleSection(sec.id)}
                style={{ width:"100%", display:"flex", alignItems:"center", gap:10,
                  padding:"12px 16px", background:"none", border:"none", cursor:"pointer",
                  textAlign:"left" }}>
                <span style={{ fontSize:18 }}>{sec.icon}</span>
                <span style={{ flex:1, fontWeight:900, fontSize:13, letterSpacing:1.5,
                  fontFamily:FONT_DISPLAY, color:C.text }}>{sec.title.replace(/^\p{Emoji}\s*/u, "")}</span>
                <span style={{ fontSize:11, color:C.textMuted, fontFamily:FONT_DISPLAY,
                  marginRight:4 }}>{sec.items.length}</span>
                <Ic n={isOpen?"chevD":"chevR"} s={13} c={C.textMuted}/>
              </button>

              {/* Items */}
              {isOpen&&sec.items.map((item,i)=>(
                <div key={i} style={{ padding:"10px 16px 14px 44px",
                  background: i%2===0 ? C.surface : "transparent",
                  borderTop:`1px solid ${C.borderLight}` }}>
                  <div style={{ fontWeight:800, fontSize:13, color:C.accent,
                    fontFamily:FONT_DISPLAY, letterSpacing:0.5, marginBottom:6 }}>
                    {highlight(item.title)}
                  </div>
                  <div style={{ fontSize:12, color:C.textSec, lineHeight:1.75,
                    whiteSpace:"pre-wrap", fontFamily:FONT_BODY }}>
                    {highlight(item.body)}
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
};

const Walkthrough = ({ onDone }) => {
  const [step, setStep] = useState(0);
  const [rect, setRect] = useState(null);
  const [fade, setFade] = useState(true);
  const current = TOUR_STEPS[step];
  const isLast  = step === TOUR_STEPS.length - 1;
  const progress = Math.round((step / (TOUR_STEPS.length - 1)) * 100);

  const D = {
    bg:"#0e0906", surface:"#1a1208", border:"#3a2a18",
    text:"#ede0cc", muted:"#7a6858", accent:"#cf2020", accentD:"#8b1a1a",
  };

  useEffect(() => {
    if (current.type === "spotlight" && current.target) {
      const tryFind = (n) => {
        const el = document.getElementById(current.target);
        if (el) {
          const r = el.getBoundingClientRect();
          setRect({ top:r.top, left:r.left, width:r.width, height:r.height });
        } else if (n < 10) { setTimeout(() => tryFind(n+1), 80); }
        else { setRect(null); }
      };
      tryFind(0);
    } else { setRect(null); }
  }, [step]);

  const advance = () => {
    setFade(false);
    setTimeout(() => {
      if (isLast) { onDone(); return; }
      setStep(s => s+1);
      setFade(true);
    }, 160);
  };

  const TW = 284;
  const tooltipPos = () => {
    if (!rect) return { top:"50%", left:"50%", transform:"translate(-50%,-50%)", position:"fixed" };
    const vw = window.innerWidth;
    const cx  = rect.left + rect.width / 2;
    const left = Math.max(10, Math.min(cx - TW/2, vw - TW - 10));
    const spaceBelow = window.innerHeight - (rect.top + rect.height);
    if (spaceBelow > 170) {
      return { position:"fixed", top:rect.top + rect.height + 14, left, width:TW, arrowTop:true, arrowLeft: cx - left - 7 };
    } else {
      return { position:"fixed", bottom: window.innerHeight - rect.top + 14, left, width:TW, arrowBottom:true, arrowLeft: cx - left - 7 };
    }
  };

  const Dots = () => (
    <div style={{ display:"flex", gap:4, alignItems:"center" }}>
      {TOUR_STEPS.map((_,i) => (
        <div key={i} style={{
          width:i===step?18:5, height:5, borderRadius:3,
          background:i===step ? D.accent : i<step ? "#5a3020" : D.border,
          transition:"all 0.25s ease",
        }}/>
      ))}
    </div>
  );

  const ProgressBar = () => (
    <div style={{ height:2, background:D.border, borderRadius:1, marginBottom:22 }}>
      <div style={{ height:"100%", width:progress+"%", background:D.accent,
        borderRadius:1, transition:"width 0.35s ease" }}/>
    </div>
  );

  const MiniCards = ({ cards }) => (
    <div style={{ display:"flex", flexDirection:"column", gap:7, margin:"14px 0 18px" }}>
      {cards.map((c,i) => (
        <div key={i} style={{ display:"flex", alignItems:"center", gap:12,
          background:D.bg, border:"1px solid "+D.border,
          borderRadius:10, padding:"9px 14px" }}>
          <span style={{ fontSize:19, flexShrink:0 }}>{c.emoji}</span>
          <div>
            <div style={{ fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:11,
              letterSpacing:1.5, color:D.text }}>{c.label}</div>
            <div style={{ fontSize:11, color:D.muted, marginTop:1, lineHeight:1.4 }}>{c.desc}</div>
          </div>
        </div>
      ))}
    </div>
  );

  const CTABtn = ({ label }) => (
    <button onClick={advance}
      style={{ width:"100%", background:D.accent, border:"none", borderRadius:12,
        padding:"13px 0", color:"#fff", fontFamily:FONT_DISPLAY, fontWeight:900,
        fontSize:13, letterSpacing:2.5, cursor:"pointer",
        boxShadow:"0 4px 24px rgba(207,32,32,0.4)", transition:"transform 0.1s" }}
      onMouseDown={e=>e.currentTarget.style.transform="scale(0.97)"}
      onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
      onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
      {label}
    </button>
  );

  const CenterCard = () => (
    <div style={{ position:"fixed", inset:0, display:"flex", alignItems:"center",
      justifyContent:"center", padding:"20px 16px", zIndex:10001 }}>
      <div style={{ background:D.surface, border:"1px solid "+D.border, borderRadius:22,
        padding:"26px 22px", maxWidth:340, width:"100%",
        boxShadow:"0 40px 120px rgba(0,0,0,0.85)" }}>
        <ProgressBar/>
        <div style={{ textAlign:"center", marginBottom:current.cards ? 4 : 22 }}>
          <div style={{ fontSize:40, marginBottom:10, lineHeight:1 }}>{current.emoji}</div>
          <div style={{ fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:16,
            letterSpacing:2.5, color:D.text, marginBottom:10 }}>{current.title}</div>
          {current.body && (
            <p style={{ fontSize:13, color:D.muted, lineHeight:1.65, margin:0 }}>{current.body}</p>
          )}
        </div>
        {current.cards && <MiniCards cards={current.cards}/>}
        {current.sub && (
          <p style={{ fontSize:11, color:D.muted, fontStyle:"italic",
            textAlign:"center", margin:"0 0 16px", lineHeight:1.55 }}>{current.sub}</p>
        )}
        <CTABtn label={current.cta}/>
        {current.skippable && (
          <button onClick={onDone}
            style={{ display:"block", margin:"12px auto 0", background:"none", border:"none",
              color:D.muted, fontSize:11, cursor:"pointer", fontFamily:FONT_DISPLAY, letterSpacing:1 }}>
            Skip tour
          </button>
        )}
        <div style={{ display:"flex", justifyContent:"center", marginTop:18 }}>
          <Dots/>
        </div>
      </div>
    </div>
  );

  const SpotlightCard = () => {
    const pos = tooltipPos();
    const arrowClamp = v => Math.max(10, Math.min(v, TW - 24));
    return (
      <div style={{ position:pos.position, top:pos.top, bottom:pos.bottom,
        left:pos.left, width:pos.width,
        background:D.surface, border:"1px solid "+D.border,
        borderRadius:16, padding:"16px 18px 14px",
        boxShadow:"0 20px 70px rgba(0,0,0,0.9)", zIndex:10001 }}>

        {pos.arrowTop && rect && (
          <div style={{ position:"absolute", top:-7, left:arrowClamp(pos.arrowLeft),
            width:14, height:14, background:D.surface,
            borderTop:"1px solid "+D.border, borderLeft:"1px solid "+D.border,
            transform:"rotate(45deg)" }}/>
        )}
        {pos.arrowBottom && rect && (
          <div style={{ position:"absolute", bottom:-7, left:arrowClamp(pos.arrowLeft),
            width:14, height:14, background:D.surface,
            borderBottom:"1px solid "+D.border, borderRight:"1px solid "+D.border,
            transform:"rotate(45deg)" }}/>
        )}

        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
          <span style={{ fontSize:18 }}>{current.emoji}</span>
          <span style={{ fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:14,
            letterSpacing:2, color:D.text }}>{current.title}</span>
          <div style={{ flex:1 }}/>
          <span style={{ fontSize:10, color:D.muted, fontFamily:FONT_DISPLAY }}>
            {step+1}/{TOUR_STEPS.length}
          </span>
        </div>

        <p style={{ fontSize:12.5, color:D.muted, lineHeight:1.6, margin:"0 0 14px" }}>
          {current.body}
        </p>

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <Dots/>
          <button onClick={advance}
            style={{ background:D.accent, border:"none", borderRadius:8,
              padding:"8px 18px", color:"#fff", fontFamily:FONT_DISPLAY, fontWeight:900,
              fontSize:11, letterSpacing:2, cursor:"pointer",
              boxShadow:"0 2px 12px rgba(207,32,32,0.35)" }}>
            {isLast ? "DONE 🔥" : current.cta}
          </button>
        </div>
      </div>
    );
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:10000,
      opacity:fade?1:0, transition:"opacity 0.16s ease",
      pointerEvents:fade?"auto":"none" }}>

      {current.type === "center" ? (
        <div style={{ position:"fixed", inset:0, background:"rgba(8,4,2,0.95)" }}/>
      ) : (
        <svg style={{ position:"fixed", inset:0, width:"100%", height:"100%", pointerEvents:"none" }}>
          <defs>
            <mask id="tour-mask">
              <rect width="100%" height="100%" fill="white"/>
              {rect && <rect x={rect.left-8} y={rect.top-8}
                width={rect.width+16} height={rect.height+16} rx={12} fill="black"/>}
            </mask>
          </defs>
          <rect width="100%" height="100%" fill="rgba(8,4,2,0.9)" mask="url(#tour-mask)"/>
          {rect && (
            <rect x={rect.left-8} y={rect.top-8}
              width={rect.width+16} height={rect.height+16} rx={12}
              fill="none" stroke="#cf2020" strokeWidth="2.5"
              style={{ filter:"drop-shadow(0 0 10px rgba(207,32,32,0.65))" }}/>
          )}
        </svg>
      )}

      {current.type === "center"    && <CenterCard/>}
      {current.type === "spotlight" && <SpotlightCard/>}
    </div>
  );
};

            <textarea value={vocabImp} onChange={e=>setVocabImp(e.target.value)} placeholder="Anything confusing or missing?" style={{...textareaStyle, minHeight:60}}/>

          {/* Battle */}

            {BATTLE_OPTIONS.map(o=>(
              <button key={o} onClick={()=>toggleCheck(o,battleLikes,setBattleLikes)}

            <textarea value={battleImp} onChange={e=>setBattleImp(e.target.value)} placeholder="Anything confusing or missing?" style={{...textareaStyle, minHeight:60}}/>
          </div>

          {/* Feeling */}
          <div style={{ marginBottom:22 }}>
            <div style={{ fontSize:11, fontWeight:800, letterSpacing:2, color:C.accent, fontFamily:FONT_DISPLAY, marginBottom:10 }}>IF THE APP DISAPPEARED TOMORROW... *</div>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {FEELINGS.map(f=>(
                <button key={f} onClick={()=>setFeeling(f)}
                  style={{ display:"flex", alignItems:"center", gap:10,
                    border:`1.5px solid ${feeling===f?C.accent:C.border}`, borderRadius:8,
                    padding:"10px 14px", cursor:"pointer",
                    background:feeling===f?`${C.accent}18`:C.surfaceAlt, transition:"all 0.15s" }}>
                  <div style={{ width:16, height:16, borderRadius:"50%", flexShrink:0,
                    border:`2px solid ${feeling===f?C.accent:C.border}`,
                    background:feeling===f?C.accent:"transparent", transition:"all 0.15s" }}/>
                  <span style={{ fontSize:13, color:feeling===f?C.text:C.textSec,
                    fontFamily:FONT_BODY, fontWeight:feeling===f?600:400 }}>{f}</span>
                </button>
              ))}
            </div>
          </div>

          <div style={{ height:8 }}/>
        </div>

        {/* Footer */}
        <div style={{ padding:"12px 18px", borderTop:`1px solid ${C.border}`,
          flexShrink:0, background:C.surface }}>
          {status === "error" && (
            <div style={{ fontSize:12, color:C.red, marginBottom:8, textAlign:"center" }}>
              Something went wrong. Please try again.
            </div>
          )}

            </div>
          )}

            style={{ width:"100%", padding:"13px", borderRadius:10, border:"none",
              background: canSubmit ? C.accent : C.border,
              color: canSubmit ? C.bg : C.textMuted,
              fontSize:14, fontWeight:900, fontFamily:FONT_DISPLAY, letterSpacing:1.5,
              cursor: canSubmit ? "pointer" : "not-allowed",
              opacity: status==="sending" ? 0.7 : 1, transition:"all 0.2s" }}>
            {status === "sending" ? "SENDING…" : "SUBMIT FEEDBACK"}
          </button>
        </div>
      </div>
    </div>
  );
};

const SettingsModal = ({ onClose, settings, onSave, onClearMoves, onRestoreRounds, onRestartTour, zoom=1, onZoomChange }) => {
  const t = useT();
  const [s,setS]=useState({
    theme:"light", defaultTab:"wip", showMastery:false,
    compactCards:false, sortMoves:"custom", fontSize:"medium",
    showMoveCount:false, confirmDelete:true, practiceReminders:false,
    reminderTime:"18:00", streakTracking:true, showDeadlineIndicator:true,
    categorySort:"manual", showMoveCount:true, defaultView:"list", language:"en", linkOnCard:"inside", targetAutoLink:false, trainTabOrder:["goals","habits","notes"],
    ...settings
  });
  const [confirmClear,setConfirmClear]=useState(false);
  const [confirmRestoreRounds,setConfirmRestoreRounds]=useState(false);
  const set=k=>v=>setS(p=>({...p,[k]:v}));

  const isDark = s.theme==="dark";
  const panelBg  = isDark ? "#121212" : C.bg;
  const panelSrf = isDark ? "#1e1e1e" : C.surface;
  const panelTxt = isDark ? "#ffffff" : C.text;
  const panelMut = isDark ? "#7a7a7a" : C.textMuted;
  const panelBrd = isDark ? "#3a3a3a" : C.border;

  const row=(label,desc,child,noBorder=false)=>(
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:12,
      padding:"13px 0", borderBottom:noBorder?"none":`1px solid ${panelBrd}` }}>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:13, fontWeight:700, color:panelTxt, fontFamily:FONT_DISPLAY, letterSpacing:0.3 }}>{label}</div>
        {desc&&<div style={{ fontSize:11, color:panelMut, marginTop:2, lineHeight:1.4 }}>{desc}</div>}
      </div>
      <div style={{ flexShrink:0 }}>{child}</div>
    </div>
  );

  const toggle=(key,accentOverride)=>{ const accent=accentOverride||C.accent; return (
    <button onClick={()=>set(key)(!s[key])} aria-label={key}
      style={{ width:46, height:26, borderRadius:13, background:s[key]?accent:panelBrd, border:"none", cursor:"pointer",
        position:"relative", transition:"background 0.2s", flexShrink:0 }}>
      <div style={{ position:"absolute", top:4, left:s[key]?24:4, width:18, height:18, borderRadius:"50%",
        background:"#fff", transition:"left 0.2s", boxShadow:"0 1px 4px rgba(0,0,0,0.3)" }}/>
    </button>
  );};

  const segmented=(key,options)=>{
    const accent=C.accent;
    return (
      <div style={{ display:"flex", background:panelSrf, borderRadius:8, border:`1px solid ${panelBrd}`, overflow:"hidden" }}>
        {options.map((o,i)=>{
          const active=s[key]===(o.value||o);
          return <button key={o.value||o} onClick={()=>set(key)(o.value||o)}
            style={{ padding:"6px 12px", border:"none", borderLeft:i>0?`1px solid ${panelBrd}`:"none",
              background:active?accent:panelSrf, color:active?"#fff":panelMut,
              cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:FONT_DISPLAY, transition:"all 0.15s" }}>
            {o.icon&&<span style={{marginRight:4}}>{o.icon}</span>}{o.label||o}
          </button>;
        })}
      </div>
    );
  };

  const sectionHdr=(label,emoji)=>(
    <div style={{ display:"flex", alignItems:"center", gap:7, margin:"22px 0 6px",
      paddingBottom:7, borderBottom:`2px solid ${panelBrd}` }}>
      {emoji&&<span style={{fontSize:14}}>{emoji}</span>}
      <span style={{ fontSize:11, fontWeight:800, letterSpacing:2.5, color:panelMut, fontFamily:FONT_DISPLAY }}>{label}</span>
    </div>
  );

  const accent=C.accent;

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(10,5,2,0.8)", zIndex:1000,
      display:"flex", alignItems:"flex-end", justifyContent:"center", padding:"0 0 0 0" }}>
      <div style={{ background:panelBg, border:`2px solid ${panelBrd}`, borderRadius:"14px 14px 0 0", width:"100%",
        maxWidth:480, height:"90dvh", display:"flex", flexDirection:"column", overflow:"hidden",
        boxShadow:"0 -8px 40px rgba(0,0,0,0.6)", color:panelTxt }}>

        {/* Sticky header */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"13px 18px", borderBottom:`1px solid ${panelBrd}`, flexShrink:0,
          background:panelBg, zIndex:10 }}>
          <span style={{ fontWeight:800, fontSize:15, letterSpacing:2, color:panelTxt, fontFamily:FONT_DISPLAY }}>⚙️ SETTINGS</span>
          <button onClick={()=>{ onSave({...s, zoom}); onClose(); }}
            style={{ background:panelSrf, border:`1px solid ${panelBrd}`, cursor:"pointer",
              color:panelMut, padding:5, borderRadius:7, display:"flex" }}>
            <Ic n="x" s={14} c={panelMut}/>
          </button>
        </div>

        <div style={{ flex:1, overflow:"auto", zoom:zoom, WebkitTextSizeAdjust:"none" }}>
        <div style={{ padding:18 }}>

          {/* ── APPEARANCE ──────────────────────────────── */}
          {sectionHdr(t("appearance"),"🎨")}

          {row(t("theme"), "How the app looks",
            segmented("theme",[{value:"light",icon:"☀️",label:t("light")},{value:"dark",icon:"🌙",label:t("dark")}])
          )}

          {row(t("textSize"), "Font size throughout the app",
            segmented("fontSize",[{value:"small",label:"S"},{value:"medium",label:"M"},{value:"large",label:"L"}])
          )}

          {row(t("defaultView"), t("defaultViewDesc"),
            segmented("defaultView",[{value:"list",icon:"☰",label:t("list")},{value:"tiles",icon:"⊞",label:t("tiles")}])
          )}

          {row("Display Zoom", "Scale the content area to fit your screen.",
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <button onClick={()=>onZoomChange&&onZoomChange(Math.max(0.6,parseFloat((zoom-0.1).toFixed(1))))}
                disabled={zoom<=0.6}
                style={{ width:28, height:28, borderRadius:7, background:C.surface, border:`1px solid ${C.border}`,
                  cursor:zoom<=0.6?"not-allowed":"pointer", display:"flex", alignItems:"center", justifyContent:"center",
                  fontWeight:800, fontSize:16, color:C.brown, opacity:zoom<=0.6?0.4:1 }}>−</button>
              <div style={{ minWidth:42, textAlign:"center", fontSize:13, fontWeight:700, color:C.text, fontFamily:FONT_BODY }}>
                {Math.round(zoom*100)}%

              <button onClick={()=>onZoomChange&&onZoomChange(Math.min(1.4,parseFloat((zoom+0.1).toFixed(1))))}

                style={{ width:28, height:28, borderRadius:7, background:C.surface, border:`1px solid ${C.border}`,
                  cursor:zoom>=1.4?"not-allowed":"pointer", display:"flex", alignItems:"center", justifyContent:"center",
                  fontWeight:800, fontSize:16, color:C.brown, opacity:zoom>=1.4?0.4:1 }}>+</button>
              <button onClick={()=>onZoomChange&&onZoomChange(1)}
                style={{ fontSize:11, color:C.textMuted, background:"none", border:"none", cursor:"pointer",
                  fontFamily:FONT_BODY, padding:"2px 4px", textDecoration:"underline" }}>reset</button>

                  try {

                    const parseRow = line => {
                      const cols = []; let cur="", inQ=false;
                      for (let i=0; i<line.length; i++) {
                        const ch = line[i];
                        if (ch==='"' && !inQ) { inQ=true; }
                        else if (ch==='"' && inQ && line[i+1]==='"') { cur+='"'; i++; }
                        else if (ch==='"' && inQ) { inQ=false; }
                        else if (ch===',' && !inQ) { cols.push(cur); cur=""; }
                        else { cur+=ch; }
                      }
                      cols.push(cur);
                      return cols;
                    };

                    const existingKeys = new Set(existing.map(m=>(m.name+"|"+m.category).toLowerCase()));
                    const toAdd = [];
                    let skipped = 0, headerSeen = false;
                    for (const line of lines) {
                      const cols = parseRow(line);

                      if (cols[0].toLowerCase()==="type" || cols[0].toLowerCase()==="name") { headerSeen=true; continue; }

                    if (toAdd.length) {
                      const updated = [...existing, ...toAdd];
                      localStorage.setItem("mb_moves", JSON.stringify(updated));
                    }
                    const msg = `Import complete.\n✅ ${toAdd.length} move${toAdd.length!==1?"s":""} added${skipped?`\n⏭ ${skipped} duplicate${skipped!==1?"s":""} skipped`:""}.`;
                    alert(msg);
                    if (toAdd.length) window.location.reload();
                    e.target.value="";
                  } catch(err) { alert("Import failed — please check the file format."); }
                };

// ─── ROOT APP ─────────────────────────────────────────────────────────────────

// ── Firebase stubs for preview ──
if (typeof window !== "undefined") {
  window.__MB_USER__ = window.__MB_USER__ || null;
  window.__MB_DB__   = window.__MB_DB__   || null;
}
// ── SCHEMA & MIGRATION ───────────────────────────────────────────────────────
const SCHEMA_VERSION = "5";

function migrateMove(m) {
  return {
    ...m,
    id:          m.id          || Date.now(),
    name:        m.name        || "",
    category:    m.category    || "Footworks",
    mastery:     typeof m.mastery === "number" ? m.mastery : 0,
    status:      "wip",
    description: m.description || "",
    notes:       m.notes       || "",
    link:        m.link        || "",
    date:        m.date        || Date.now(),
  };
}

function loadLocal(key, fallback) {
  try {
    const v = localStorage.getItem("mb_data_version");
    if (v !== SCHEMA_VERSION) return fallback;
    const s = localStorage.getItem(key);
    return s ? JSON.parse(s) : fallback;
  } catch { return fallback; }
}

function saveLocal(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    localStorage.setItem("mb_data_version", SCHEMA_VERSION);
  } catch {}
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

function App() {
  const [tab,setTab]=useState(()=>{ try { const st=localStorage.getItem("mb_settings"); if(st){ const p=JSON.parse(st); if(p.defaultTab) return p.defaultTab; } } catch {} return "wip"; });

  // ── Data state ─────────────────────────────────────────────────────────────
  const [moves,  setMoves]  = useState(() => {
    try {
      const s = localStorage.getItem("mb_moves");
      if (s) { const p = JSON.parse(s); if (Array.isArray(p) && p.length > 0) return p.map(migrateMove); }
    } catch {}
    return INIT_MOVES;
  });
  const [cats, setCats] = useState(() => {
    try {
      const s = localStorage.getItem("mb_cats");
      if (s) { const p = JSON.parse(s); if (Array.isArray(p) && p.length > 0) return p; }
    } catch {}
    return [...CATS];
  });
  const [catColors, setCatColors] = useState(() => {
    try {
      const s = localStorage.getItem("mb_cat_colors");
      if (s) { const p = JSON.parse(s); if (p && typeof p === "object") return p; }
    } catch {}
    return {...CAT_COLORS};
  });
  const [sets, setSets] = useState(() => {
    try {
      const s = localStorage.getItem("mb_sets");
      if (s) { const p = JSON.parse(s); if (Array.isArray(p) && p.length > 0) return p; }
    } catch {}
    return INIT_SETS;
  });
  const [rounds, setRounds] = useState(() => {
    try {
      const s = localStorage.getItem("mb_rounds");
      if (s) { const p = JSON.parse(s); if (Array.isArray(p) && p.length > 0) return p; }
    } catch {}
    return INIT_ROUNDS;
  });
  const [habits, setHabits] = useState(() => {
    try {
      const s = localStorage.getItem("mb_habits");
      if (s) { const p = JSON.parse(s); if (Array.isArray(p) && p.length > 0) return p; }
    } catch {}
    return INIT_HABITS;
  });
  const [profile, setProfile] = useState(() => {
    try {
      const s = localStorage.getItem("mb_profile");
      if (s) { const p = JSON.parse(s); if (p && Object.values(p).some(v=>v)) return p; }
    } catch {}
    return { nickname:"", age:"", gender:"", goals:"", years:"", startYear:"", startMonth:"", startDay:"", why:"" };
  });
  const [ideas, setIdeas] = useState(() => {
    try {
      const s = localStorage.getItem("mb_ideas");
      if (s) { const p = JSON.parse(s); if (Array.isArray(p) && p.length > 0) return p; }
    } catch {}
    return INIT_IDEAS;
  });

  // ── Persist to localStorage on every change ────────────────────────────────
  useEffect(()=>{ saveLocal("mb_moves",   moves);   },[moves]);
  useEffect(()=>{ saveLocal("mb_cats",      cats);      },[cats]);
  useEffect(()=>{ saveLocal("mb_cat_colors",catColors); },[catColors]);
  useEffect(()=>{ saveLocal("mb_sets",    sets);    },[sets]);
  useEffect(()=>{ saveLocal("mb_rounds",  rounds);  },[rounds]);
  useEffect(()=>{
    try { localStorage.setItem("mb_habits", JSON.stringify(habits)); } catch {}
    const timer = setTimeout(()=>{ if(window.__MB_USER__?.uid && window.__MB_DB__) window.__MB_DB__.save(window.__MB_USER__.uid,"habits",habits); }, 1500);
    return ()=>clearTimeout(timer);
  },[habits]);
  useEffect(()=>{ if(Object.values(profile).some(v=>v)) saveLocal("mb_profile", profile); },[profile]);
  useEffect(()=>{ saveLocal("mb_ideas",   ideas);
    const timer = setTimeout(() => {
      if (window.__MB_USER__?.uid && window.__MB_DB__) {
        window.__MB_DB__.save(window.__MB_USER__.uid, 'ideas', ideas);
      }
    }, 1500);
    return () => clearTimeout(timer);
  },[ideas]);

  // ── Firestore sync ─────────────────────────────────────────────────────────
  const [fbUser, setFbUser] = useState(null);
  const dbSave = useRef({});

  useEffect(() => {
    const save = (key, ms=1500) => debounce(
      (uid, val) => window.__MB_DB__?.save(uid, key, val), ms
    );
    dbSave.current = {
      moves:     save("moves"),
      sets:      save("sets"),
      rounds:    save("rounds"),
      profile:   save("profile"),
      ideas:     save("ideas"),
      settings:  save("settings"),
      cats:      save("cats"),
      catColors: save("catColors"),
    };
  }, []);

  useEffect(()=>{ if(fbUser?.uid) dbSave.current.moves?.(fbUser.uid,   moves);   },[moves,   fbUser]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.ideas?.(fbUser.uid,   ideas);   },[ideas,   fbUser]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.sets?.(fbUser.uid,    sets);    },[sets,    fbUser]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.rounds?.(fbUser.uid,  rounds);  },[rounds,  fbUser]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.profile?.(fbUser.uid, profile); },[profile, fbUser]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.cats?.(fbUser.uid,      cats);      },[cats,      fbUser]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.catColors?.(fbUser.uid, catColors); },[catColors, fbUser]);

  // ── Auth resolution ────────────────────────────────────────────────────────
  useEffect(()=>{
    function handleAuthResolved() {
      if (window.__MB_USER__) {
        setFbUser(window.__MB_USER__);
        try {
          const m = localStorage.getItem("mb_moves");
          const s = localStorage.getItem("mb_sets");
          const r = localStorage.getItem("mb_rounds");
          const p = localStorage.getItem("mb_profile");
          if (m) { try { const p=JSON.parse(m); if(Array.isArray(p)&&p.length>0) setMoves(p.map(migrateMove)); } catch {} }
          const ct = localStorage.getItem("mb_cats"); if (ct) { try { const p=JSON.parse(ct); if(Array.isArray(p)&&p.length>0) setCats(p); } catch {} }
          const cc = localStorage.getItem("mb_cat_colors"); if (cc) { try { setCatColors(JSON.parse(cc)); } catch {} }
          if (s) { try { const p=JSON.parse(s); if(Array.isArray(p)&&p.length>0) setSets(p); } catch {} }
          if (r) { try { const p=JSON.parse(r); if(Array.isArray(p)&&p.length>0) setRounds(p); } catch {} }
          const id = localStorage.getItem("mb_ideas");
          if (id) { try { const p=JSON.parse(id); if(Array.isArray(p)&&p.length>0) setIdeas(p); } catch {} }
          const tpl = localStorage.getItem("mb_templates");
          if (tpl) { try { setTemplatesSynced(JSON.parse(tpl)); } catch {} }
          const hb = localStorage.getItem("mb_habits");
          if (hb) { try { const p=JSON.parse(hb); if(Array.isArray(p)&&p.length>0) setHabits(p); } catch {} }
          if (p) { try { const pp=JSON.parse(p); if(pp&&Object.values(pp).some(v=>v)) setProfile(pp); } catch{} }
          const st = localStorage.getItem("mb_settings");
          if (st) {
            const parsed = JSON.parse(st);
            setAppSettings(prev=>({...prev,...parsed}));
            if (parsed.defaultTab) setTab(parsed.defaultTab);
            if (parsed.zoom) setZoom(parsed.zoom);
          }
          localStorage.setItem("mb_data_version", SCHEMA_VERSION);
          // Show tour for first-time users (no tour record for this uid)
          const uid = window.__MB_USER__.uid;
          if (!localStorage.getItem('mb_toured_' + uid)) setShowTour(true);
        } catch {}
      } else {
        setFbUser(null);
        setMoves(INIT_MOVES);
        setCats([...CATS]);
        setCatColors({...CAT_COLORS});
        setSets(INIT_SETS);
        setRounds(INIT_ROUNDS);
        setIdeas(INIT_IDEAS);
        setHabits(INIT_HABITS);
        setProfile({ nickname:"", age:"", gender:"", goals:"", years:"",
          startYear:"", startMonth:"", startDay:"", why:"" });
      }
    }
    window.addEventListener("mb-auth-resolved", handleAuthResolved);
    if (window.__MB_USER__) handleAuthResolved();
    return () => window.removeEventListener("mb-auth-resolved", handleAuthResolved);
  },[]);

  const [toasts,setToasts]=useState([]);
  const [ideaToMove,setIdeaToMove]=useState(null);
  const [showProfile,setShowProfile]=useState(false);
  
  const [zoom, setZoom] = useState(()=>{ try { const s=localStorage.getItem("mb_settings"); if(s){ const p=JSON.parse(s); if(p.zoom) return p.zoom; } } catch{} return 1; });
  const handleZoomChange = (val) => { setZoom(val); setAppSettings(p=>({...p, zoom:val})); };
  const zoomMin=0.6, zoomMax=1.4, zoomStep=0.1;
  const [addTick, setAddTick] = useState(0);
  const [subTab, setSubTab] = useState("moves"); // tracks active sub-tab across pages
  const [addMenu, setAddMenu] = useState(false); // contextual + menu
  const [trainModal,  setTrainModal]  = useState({});
  const [trainMenu,   setTrainMenu]   = useState(null);
  const [showFeedback,setShowFeedback]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showManual,   setShowManual]   =useState(false);
  const [showTour,setShowTour]=useState(false);
  const [appSettings,setAppSettings]=useState(()=>({
    ...{
      theme:"light", defaultTab:"wip", showMastery:false,
      compactCards:false, sortMoves:"custom", fontSize:"medium",
      showMoveCount:false, confirmDelete:true, practiceReminders:false,
      reminderTime:"18:00", streakTracking:true, showDeadlineIndicator:true,
      categorySort:"manual", defaultView:"list", language:"en", linkOnCard:"inside", targetAutoLink:false, trainTabOrder:["goals","habits","notes"],
    },
    ...loadLocal("mb_settings", {}),
  }));
  useEffect(()=>{ saveLocal("mb_settings", appSettings); },[appSettings]);
  useEffect(()=>{ if(fbUser?.uid) dbSave.current.settings?.(fbUser.uid, appSettings); },[appSettings, fbUser]);

  // ── Apply theme: mutate the shared C object so all components re-read it ──
  const newPalette = buildPalette(appSettings.theme);
  Object.assign(C, newPalette);

  // Font scale — inject into document root so all px-based sizes scale via CSS zoom
  const fontScale = FONT_SIZES[appSettings.fontSize] || 1;
  // Card padding scale
  const cardPad = appSettings.compactCards ? "6px 8px" : "10px 12px";
  const cardFontSize = appSettings.compactCards ? 11 : 13;

  const addToast=useCallback(t=>{ const id=Date.now(); setToasts(prev=>[...prev,{...t,id}]); setTimeout(()=>setToasts(prev=>prev.filter(x=>x.id!==id)),5500); },[]);
  const removeToast=id=>setToasts(prev=>prev.filter(t=>t.id!==id));

  const setMovesGrad = useCallback(updater => {
    setMoves(prev => typeof updater==="function" ? updater(prev) : updater);
  }, []);

  const handleAddMoveFromIdea = (text) => { setIdeaToMove(text); setTab("wip"); };

  // Secondary add trigger — used for "Add Category" and "Create Round" from bottom menu
  const [addTick2, setAddTick2] = useState(0);

  // Contextual + menu: null = no menu needed (Train handles its own), array = show menu
  const getAddMenuOptions = () => {
    if (tab === "ideas") return null;
    if (tab === "wip" && subTab === "moves") return [
      { label:"Add Move",     emoji:"🕺", action:()=>{ setAddMenu(false); setAddTick(t=>t+1); } },
      { label:"Add Category", emoji:"📂", action:()=>{ setAddMenu(false); setAddTick2(t=>t+1); } },
    ];
    if (tab === "wip" && subTab === "sets") return null; // fires Add Set directly
    if (tab === "ready" && subTab === "freestyle") return null; // fires picker directly
    if (tab === "ready") return null; // fires Create Round directly
    return null;
  };

  const handlePlusPress = () => {
    const opts = getAddMenuOptions();
    if (!opts) {
      // Sets sub-tab: fire Add Set (addTick2), everything else fires addTick
      if (tab === "wip" && subTab === "sets") setAddTick2(t=>t+1);
      else setAddTick(t=>t+1);
    }
    else { setAddMenu(m=>!m); }
  };

  // Close addMenu on outside click
  useEffect(() => {
    if (!addMenu) return;
    const h = (e) => {
      const el = e.target;
      const inBtn = el.closest && (el.closest('#tour-add-btn') || el.closest('#tour-add-btn-sidebar'));
      const inMenu = el.closest && (el.closest('#add-menu-popup') || el.closest('#add-menu-popup-sidebar'));
      if (!inBtn && !inMenu) setAddMenu(false);
    };
    document.addEventListener('pointerdown', h);
    return () => document.removeEventListener('pointerdown', h);
  }, [addMenu]);
  const handleTourDone = () => {
    setShowTour(false);
    if (fbUser?.uid) localStorage.setItem('mb_toured_' + fbUser.uid, '1');
  };

  const vocabMoves = moves;

  return (
    <SettingsCtx.Provider value={{ settings:appSettings, C, cardPad, cardFontSize }}>
      <style>{`
        #movesbook-root { zoom: ${(fontScale * zoom).toFixed(3)}; }
        #movesbook-root * { box-sizing: border-box; }
      `}</style>
      <div id="movesbook-root" style={{ fontFamily:FONT_BODY, background:C.bg, color:C.text,
        height:"100vh", width:"100%", display:"flex", flexDirection:"row",
        overflow:"hidden", transition:"background 0.3s, color 0.3s" }}>

        {/* ── SIDEBAR (tablet/desktop, hidden on mobile via CSS) ── */}
        <div id="mb-sidebar" style={{
          display:"none", flexDirection:"column", flexShrink:0,
          width:64, background:C.header, borderRight:`2px solid ${C.border}`,
          zIndex:200, transition:"width 0.2s", overflow:"hidden"
        }}>
          {/* Logo */}
          <div style={{ padding:"16px 0 12px", borderBottom:`1px solid ${C.border}`, textAlign:"center", overflow:"hidden" }}>
            <div style={{ fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:13, letterSpacing:2, lineHeight:1.2, whiteSpace:"nowrap", overflow:"hidden" }}>
              <div style={{ color:"#cf0000" }}>MV</div>
              <div style={{ color:C.headerText }}>BK</div>
            </div>
            <div className="mb-nav-label" style={{ display:"none", fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:18, letterSpacing:3, marginTop:4 }}>
              <span style={{ color:"#cf0000" }}>MOVES</span><span style={{ color:C.headerText }}>BOOK</span>
            </div>
            {profile.nickname&&(
              <div className="mb-nav-label" style={{ display:"none", fontSize:10, color:C.textMuted, marginTop:3, fontWeight:500 }}>
                {profile.nickname}
              </div>
            )}
          </div>

          {/* Nav items */}
          <div style={{ flex:1, padding:"8px 0", overflowY:"auto", overflowX:"hidden" }}>
            <div className="mb-nav-section" style={{ display:"none", padding:"10px 16px 4px", fontSize:9, fontWeight:800, letterSpacing:2, color:C.textMuted, fontFamily:FONT_DISPLAY }}>NAVIGATION</div>
            {[
              { id:"ideas", icon:"target", label:t("train"),  tid:"tour-tab-ideas" },
              { id:"wip",   icon:"scroll", label:t("vocab"),  tid:"tour-tab-wip"   },
              { id:"ready", icon:"sword",  label:t("battle"), tid:"tour-tab-ready" },
            ].map(item => {
              const on = tab === item.id;
              return (
                <button key={item.id} id={item.tid} className={`mb-nav-btn${on?" active":""}`}
                  onClick={()=>{ setTrainMenu(null); setTab(item.id); setAddTick(0); setAddTick2(0); setAddMenu(false); setSubTab("moves"); }}
                  title={item.label}
                  style={{ width:"100%", display:"flex", alignItems:"center", gap:10,
                    padding:"12px 0", paddingLeft:16, border:"none", background:"none", cursor:"pointer",
                    color: on ? C.accent : C.textSec,
                    borderLeft:`3px solid ${on ? C.accent : "transparent"}`,
                    transition:"all 0.15s", textAlign:"left", overflow:"hidden" }}>
                  <span style={{ flexShrink:0 }}>
                    <Ic n={item.icon} s={18} c={on ? C.accent : C.textMuted}/>
                  </span>
                  <span className="mb-nav-label" style={{ display:"none", fontFamily:FONT_DISPLAY, fontWeight:800, fontSize:13, letterSpacing:1.5, whiteSpace:"nowrap" }}>
                    {item.label}
                  </span>
                </button>
              );
            })}

            {/* ＋ ADD button */}
            <div style={{ padding:"10px 8px 4px", marginTop:4 }}>
              <div style={{ position:"relative" }}>
                {addMenu&&(
                  <div id="add-menu-popup-sidebar" style={{ position:"absolute", bottom:"calc(100% + 8px)", left:0, right:0,
                    background:C.bg, border:`2px solid ${C.border}`, borderRadius:12,
                    overflow:"hidden", zIndex:9999, boxShadow:"0 -8px 32px rgba(0,0,0,0.25)", minWidth:160 }}>
                    {(getAddMenuOptions()||[]).map((opt,i)=>(
                      <button key={i} onClick={opt.action}
                        style={{ width:"100%", padding:"12px 14px", background:"none",
                          border:"none", borderTop: i>0?`1px solid ${C.borderLight}`:"none",
                          cursor:"pointer", display:"flex", alignItems:"center", gap:10,
                          color:C.text, fontSize:12, fontFamily:FONT_DISPLAY, fontWeight:700,
                          letterSpacing:0.5, textAlign:"left", whiteSpace:"nowrap" }}>
                        <span style={{ fontSize:15 }}>{opt.emoji}</span>{opt.label}
                      </button>
                    ))}
                  </div>
                )}
                <button id="tour-add-btn" onClick={handlePlusPress} title="Add"
                  className="mb-add-btn"
                  style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                    padding:"10px 0", border:"none", borderRadius:10,
                    background:C.accent, cursor:"pointer", transition:"all 0.15s" }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    <Ic n="plus" s={18} c="#fff"/>
                  </div>
                  <span className="mb-nav-label" style={{ display:"none", fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:13, letterSpacing:1.5, color:"#fff", whiteSpace:"nowrap" }}>ADD</span>
                </button>
              </div>
            </div>
          </div>

          {/* Bottom: feedback, manual, profile, settings */}
          <div style={{ borderTop:`1px solid ${C.border}`, padding:"6px 0" }}>
            {[
              { icon:null, emoji:"💬", label:"FEEDBACK", onClick:()=>setShowFeedback(true), tid:null },
              { icon:"info", emoji:null, label:"MANUAL", onClick:()=>setShowManual(true), tid:"tour-manual-btn" },
              { icon:fbUser?.photo?null:"user", photo:fbUser?.photo, label:"PROFILE", onClick:()=>setShowProfile(true), tid:"tour-profile" },
              { icon:"cog", emoji:null, label:"SETTINGS", onClick:()=>setShowSettings(true), tid:null },
            ].map((item,i) => (
              <button key={i} id={item.tid||undefined}
                className="mb-nav-btn"
                onClick={item.onClick}
                title={item.label}
                style={{ width:"100%", display:"flex", alignItems:"center", gap:10,
                  padding:"10px 0", paddingLeft:16, border:"none", background:"none", cursor:"pointer",
                  color:C.textMuted, borderLeft:"3px solid transparent", transition:"all 0.15s", overflow:"hidden" }}>
                {item.photo
                  ? <img src={item.photo} alt="" style={{ width:18, height:18, borderRadius:"50%", objectFit:"cover", flexShrink:0 }}/>
                  : item.icon
                    ? <Ic n={item.icon} s={17} c={C.textMuted}/>
                    : <span style={{ fontSize:16, lineHeight:1, flexShrink:0 }}>{item.emoji}</span>
                }
                <span className="mb-nav-label" style={{ display:"none", fontFamily:FONT_DISPLAY, fontWeight:700, fontSize:11, letterSpacing:1.2, whiteSpace:"nowrap" }}>{item.label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* ── MAIN AREA ── */}
        <div id="mb-main-content" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>

          {/* Mobile header — hidden on tablet+ */}
          <div id="mb-top-header" style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"10px 16px", background:C.header, borderBottom:`2px solid ${C.border}`, flexShrink:0 }}>
            <div style={{ display:"flex", alignItems:"baseline", gap:0 }}>
              <span style={{ fontFamily:FONT_DISPLAY, fontWeight:900, fontSize:24, letterSpacing:4 }}>
                <span style={{ color:"#cf0000" }}>MOVES</span><span style={{ color:C.headerText }}>BOOK</span>
              </span>
              {profile.nickname&&(
                <span style={{ fontFamily:FONT_BODY, fontSize:13, color:C.textMuted, marginLeft:7, fontWeight:500 }}>
                  of {profile.nickname}
                </span>
              )}
            </div>
            <div style={{ display:"flex", gap:6, alignItems:"center" }}>
              {fbUser?.photo
                ? <button id="tour-profile-mobile" onClick={()=>setShowProfile(true)} style={{ background:"none", border:"none", cursor:"pointer", padding:2, display:"flex", borderRadius:"50%", overflow:"hidden" }}>
                    <img src={fbUser.photo} alt={fbUser.name} style={{ width:26, height:26, borderRadius:"50%", objectFit:"cover", border:`1.5px solid ${C.border}` }}/>
                  </button>
                : <button id="tour-profile-mobile" onClick={()=>setShowProfile(true)} style={{ background:"none", border:"none", cursor:"pointer", color:C.brownLight, padding:5 }}><Ic n="user" s={17} c={C.brownLight}/></button>
              }
              <button onClick={()=>setShowManual(true)}
                style={{ background:"none", border:"none", cursor:"pointer", padding:"3px 5px",
                  borderRadius:6, color:C.brownLight, fontWeight:900, fontSize:16,
                  fontFamily:FONT_DISPLAY, lineHeight:1 }}
                id="tour-manual-btn-mobile" title="User Manual">?</button>
            </div>
          </div>

          {/* Mobile tab bar — hidden on tablet+ */}
          <div id="mb-tabbar">
            <TabBar active={tab} onChange={newTab=>{ setTrainMenu(null); setTab(newTab); setAddTick(0); setAddTick2(0); setAddMenu(false); setSubTab("moves"); }}/>
          </div>

          {/* Page content */}
          <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column", position:"relative" }}>
            {(trainModal.type==="note"||trainModal.type==="goal"||trainModal.type==="target")&&(
              <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.6)", zIndex:10000, display:"flex", alignItems:"center", justifyContent:"center", padding:10 }}>
                {trainModal.type==="note"&&<NoteModal idea={trainModal.idea} onClose={()=>setTrainModal({})} onSave={fields=>{ trainModal.onSave(fields); setTrainModal({}); }}/>}
                {trainModal.type==="goal"&&<GoalModal idea={trainModal.idea} onClose={()=>setTrainModal({})} onSave={fields=>{ trainModal.onSave(fields); setTrainModal({}); }}/>}
                {trainModal.type==="target"&&<TargetGoalModal idea={trainModal.idea} moves={moves} onClose={()=>setTrainModal({})} onSave={fields=>{ trainModal.onSave(fields); setTrainModal({}); }}/>}
              </div>
            )}
            <IdeaMenu menu={trainMenu} onClose={()=>setTrainMenu(null)}/>
            <TrainModalCtx.Provider value={{ openModal:(type,idea,onSave)=>{ setTrainMenu(null); setTrainModal({type,idea,onSave}); } }}>
            <TrainMenuCtx.Provider value={{ openMenu:(m)=>setTrainMenu(m), closeMenu:()=>setTrainMenu(null) }}>
              {tab==="ideas" && <IdeasPage onAddMove={handleAddMoveFromIdea} onAddTrigger={addTick} ideas={ideas} setIdeas={setIdeas} habits={habits} setHabits={setHabits}/>}
            </TrainMenuCtx.Provider>
            </TrainModalCtx.Provider>
            {tab==="wip"   && <WIPPage moves={vocabMoves} setMoves={setMovesGrad} cats={cats} setCats={setCats} catColors={catColors} setCatColors={setCatColors} sets={sets} setSets={setSets} addToast={addToast} pendingDesc={ideaToMove} clearPendingDesc={()=>setIdeaToMove(null)} settings={appSettings} onAddTrigger={addTick} onAddTrigger2={addTick2} onSubTabChange={setSubTab} onSortChange={(key,val)=>setAppSettings(p=>({...p,[key]:val}))}/>}
            {tab==="ready" && <ReadyPage moves={moves} sets={sets} setSets={setSets} rounds={rounds} setRounds={setRounds} settings={appSettings} onAddTrigger={addTick} onAddTrigger2={addTick2} onSubTabChange={setSubTab}/>}
          </div>

          {/* Mobile bottom bar — hidden on tablet+ */}
          <div id="mb-bottom-bar">
            {!showTour&&(
              <div style={{ display:"flex", alignItems:"stretch", borderTop:`2px solid ${C.border}`,
                background:C.bg, flexShrink:0, height:58, zIndex:100 }}>
                <button onClick={()=>setShowFeedback(true)}
                  style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center",
                    justifyContent:"center", gap:3, background:"none", border:"none", cursor:"pointer",
                    color: showFeedback ? C.accent : C.textMuted }}>
                  <span style={{ fontSize:20, lineHeight:1 }}>💬</span>
                  <span style={{ fontSize:9, fontFamily:FONT_DISPLAY, fontWeight:800, letterSpacing:1.2 }}>FEEDBACK</span>
                </button>
                <div style={{ flex:"0 0 64px", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", position:"relative" }}>
                  {addMenu&&(
                    <div id="add-menu-popup" style={{ position:"absolute", bottom:62, left:"50%", transform:"translateX(-50%)",
                      background:C.bg, border:`2px solid ${C.border}`, borderRadius:12,
                      overflow:"hidden", zIndex:9999, minWidth:180, boxShadow:"0 -8px 32px rgba(0,0,0,0.25)" }}>
                      {(getAddMenuOptions()||[]).map((opt,i)=>(
                        <button key={i} onClick={opt.action}
                          style={{ width:"100%", padding:"13px 16px", background:"none",
                            border:"none", borderTop: i>0?`1px solid ${C.borderLight}`:"none",
                            cursor:"pointer", display:"flex", alignItems:"center", gap:10,
                            color:C.text, fontSize:13, fontFamily:FONT_DISPLAY, fontWeight:700,
                            letterSpacing:0.5, textAlign:"left" }}>
                          <span style={{ fontSize:16 }}>{opt.emoji}</span>{opt.label}
                        </button>
                      ))}
                    </div>
                  )}
                  <button onClick={handlePlusPress}
                    style={{ display:"flex", flexDirection:"column", alignItems:"center",
                      justifyContent:"center", background:"none", border:"none", cursor:"pointer" }}>
                    <div style={{ width:48, height:48, borderRadius:"50%", background:C.accent,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      boxShadow:`0 4px 16px rgba(139,26,26,0.4)`,
                      transform:"translateY(-10px)", transition:"transform 0.15s" }}
                      onMouseEnter={e=>e.currentTarget.style.transform="translateY(-13px) scale(1.07)"}
                      onMouseLeave={e=>e.currentTarget.style.transform="translateY(-10px) scale(1)"}>
                      <Ic n="plus" s={22} c={C.bg}/>
                    </div>
                  </button>
                </div>
                <button onClick={()=>setShowSettings(true)}
                  style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center",
                    justifyContent:"center", gap:3, background:"none", border:"none", cursor:"pointer",
                    color: showSettings ? C.accent : C.textMuted }}>
                  <Ic n="cog" s={20} c={showSettings ? C.accent : C.textMuted}/>
                  <span style={{ fontSize:9, fontFamily:FONT_DISPLAY, fontWeight:800, letterSpacing:1.2 }}>SETTINGS</span>
                </button>
              </div>
            )}
          </div>

        </div>{/* end mb-main-content */}

        <Toast toasts={toasts} remove={removeToast}/>
        {showProfile&&<ProfileModal onClose={()=>setShowProfile(false)} profile={profile} onSave={setProfile}/>}
        {showManual&&<ManualModal onClose={()=>setShowManual(false)}/>}
        {showFeedback&&<FeedbackModal onClose={()=>setShowFeedback(false)}/>}
        {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} settings={appSettings} onSave={setAppSettings} onClearMoves={()=>setMoves([])} onRestoreRounds={()=>setRounds(INIT_ROUNDS)} onRestartTour={()=>setShowTour(true)} zoom={zoom} onZoomChange={handleZoomChange}/>}
        {showTour&&<Walkthrough onDone={handleTourDone}/>}

      </div>
    </SettingsCtx.Provider>
  );
}



ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    (function() {
      var splash = document.getElementById('splash');
      var root   = document.getElementById('root');
      var t = setInterval(function() {
        if (root.children.length > 0) {
          clearInterval(t);
          splash.style.display = 'none';
          root.style.display = 'flex';
          // Notify Firebase that React is ready
          window.dispatchEvent(new Event('mb-auth-resolved'));
        }
      }, 100);
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(reg) { console.log('MovesBook SW registered:', reg.scope); })
          .catch(function(err) { console.log('SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
