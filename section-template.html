<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MovesBook — SECTION NAME</title>
  <meta name="theme-color" content="#0d0d0d"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet"/>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:            "AIzaSyAX9Wo4dx8mI_4JK63UTDnp9hTr1Vjv0-s",
      authDomain:        "movesbook-742cd.firebaseapp.com",
      projectId:         "movesbook-742cd",
      storageBucket:     "movesbook-742cd.firebasestorage.app",
      messagingSenderId: "499111132644",
      appId:             "1:499111132644:web:d66d09ca7f7507e6ed5bf1"
    });
    var _fbAuth     = firebase.auth();
    var _fbDb       = firebase.firestore();
    var _fbProvider = new firebase.auth.GoogleAuthProvider();

    _fbAuth.getRedirectResult().catch(function(e){ console.warn("[MB] redirect:", e); });

    window.__MB_AUTH__ = {
      signIn:        function()    { return _fbAuth.signInWithPopup(_fbProvider).catch(function(e){ if(e.code==="auth/popup-blocked"||e.code==="auth/popup-closed-by-user") return _fbAuth.signInWithRedirect(_fbProvider); throw e; }); },
      signOut:       function()    { return _fbAuth.signOut(); },
      signInEmail:   function(e,p) { return _fbAuth.signInWithEmailAndPassword(e,p); },
      signUpEmail:   function(e,p) { return _fbAuth.createUserWithEmailAndPassword(e,p); },
      resetPassword: function(e)   { return _fbAuth.sendPasswordResetEmail(e); }
    };
    window.__MB_DB__ = {
      load:      function(uid)       { return _fbDb.collection("users").doc(uid).get().then(function(s){ return s.exists?s.data():null; }); },
      save:      function(uid,k,val) { var o={}; o[k]=JSON.stringify(val); return _fbDb.collection("users").doc(uid).set(o,{merge:true}); },
      subscribe: function(uid,cb)    { return _fbDb.collection("users").doc(uid).onSnapshot(function(s){ if(s.exists) cb(s.data()); }); }
    };

    // Auth wall — builds login UI before React loads
    var _loginDiv = null;
    var _unsubSnap = null;
    function _buildLoginWall() {
      if (document.getElementById("mb-login")) return;
      var style = document.createElement("style");
      style.textContent = '#mb-login{position:fixed;inset:0;background:#1a0f08;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:"Barlow Condensed",sans-serif;z-index:99999;padding:24px;overflow-y:auto;transition:opacity 0.3s}#mb-login h1{font-size:34px;font-weight:900;letter-spacing:6px;margin-bottom:4px;color:#e8d5b0}#mb-login h1 span{color:#cf0000}#mb-login .sub{color:#9a8a7a;font-size:11px;margin-bottom:24px;letter-spacing:2px;text-transform:uppercase}#mb-login .card{background:#221408;border:1px solid #3a2a1a;border-radius:16px;padding:24px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,.6)}#mb-login .gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;color:#1a1a1a;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:"Barlow Condensed",sans-serif;letter-spacing:1px;box-shadow:0 2px 8px rgba(0,0,0,.3);margin-bottom:18px}#mb-login .gbtn img{width:20px;height:20px}#mb-login .divrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}#mb-login .divrow span{color:#4a3a2a;font-size:11px;letter-spacing:1px}#mb-login .divrow:before,#mb-login .divrow:after{content:"";flex:1;height:1px;background:#3a2a1a}#mb-login input{width:100%;background:#0f0a06;border:1px solid #3a2a1a;border-radius:8px;padding:11px 14px;color:#e8d5b0;font-size:14px;font-family:"Barlow Condensed",sans-serif;outline:none;margin-bottom:10px;box-sizing:border-box}#mb-login input:focus{border-color:#8b1a1a}#mb-login input::placeholder{color:#4a3a2a}#mb-login .ebtn{width:100%;background:#8b1a1a;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:"Barlow Condensed",sans-serif;letter-spacing:2px;margin-top:4px}#mb-login .trow{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:14px;font-size:12px;color:#6a5a4a}#mb-login .trow button{background:none;border:none;color:#c0a080;cursor:pointer;font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;text-decoration:underline;padding:0}#mb-login .fgt{background:none;border:none;color:#4a3a2a;cursor:pointer;font-family:"Barlow Condensed",sans-serif;font-size:11px;display:block;margin:8px auto 0;padding:0}#mb-login .err{color:#cf0000;font-size:12px;margin-top:10px;text-align:center;min-height:16px}#mb-login .ok{color:#2d6a4f;font-size:12px;margin-top:10px;text-align:center;min-height:16px}';
      document.head.appendChild(style);
      _loginDiv = document.createElement("div");
      _loginDiv.id = "mb-login";
      _loginDiv.innerHTML = '<h1><span>MOVES</span>BOOK</h1><p class="sub">FOR BREAKING NERDS ONLY</p><div class="card"><button class="gbtn" id="mb-gbtn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"/>Continue with Google</button><div class="divrow"><span>OR</span></div><input type="email" id="mb-em" placeholder="Email address" autocomplete="email"/><input type="password" id="mb-pw" placeholder="Password" autocomplete="current-password"/><input type="password" id="mb-pw2" placeholder="Confirm password" autocomplete="new-password" style="display:none"/><button class="ebtn" id="mb-ebtn">SIGN IN</button><button class="fgt" id="mb-fgt">Forgot password?</button><p class="err" id="mb-err"></p><p class="ok" id="mb-ok"></p><div class="trow"><span id="mb-tlbl">Don\'t have an account?</span><button id="mb-tgl">Sign Up</button></div></div><p style="color:#3a2a1a;font-size:10px;margin-top:16px;letter-spacing:1px">Your moves. Your progress. Your story.</p>';
      document.body.appendChild(_loginDiv);
      var mode="signin";
      function setErr(m){document.getElementById("mb-err").textContent=m;document.getElementById("mb-ok").textContent="";}
      function setOk(m){document.getElementById("mb-ok").textContent=m;document.getElementById("mb-err").textContent="";}
      document.getElementById("mb-gbtn").onclick=function(){setErr("");window.__MB_AUTH__.signIn();};
      document.getElementById("mb-tgl").onclick=function(){mode=mode==="signin"?"signup":"signin";var s=mode==="signup";document.getElementById("mb-ebtn").textContent=s?"CREATE ACCOUNT":"SIGN IN";document.getElementById("mb-tlbl").textContent=s?"Already have an account?":"Don't have an account?";document.getElementById("mb-tgl").textContent=s?"Sign In":"Sign Up";document.getElementById("mb-pw2").style.display=s?"block":"none";document.getElementById("mb-pw").placeholder=s?"Password (min 6 chars)":"Password";document.getElementById("mb-fgt").style.display=s?"none":"block";setErr("");};
      document.getElementById("mb-ebtn").onclick=function(){var email=document.getElementById("mb-em").value.trim();var pass=document.getElementById("mb-pw").value;var pass2=document.getElementById("mb-pw2").value;setErr("");if(!email||!pass){setErr("Please enter your email and password.");return;}if(mode==="signup"){if(pass.length<6){setErr("Password must be at least 6 characters.");return;}if(pass!==pass2){setErr("Passwords do not match.");return;}window.__MB_AUTH__.signUpEmail(email,pass).catch(function(e){setErr(e.code==="auth/email-already-in-use"?"Email already in use.":"Sign-up failed.");});}else{window.__MB_AUTH__.signInEmail(email,pass).catch(function(e){setErr(["auth/wrong-password","auth/user-not-found","auth/invalid-credential"].indexOf(e.code)>=0?"Incorrect email or password.":"Sign-in failed.");});}};
      document.getElementById("mb-fgt").onclick=function(){var email=document.getElementById("mb-em").value.trim();if(!email){setErr("Enter your email above first.");return;}window.__MB_AUTH__.resetPassword(email).then(function(){setOk("Reset email sent.");}).catch(function(){setErr("Could not send reset email.");});};
      document.addEventListener("keydown",function(e){if(e.key==="Enter"&&_loginDiv&&_loginDiv.style.display!=="none")document.getElementById("mb-ebtn").click();});
    }

    _fbAuth.onAuthStateChanged(function(user) {
      if (user) {
        window.__MB_USER__ = { uid:user.uid, name:user.displayName, email:user.email, photo:user.photoURL };
        window.__MB_DB__.load(user.uid).then(function(data) {
          if (data) {
            var keys = ["moves","sets","rounds","ideas","habits","cats","catColors","profile","settings","templates"];
            keys.forEach(function(k) {
              var lk = k==="catColors"?"mb_cat_colors":("mb_"+k);
              if (data[k]) { try { localStorage.setItem(lk, data[k]); } catch{} }
            });
            localStorage.setItem("mb_data_version","5");
          }
          if (_loginDiv) { _loginDiv.style.opacity="0"; setTimeout(function(){ _loginDiv.style.display="none"; },300); }
          window.dispatchEvent(new Event("mb-auth-resolved"));
        }).catch(function(){
          if (_loginDiv) { _loginDiv.style.opacity="0"; setTimeout(function(){ _loginDiv.style.display="none"; },300); }
          window.dispatchEvent(new Event("mb-auth-resolved"));
        });
        if (_unsubSnap) _unsubSnap();
        _unsubSnap = window.__MB_DB__.subscribe(user.uid, function(d){
          try {
            if(d.moves)    localStorage.setItem("mb_moves",    d.moves);
            if(d.sets)     localStorage.setItem("mb_sets",     d.sets);
            if(d.rounds)   { try{var pr=JSON.parse(d.rounds);if(pr.length>0)localStorage.setItem("mb_rounds",d.rounds);}catch{} }
            if(d.ideas)    localStorage.setItem("mb_ideas",    d.ideas);
            if(d.habits)   localStorage.setItem("mb_habits",   d.habits);
            if(d.profile)  { try{var pp=JSON.parse(d.profile);if(pp&&Object.values(pp).some(function(v){return v;}))localStorage.setItem("mb_profile",d.profile);}catch{} }
            if(d.settings) localStorage.setItem("mb_settings", d.settings);
            if(d.catColors)localStorage.setItem("mb_cat_colors",d.catColors);
          } catch(e){}
        });
      } else {
        window.__MB_USER__ = null;
        ["mb_moves","mb_sets","mb_rounds","mb_ideas","mb_profile","mb_settings",
         "mb_habits","mb_cats","mb_cat_colors","mb_data_version"].forEach(function(k){ localStorage.removeItem(k); });
        if (_loginDiv) { _loginDiv.style.display="flex"; _loginDiv.style.opacity="1"; }
        if (_unsubSnap) { _unsubSnap(); _unsubSnap=null; }
      }
    });
    document.addEventListener("DOMContentLoaded", _buildLoginWall);
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <!-- MovesBook foundation -->
  <script src="../shared/mb-design-system.js"></script>
  <script src="../shared/mb-layout.js"></script>
  <script src="../shared/mb-state.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const {
  useState, useEffect, useRef, useCallback, useContext,
  createContext, useMemo, Fragment
} = React;

// ── Destructure everything from MB ──────────────────────────────────────────
const {
  // Design system
  C, FONT_DISPLAY, FONT_BODY,
  CAT_COLORS, CATS, IDEA_COLORS,
  masteryColor, masteryLabel,
  Ic, Btn, Modal, Inp, Txtarea, Sel,
  Toast, ColourPicker, EmptyState, MasteryBar,
  lbl, inp, genId, fmtDate, ensureHttps,

  // Layout
  AppShell, SectionHeader, SearchBar,

  // State
  useAppState, SettingsProvider, useSettings,
} = MB;

// ────────────────────────────────────────────────────────────────────────────
// YOUR SECTION COMPONENTS GO HERE
// ────────────────────────────────────────────────────────────────────────────

function SectionPage({ state }) {
  const { addToast } = state;

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <SectionHeader
        title="SECTION NAME"
        subtitle="What this section does"
        right={
          <Btn variant="primary" small onClick={()=>addToast({ title:"Add", msg:"Add action fires here", emoji:"➕" })}>
            <Ic n="plus" s={12} c="#fff"/> Add
          </Btn>
        }
      />
      <div style={{ flex:1, overflowY:"auto", padding:16 }}>
        <EmptyState emoji="📭" message="NOTHING HERE YET" sub="Tap + to get started"/>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// ROOT APP — do not edit below unless adding modals
// ────────────────────────────────────────────────────────────────────────────
function App() {
  const state = useAppState();
  const {
    tab, setTab,
    profile, fbUser,
    settings, setSettings,
    toasts, removeToast,
  } = state;

  const [showSettings, setShowSettings] = useState(false);
  const [showFeedback, setShowFeedback] = useState(false);

  return (
    <SettingsProvider settings={settings}>
      <AppShell
        tab={tab}
        onTabChange={setTab}
        onAdd={()=>{/* section handles add */}}
        profile={profile}
        user={fbUser}
        onProfile={()=>{}}
        onSettings={()=>setShowSettings(s=>!s)}
        onFeedback={()=>setShowFeedback(f=>!f)}
        onManual={()=>{}}
        showSettings={showSettings}
        showFeedback={showFeedback}
        theme={settings.theme}
      >
        <SectionPage state={state}/>
        <Toast toasts={toasts} remove={removeToast}/>
      </AppShell>
    </SettingsProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
